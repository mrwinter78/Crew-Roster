<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CrewRoster offline</title>
  <style>
    :root{--bg:#0F172A;--surface:#1E293B;--text:#F8FAFC;--muted:#94A3B8;--accent:#2563EB}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0F172A,#111827);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{max-width:520px;background:rgba(30,41,59,.92);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.28)}
    h1{margin:0 0 10px;font-size:28px} p{margin:0 0 12px;line-height:1.55;color:var(--muted)} .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(37,99,235,.14);color:#93C5FD;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Offline mode</div>
    <h1>CrewRoster è offline</h1>
    <p>L'app shell è disponibile in cache, ma alcune risorse potrebbero non essere ancora state sincronizzate.</p>
    <p>Apri l'app almeno una volta online dopo ogni nuova release, così Service Worker e file locali vengono aggiornati correttamente.</p>
  </main>
</body>
</html>
