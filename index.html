    'first:', S.schedule[0]?.dateIso, 'last:', S.schedule[S.schedule.length-1]?.dateIso,
    'localDate:', _localDateIso());
  if (!tt) return;
  const target = document.querySelector(`.day-group[data-date="${tt.dateIso}"]`);
  console.log('[OGGI] target element:', target ? 'FOUND' : 'NOT FOUND', 'for date:', tt.dateIso);
  if (!target) return;

  // Espande il turno-block prima di misurare la posizione
  _expandTurnoContaining(target);

  const doScroll = () => {

    const absoluteTop = _getDocumentTop(target);
    const dest = Math.max(0, absoluteTop - headerH - 12);

    window.scrollTo({ top: dest, behavior: (animated === false) ? 'instant' : 'smooth' });
    // Doppio highlight: giorno + turno block
    _flashDay(target);

  };

  // Due rAF: il primo attende il re-layout post-expand, il secondo misura dopo il repaint
  requestAnimationFrame(() => requestAnimationFrame(doScroll));
}

// FAB — one IntersectionObserver, created once at render time.
// Shows the FAB when today's card scrolls OFF screen; hides when ON screen.
// FAB is hidden entirely when viewing a month other than the current one.
let _fabObs = null;

function setupFabObserver() {
  const fab = document.getElementById('fabToday');
  if (!fab) return;

  // Disconnect any previous observer
  if (_fabObs) { _fabObs.disconnect(); _fabObs = null; }
  fab.classList.remove('visible');

  const tt = _todayTarget();

  // Not current month → FAB stays hidden, nothing to observe
  if (!tt || !tt.isCurrent) return;

  const todayEl = document.querySelector(`.day-group[data-date="${tt.dateIso}"]`);
  if (!todayEl) return;

  // Create observer: show FAB when today's card leaves viewport
  _fabObs = new IntersectionObserver(
    ([entry]) => fab.classList.toggle('visible', !entry.isIntersecting),
    { threshold: 0.1 }
  );
  _fabObs.observe(todayEl);
}

// Called from scroll handler — lightweight no-op (observer handles visibility)
function syncFabToday() {
  // Observer is active → nothing to do
  if (_fabObs) return;
  // Safety: re-setup if observer was lost (e.g. DOM re-render without calling showTimeline)
  if (S.schedule.length) setupFabObserver();
}

// MULTI-MONTH HISTORY
// Storage: crewroster_index = [{key, label, iso}] sorted by iso
//          crewroster_month_YYYY-MM = raw PDF text
//          crewroster_active = YYYY-MM (currently viewed month)
// ─────────────────────────────────────────────────────────────
function _histIndex() {
  try { return JSON.parse(localStorage.getItem('crewroster_index') || '[]'); }
  catch(e) { return []; }
}
function _histSave(idx) {
  try { localStorage.setItem('crewroster_index', JSON.stringify(idx)); } catch(e) {}
}

// Add or overwrite a month
function histAddMonth(text, isoMonth, label) {
  const key = 'crewroster_month_' + isoMonth;
  try { localStorage.setItem(key, text); } catch(e) {
    alert('Spazio localStorage esaurito. Elimina mesi vecchi.'); return false;
  }
  const idx = _histIndex().filter(e => e.iso !== isoMonth);
  idx.push({ key, label, iso: isoMonth });
  idx.sort((a,b) => a.iso.localeCompare(b.iso));
  _histSave(idx);
  localStorage.setItem('crewroster_active', isoMonth);
  return true;
}

// Load a month from history
function histLoadMonth(isoMonth) {
  const key = 'crewroster_month_' + isoMonth;
  const text = localStorage.getItem(key);
  if (!text) return false;
  localStorage.setItem('crewroster_active', isoMonth);
  showLoading();
  // Defer heavy parse to next task so spinner renders first
  setTimeout(() => {
    try {
      const { schedule, unrecognized, crewName, rosterRange, printDate,
              flightHours, dayOff, sbYDays, holidays } = parseNeosRoster(text);
      if (!schedule.length) { hideLoading(); return; }
      Object.assign(S, { schedule, unrecognized, crewName, rosterRange, printDate,
                          flightHours, dayOff, sbYDays, holidays });
      showTimeline();
      renderMonthStrip();
    } catch(e) { hideLoading(); }
  }, 0);
  return true;
}

// Delete a month from history
function histDeleteMonth(isoMonth) {
  try { localStorage.removeItem('crewroster_month_' + isoMonth); } catch(e) {}
  const idx = _histIndex().filter(e => e.iso !== isoMonth);
  _histSave(idx);
  const active = localStorage.getItem('crewroster_active');
  if (active === isoMonth) {
    // Switch to most recent remaining month
    const next = idx[idx.length - 1];
    if (next) histLoadMonth(next.iso);
    else { localStorage.removeItem('crewroster_active'); showUploadScreen(); }
  }
  renderMonthStrip();
}

// Render the month pill strip
function renderMonthStrip() {
  const IT_M = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const idx = _histIndex();
  const strip = document.getElementById('monthStrip');
  const scroll = document.getElementById('monthScroll');
  if (!strip || !scroll) return;
  if (idx.length <= 1) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  const active = localStorage.getItem('crewroster_active') || '';
  scroll.innerHTML = idx.map(e => {
    const [y, m] = e.iso.split('-');
    const label = IT_M[+m-1] + ' ' + y;
    const isActive = e.iso === active;
    return `<button class="month-pill${isActive?' active':''}" onclick="histLoadMonth('${e.iso}')" title="${label}">` +
      label +
      `<span class="month-pill-del" onclick="event.stopPropagation();if(confirm('Eliminare ${label} dallo storico?'))histDeleteMonth('${e.iso}')">✕</span>` +
    `</button>`;
  }).join('');
  // Scroll active pill into view
  const activeEl = scroll.querySelector('.month-pill.active');
  if (activeEl) activeEl.scrollIntoView({ block:'nearest', inline:'center', behavior:'smooth' });
}

function monthNav(dir) {
  const idx = _histIndex();

// COUNTDOWN — next duty check-in
// ─────────────────────────────────────────────────────────────
let _cdTimer = null;
function startCountdown() {
  if (_cdTimer) clearInterval(_cdTimer);

  // Build a flat list of { dateIso, checkInUtc } from all activities
  function nextCheckIn() {
    const now = new Date();
    // Collect all upcoming check-in times from the schedule
    const candidates = [];
    for (const day of S.schedule) {
      for (const act of day.activities) {
        // Gather check-in time from various activity types
        const ci = act.checkInUtc   // DH, FLIGHT legs carry this
          || (act.legs && act.legs.length && act.legs[0].checkInUtc)
          || (act.type === 'SBY' && act.startUtc)
          || (act.type === 'TRAINING' && act.sessions && act.sessions.length && act.sessions[0].start);
        if (!ci) continue;
        // Parse: dateIso = "2026-03-12", ci = "HH:MM"
        const [h, m] = ci.split(':').map(Number);
        if (isNaN(h) || isNaN(m)) continue;
        const dt = new Date(day.dateIso + 'T' + ci + ':00Z'); // UTC
        if (dt > now) candidates.push({ dt, act, day });
      }
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.dt - b.dt);
    return candidates[0];
  }

  function tick() {
    const next = nextCheckIn();
    const el = document.getElementById('headerCountdown');
    const val = document.getElementById('countdownValue');
    const lbl = document.getElementById('countdownLabel');
    if (!next || !el || !val) return;

    const now = new Date();
    let diff = Math.max(0, Math.floor((next.dt - now) / 1000));

    const dd = Math.floor(diff / 86400);
    diff -= dd * 86400;
    const hh = Math.floor(diff / 3600);
    diff -= hh * 3600;
    const mm = Math.floor(diff / 60);
    const ss = diff % 60;

    const pad = n => String(n).padStart(2,'0');
    val.textContent = `${pad(dd)}:${pad(hh)}:${pad(mm)}:${pad(ss)}`;

    // Imminent = less than 2 hours away
    val.classList.toggle('cd-imminent', (dd === 0 && hh < 2));

    // Label: show duty type and date
    const act = next.act;
    const dayIso = next.day.dateIso;
    const [y, mo, d] = dayIso.split('-');
    const IT_MONTHS_SHORT = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
    const dateStr = d + ' ' + IT_MONTHS_SHORT[parseInt(mo,10)-1];
    const typeStr = act.type === 'FLIGHT' ? 'VOLO'
      : act.type === 'DH'       ? 'DH'
      : act.type === 'SBY'      ? 'STANDBY'
      : act.type === 'TRAINING' ? 'TRAINING'
      : act.type;
    lbl.textContent = typeStr + ' · ' + dateStr;

    el.style.display = 'flex';
  }

  tick();
  _cdTimer = setInterval(tick, 1000);
}

<script>
// ── PWA Icons: canvas-generated default, overridable with a user photo
function makeDefaultIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1B2A4A');
  grad.addColorStop(1, '#0F172A');
  ctx.fillStyle = grad;
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${Math.round(size*0.45)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✈', size/2, size/2 + size*0.03);
  ctx.fillStyle = '#2563EB';
  const lh = size*0.045, ly = size*0.78, lw = size*0.5;
  ctx.beginPath();
  ctx.roundRect((size-lw)/2, ly, lw, lh, lh/2);
  ctx.fill();
  return canvas.toDataURL('image/png');
}

function makeSquareIcon(srcDataUrl, size) {
  // Crop image to square, apply rounded corners mask, return dataURL
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Clip with rounded rect
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(size-r,0);
      ctx.quadraticCurveTo(size,0,size,r);
      ctx.lineTo(size,size-r);
      ctx.quadraticCurveTo(size,size,size-r,size);
      ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
      ctx.closePath(); ctx.clip();
      // Draw image centred/cropped to square
      const s = Math.min(img.width, img.height);
      const sx = (img.width  - s) / 2;
      const sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = srcDataUrl;
  });
}

function applyIcons(dataUrl) {
  // dataUrl: null = use default canvas icon; string = custom image
  if (dataUrl) {
    Promise.all([
      makeSquareIcon(dataUrl, 180),
      makeSquareIcon(dataUrl, 152),
      makeSquareIcon(dataUrl, 120),
      makeSquareIcon(dataUrl, 32),
    ]).then(([i180, i152, i120, i32]) => {
      try {
        if (i180) document.getElementById('appleTouchIcon').href    = i180;
        if (i152) document.getElementById('appleTouchIcon152').href = i152;
        if (i120) document.getElementById('appleTouchIcon120').href = i120;
        if (i32) {
          const lnk = document.querySelector("link[rel~='icon']") || document.createElement('link');
          lnk.rel='icon'; lnk.type='image/png'; lnk.href=i32;
          document.head.appendChild(lnk);
        }
      } catch(e) {}
    });
  } else {
    try {
      document.getElementById('appleTouchIcon').href    = makeDefaultIcon(180);
      document.getElementById('appleTouchIcon152').href = makeDefaultIcon(152);
      document.getElementById('appleTouchIcon120').href = makeDefaultIcon(120);
      const lnk = document.querySelector("link[rel~='icon']") || document.createElement('link');
      lnk.rel='icon'; lnk.type='image/png'; lnk.href=makeDefaultIcon(32);
      document.head.appendChild(lnk);
    } catch(e) {}
  }
}

// On load: use saved custom icon if present, else default
(function() {
  try {
    const saved = localStorage.getItem('crewroster_icon');
    applyIcons(saved || null);
    if (saved) { setTimeout(() => _updateIconBtn(saved), 0); }
  } catch(e) { applyIcons(null); }
})();

// ── Header: compact-on-scroll + --header-h sync
(function() {
  const hdr = document.getElementById('appHeader');
  if (!hdr) return;

  // Update --header-h CSS variable
  // Header height sync — fixed (no compact-on-scroll)
  const syncH = () => {
    document.documentElement.style.setProperty('--header-h', hdr.offsetHeight + 4 + 'px');
  };
  syncH();

  // ── Manual header compact toggle ──────────────────────────────────────
  const COMPACT_KEY = 'crewroster_header_compact';

  const _applyCompact = (compact, persist = true) => {
    hdr.classList.toggle('header-compact', compact);
    const icon = document.getElementById('compactHeaderIcon');
    const btn  = document.getElementById('btnCompactHeader');
    if (icon) {
      // chevron-up (collapse) when expanded; chevron-down (expand) when compact
      icon.innerHTML = compact
        ? '<polyline points="7 10 12 15 17 10"/><line x1="5" y1="5" x2="19" y2="5" stroke-opacity=".4"/>'
        : '<polyline points="7 14 12 9 17 14"/><line x1="5" y1="19" x2="19" y2="19" stroke-opacity=".4"/>';
    }
    if (btn) btn.classList.toggle('active', compact);
    if (persist) {
      try { localStorage.setItem(COMPACT_KEY, compact ? '1' : '0'); } catch(e) {}
    }
    setTimeout(syncH, 380);
  };

  // Restore saved preference
  try {
    const saved = localStorage.getItem(COMPACT_KEY);
    if (saved === '1') _applyCompact(true, false);
  } catch(e) {}

  // Expose to global scope (called from onclick attribute)
  window.toggleHeaderCompact = () => _applyCompact(!hdr.classList.contains('header-compact'));

  // Unified scroll handler — progress bar + FAB (no compact logic)
  let _unifScrollRaf = false;
  const progressEl = document.getElementById('scrollProgress');

  const onScrollUnified = () => {
    if (_unifScrollRaf) return;
    _unifScrollRaf = true;
    requestAnimationFrame(() => {
      // 1. Progress bar (GPU transform)
      const doc = document.documentElement;
      const pct = doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100;
      if (progressEl) progressEl.style.transform = `scaleX(${Math.min(pct,100) / 100})`;
      // 2. FAB visibility
      syncFabToday();
      _unifScrollRaf = false;
    });
  };

  window.addEventListener('scroll', onScrollUnified, { passive: true });
  if (window.ResizeObserver) {
    new ResizeObserver(syncH).observe(hdr);
  } else {
    window.addEventListener('resize', syncH);
  }
})();

// ── Service Worker registration
// Requires sw.js in the same directory as index.html on GitHub Pages
if ('serviceWorker' in navigator) {
  // Derive sw.js URL relative to this page
  const swPath = location.pathname.replace(/\/[^\/]*$/, '/') + 'sw.js';
  navigator.serviceWorker.register(swPath, { scope: location.pathname.replace(/\/[^\/]*$/, '/') })
    .catch(() => {});
}
</script>
