<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CrewRoster</title>

<!-- PWA: iOS Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CrewRoster">
<meta name="mobile-web-app-capable" content="yes">

<!-- Theme color (header bar in mobile browsers) -->
<meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">

<!-- Apple Touch Icons (generated inline as SVG→PNG via canvas at runtime) -->
<link rel="apple-touch-icon" sizes="180x180" href="#" id="appleTouchIcon">
<link rel="apple-touch-icon" sizes="152x152" href="#" id="appleTouchIcon152">
<link rel="apple-touch-icon" sizes="120x120" href="#" id="appleTouchIcon120">

<!-- iOS Splash screens (minimal — Safari uses the icon + title) -->
<meta name="format-detection" content="telephone=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #F6F7F9;
    --surface: #FFFFFF;
    --border: #E8EAED;
    --text-primary: #1A1D23;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --accent-flight: #2563EB;
    --accent-sby: #EA580C;
    --accent-off: #329F5B;
    --accent-holiday: #7C3AED;
    --accent-training: #374151;
    --accent-layover: #0891B2;
    --accent-dh: #6B7280;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* All numeric/time values use DM Mono globally */
  .mono { font-family: 'JetBrains Mono', monospace; }

  .header {
    position: sticky; top: 0; z-index: 100;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background: rgba(246,247,249,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 10px;
  }
  .header-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-date {
    font-size: 20px; font-weight: 700; letter-spacing: -0.4px;
    color: var(--text-primary); line-height: 1.1;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-meta {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.9px; margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-countdown {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-top: 4px;
  }
  .countdown-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .countdown-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 800;
    color: #FBBF24;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .countdown-value.cd-imminent { color: #F87171; }
  @media (prefers-color-scheme: dark) {
    .countdown-value { color: #FCD34D; }
    .countdown-value.cd-imminent { color: #FCA5A5; }
  }
  .header-stats {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }
  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 13px;
    gap: 1px;
    border-radius: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  /* coloured top-edge accent bar */
  .stat-pill::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2.5px;
    border-radius: 10px 10px 0 0;
  }
  .stat-value {
    font-size: 15px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .stat-pill.stat-fh  { border-color: rgba(59,130,246,0.45); }
  .stat-pill.stat-off { border-color: rgba(50,159,91,0.45); }
  .stat-pill.stat-sby { border-color: rgba(234,88,12,0.45); }
  .stat-pill.stat-fh::before  { background: rgba(59,130,246,0.7); }
  .stat-pill.stat-off::before { background: rgba(50,159,91,0.7); }
  .stat-pill.stat-sby::before { background: rgba(234,88,12,0.7); }
  .stat-pill.stat-fh  .stat-value { color: var(--accent-flight); }
  .stat-pill.stat-off .stat-value { color: var(--accent-off); }
  .stat-pill.stat-sby .stat-value { color: var(--accent-sby); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; color: var(--text-secondary);
  }
  .btn-icon:hover { background: var(--border); }
  .btn-icon.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px calc(80px + env(safe-area-inset-bottom)); box-sizing: border-box; width: 100%; }

  /* ── UPLOAD SCREEN ── */
  .upload-screen {
    min-height: calc(100vh - 70px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px 48px;
    gap: 36px;
    box-sizing: border-box;
    width: 100%;
  }
  .upload-hero {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .upload-wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #94A3B8;
  }
  .upload-heading {
    font-family: 'Inter', sans-serif;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 800;
    color: #0F172A;
    letter-spacing: -0.5px;
    line-height: 1.15;
  }
  .upload-heading span {
    color: #2563EB;
  }
  .upload-sub {
    font-size: 14px;
    color: #94A3B8;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
  }
  .upload-zone {
    width: 100%;
    max-width: 420px;
    border: 1.5px dashed #CBD5E1;
    border-radius: 20px;
    background: #FFFFFF;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-sizing: border-box;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: #2563EB;
    background: #F8FAFF;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
  }
  .upload-icon {
    width: 52px;
    height: 52px;
    background: #F1F5F9;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748B;
    flex-shrink: 0;
  }
  .upload-zone:hover .upload-icon,
  .upload-zone.drag-over .upload-icon {
    background: #EEF3FF;
    color: #2563EB;
  }
  .upload-drop-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .upload-drop-title {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #1E293B;
  }
  .upload-drop-sub {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #94A3B8;
    font-weight: 400;
  }
  .upload-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .upload-divider::before,
  .upload-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #E2E8F0;
  }
  .upload-divider span {
    font-size: 11px;
    color: #CBD5E1;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #0F172A; color: white; border: none;
    border-radius: 10px; padding: 11px 22px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
    letter-spacing: 0.2px;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
    justify-content: center;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  .import-banner {
    background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; animation: fadeUp 0.3s ease both;
  }
  .import-banner-icon { color: #16A34A; flex-shrink: 0; }
  .import-banner-text { font-size: 13px; font-weight: 500; color: #166534; }
  .import-banner-btn {
    margin-left: auto; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1;
  }

  .filters {
    display: flex; gap: 8px; margin-bottom: 16px;
    flex-wrap: wrap; animation: fadeUp 0.35s ease both;
  }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px; font-size: 12px;
    font-weight: 500; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
  .filter-chip:hover:not(.active) { background: var(--border); }
  .search-input {
    flex: 1; min-width: 100px; padding: 6px 12px;
    border: 1px solid var(--border); border-radius: 20px;
    font-family: inherit; font-size: 12px; background: var(--surface);
    color: var(--text-primary); outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent-flight); }



  /* ── TURNO COLLAPSIBLE BLOCK ── */
  .turno-block {
    margin-bottom: 20px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(59,130,246,0.22);
    box-shadow: 0 2px 10px rgba(59,130,246,0.07);
  }
  .turno-block-header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 10px 14px 10px;
    background: rgba(59,130,246,0.07);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }
  .turno-block-header:active { background: rgba(59,130,246,0.13); }
  .turno-block-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: #60A5FA; flex-shrink: 0;
  }
  .turno-block-dates {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 800;
    color: #E2E8F0;
    flex-shrink: 0;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 6px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .turno-block-route {
    display: flex; align-items: center; flex-wrap: nowrap;
    gap: 0; flex: 1; min-width: 0; overflow: hidden;
  }

  /* ── Two-row turno header layout ── */
  .tba-top-row {
    display: flex; align-items: center; gap: 8px; width: 100%;
  }
  .tba-bottom-row {
    width: 100%; margin-top: 6px;
  }
  .tba-route-rows {
    display: flex; flex-direction: column; gap: 4px;
  }
  .tba-route-row {
    display: flex; align-items: center; gap: 6px;
  }
  .tba-row-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    color: #93C5FD;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 4px;
    padding: 1px 5px;
    flex-shrink: 0;
    min-width: 26px; text-align: center;
  }
  .tba-row-label-dh {
    color: #9CA3AF;
    background: rgba(156,163,175,0.12);
    border-color: rgba(156,163,175,0.22);
  }
  .tba-row-label-office {
    color: #A78BFA;
    background: rgba(167,139,250,0.12);
    border-color: rgba(167,139,250,0.22);
  }
  .tba-route-seq {
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
  }
  .tba-iata {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800;
    color: var(--text-primary); white-space: nowrap;
  }
  .tba-iata.dh { color: #9CA3AF; }
  .tba-sep {
    font-size: 11px; color: #60A5FA; opacity: 0.5; padding: 0 2px; flex-shrink: 0;
  }
  .tba-sep.dh { color: #9CA3AF; }
  .turno-block-pills {
    display: flex; gap: 5px; flex-shrink: 0; align-items: center;
  }
  .tba-pill {
    display: flex; flex-direction: column; align-items: center;
    padding: 3px 8px; border-radius: 7px;
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.18);
  }
  .tba-pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800; color: #93C5FD; line-height: 1.15;
  }
  .tba-pill-lbl {
    font-family: 'Inter', sans-serif; font-size: 7px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase; color: #60A5FA; opacity: 0.75;
  }
  .turno-block-chevron {
    color: #60A5FA; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .turno-block.expanded .turno-block-chevron { transform: rotate(180deg); }
  .turno-block-body {
    display: none;
    background: transparent;
    border-top: 1px solid rgba(59,130,246,0.12);
    padding: 0 10px;
  }
  .turno-block.expanded .turno-block-body { display: block; }
  .turno-block-body > .day-group {
    margin-bottom: 0;
    animation: none;
    padding: 6px 0 0;
  }
  .turno-block-body > .day-group:first-child { padding-top: 10px; }
  .turno-block-body > .day-group:last-child { padding-bottom: 10px; }
  /* inside turno block, day-label not sticky */
  .turno-block-body .day-label { position: static; }

  /* Day-group inside a turno block: remove turno connector lines */
  .turno-block-body .turno-wrap::before { display: none; }

  /* Keep normal day-group style for standalone days */
  .day-group { margin-bottom: 20px; animation: fadeUp 0.4s ease both; flex-direction: row; align-items: flex-start; gap: 10px; }
  /* Standalone day-groups (not inside turno) get same lateral padding as turno body */
  #timeline > .day-group { padding: 0 10px; }

  /* ── IATA TOAST IN HEADER ── */
  #iataToast {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 5px;
    padding: 5px 11px;
    border-radius: 8px;
    background: rgba(96,165,250,0.13);
    border: 1px solid rgba(96,165,250,0.28);
    animation: iataFadeIn 0.15s ease;
    /* match width of the three stat-pills row */
    align-self: flex-start;
    width: fit-content;
  }
  @keyframes iataFadeIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:none; } }
  #iataToastCode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800;
    color: var(--text-primary);
  }
  #iataToastTz {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 700;
    color: #60A5FA;
  }
  #iataToastTime {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--text-secondary);
  }
  @media (prefers-color-scheme: dark) {
    .turno-block { border-color: rgba(59,130,246,0.28); }
    .turno-block-header { background: rgba(59,130,246,0.09); }
    .turno-block-body { border-top-color: rgba(59,130,246,0.18); }
    #iataToast { background: rgba(96,165,250,0.10); border-color: rgba(96,165,250,0.22); }
  }
  @media (max-width: 600px) {
    .tba-iata { font-size: 10px; }
    .tba-pill-val { font-size: 10px; }
    .turno-block-dates { font-size: 10px; }
  }

  /* ── TURNO SUMMARY BANNER ── */
  .turno-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(59,130,246,0.07);
    border: 1px solid rgba(59,130,246,0.20);
  }
  .turno-banner-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    color: #60A5FA;
    flex-shrink: 0;
  }
  .turno-banner-route {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    min-width: 0;
    flex-wrap: wrap;
  }
  .turno-leg-iata {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .turno-leg-arrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #60A5FA;
    opacity: 0.6;
    padding: 0 2px;
  }
  .turno-banner-pills {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    align-items: center;
  }
  .turno-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3px 8px;
    border-radius: 7px;
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.18);
  }
  .turno-pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 800;
    color: #93C5FD;
    line-height: 1.15;
  }
  .turno-pill-lbl {
    font-family: 'Inter', sans-serif;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #60A5FA;
    opacity: 0.75;
  }
  @media (prefers-color-scheme: dark) {
    .turno-banner { background: rgba(59,130,246,0.09); border-color: rgba(59,130,246,0.26); }
  }
  @media (max-width: 600px) {
    .turno-leg-iata { font-size: 11px; }
    .turno-pill-val { font-size: 10px; }
    .turno-pill { padding: 2px 6px; }
  }

  .day-group { margin-bottom: 20px; animation: fadeUp 0.4s ease both; flex-direction: row; align-items: flex-start; gap: 10px; }

  .cfd-iata-cont {
    font-size: 14px !important;
    opacity: 0.4;
    letter-spacing: 3px;
  }

  /* REMARKS SECTION — shared base */
  .card-remarks {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    padding: 7px 14px 9px;
    margin-top: 0;
  }
  .card-remarks-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-right: 2px;
    flex-shrink: 0;
  }
  .card-remarks-tag {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    border-radius: 5px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  /* Dark cards: flight, DH, SBY, OFF */
  .card-flight-dark .card-remarks,
  .card-dh-dark .card-remarks,
  .card-sby-dark .card-remarks,
  .card-off-dark .card-remarks,
  .card-training .card-remarks {
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .card-flight-dark .card-remarks-label,
  .card-dh-dark .card-remarks-label,
  .card-sby-dark .card-remarks-label,
  .card-off-dark .card-remarks-label,
  .card-training .card-remarks-label {
    color: rgba(255,255,255,0.4);
  }

  /* Light cards: .card (layover, rest, hol) */
  .card .card-remarks {

  .card .card-remarks-tag   { color: var(--text-secondary); background: var(--bg); }

    .card .card-remarks-tag { background: #21262D; color: #8B949E; }

  /* TODAY FAB */
  .fab-today {
    position: fixed;
    bottom: max(24px, calc(16px + env(safe-area-inset-bottom)));
    right: max(20px, calc(12px + env(safe-area-inset-right)));
    z-index: 200;
    display: none;
    align-items: center;
    gap: 7px;
    background: #0F172A;
    color: #F1F5F9;
    border: none;
    border-radius: 20px;
    padding: 10px 16px 10px 13px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    transition: opacity 0.2s, transform 0.2s;
  }
  .fab-today:hover { background: #1E293B; transform: translateY(-1px); }
  .fab-today.visible { display: flex; }
  .fab-today svg { flex-shrink: 0; }

  /* TURNO connector — vertical line only in the gap between day-groups */
  .turno-wrap {
    position: relative;
  }
  /* The ::before covers only the bottom margin (gap to next card) */
  .turno-wrap::before {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 100%;
    height: 20px; /* matches margin-bottom of .day-group */
    width: 2px;
    background: #3B82F6;
    opacity: 0.35;
    pointer-events: none;
  }
  /* Last day: no line after it */
  .turno-wrap.turno-end::before {
    display: none;
  }

    align-items: flex-start;
    gap: 10px;
  }
  .day-label {
    flex-shrink: 0;

  .day-label-num {
    font-family: 'JetBrains Mono', monospace;

    flex: 1;
    min-width: 0;

  /* hide old mid/month/year elements */
  .day-label-mid, .day-label-month, .day-label-year { display: none; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; display: flex; margin-bottom: 8px;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card-bar { width: 4px; flex-shrink: 0; }
  .bar-flight   { background: var(--accent-flight); }
  .bar-sby      { background: var(--accent-sby); }
  .bar-off      { background: var(--accent-off); }
  .bar-layover  { background: var(--accent-layover); }
  .bar-dh       { background: var(--accent-dh); }
  .bar-rest     { background: #C4C4C4; }

  .card-body { padding: 12px 14px; flex: 1; min-width: 0; }
  .card-title {

  .card-row {

  .sep { color: var(--border); }
  .badge {

    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; white-space: nowrap;
  }
  .b-flight  { background: #EEF3FF; color: var(--accent-flight); }

  .debug-panel {
    background: var(--surface); border: 1px solid var(--border);

  }

    display: flex; align-items: center; gap: 8px;

  }
  .debug-chevron { margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
  .debug-chevron.open { transform: rotate(180deg); }
  .debug-content { display: none; padding: 0 14px 12px; }
  .debug-content.open { display: block; }
  .debug-line {
    font-size: 11px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace; padding: 2px 0;
    border-bottom: 1px solid var(--bg);
  }

  .scroll-progress {
    position: absolute; bottom: 0; left: 0; height: 2px;
    background: var(--accent-flight); z-index: 200; transition: width 0.1s;
  }
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text-muted); font-size: 13px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }

  /* ── MOBILE BASE (≤ 600px) ── */
  /* ══════════════════════════════════════════════════════════
     MOBILE — iPhone notch / Dynamic Island  (≤ 430px)

<script>
// ─────────────────────────────────────────────────────────────
// PDF.js
// ─────────────────────────────────────────────────────────────
if (typeof pdfjsLib !== 'undefined') {
  // Try to use the worker; fall back to main thread if unavailable
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  } catch(e) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = '';
  }
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const S = { schedule:[], showOnlyOff:false, allExpanded:false, search:'', unrecognized:[], crewName:'', rosterRange:'', printDate:'', flightHours:'', dayOff:'', sbYDays:'' };

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const parseTime = t => {
  if (!t) return null;
  t = String(t).trim().replace(/\./g,':');
  const m4 = t.match(/^(\d{2})(\d{2})$/);
  if (m4) return `${m4[1]}:${m4[2]}`;
  const m5 = t.match(/^(\d{1,2}):(\d{2})$/);
  if (m5) return `${m5[1].padStart(2,'0')}:${m5[2]}`;
  return null;
};

const timeDiff = (t1,t2) => {
  if (!t1||!t2) return '—';
  const tm = t => { const[h,m]=t.split(':').map(Number); return h*60+m; };
  let d = tm(t2)-tm(t1); if (d<0) d+=1440;
  return `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
};

const parseDDMMYYYY = s => {
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m ? `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` : null;
};

const MONTHS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const isoParts = iso => {
  if (!iso) return { d:'', mo:'', y:'' };
  const [y, mo, d] = iso.split('-');
  return { d, mo: MONTHS_EN[+mo-1], y };
};
const isoDisplayEN = iso => {
  if(!iso) return '';
  const[y,mo,d]=iso.split('-');
  return `${d} ${MONTHS_EN[+mo-1]} ${y}`;
};
const isoWD = iso => ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(iso+'T00:00:00Z').getUTCDay()];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ─────────────────────────────────────────────────────────────
// NEOS INDIVIDUAL PLAN PARSER
//
// PDF column layout (approximate char positions in extracted text):
//   DATE(0)  DUTY(16)  CkIn(47)  DH(55)  FLTN(61)  DEP(69)  ARR(76)
//   ETD(84)  ETA(91)   FH(101)   Hotel(111)  Remarks(118)
//
// Day patterns recognised:
//   dd/MM/yyyy  wd  OFF              → OFF day
//   dd/MM/yyyy  wd  LAYOVER          → Hotel layover day
//   dd/MM/yyyy  wd  Stand-by HH-HH   → Standby
//   dd/MM/yyyy  wd  ---              → Rest (unassigned)
//   dd/MM/yyyy  wd  ......  CkIn     → Flight day header (check-in on dotted line)
//
// Continuation lines (no date):
//   ......  CkIn                     → check-in time for next flight
//   <route> DH  DEP ARR ETD ETA      → deadhead / positioning leg
//            DH  DEP ARR ETD ETA     → deadhead (no route label)
//   FLTN  DEP  ARR  ETD  ETA  FH     → regular flight leg
//   FLTN  DEP  >    ETD              → multi-day departure (overnight)
//            >  ARR  ETA  FH         → multi-day arrival (next day)
// ─────────────────────────────────────────────────────────────

function hasIATAFn(s) { return /\b[A-Z]{3}\b\s+\b[A-Z]{3}\b/.test(s); }

// Split a raw line into main content + remarks
// Returns { main, remarks } — remarks is '' if none present
function splitRemarks(raw) {
  const idx = raw.indexOf('\t||');
  if (idx === -1) return { main: raw, remarks: '' };
  return { main: raw.slice(0, idx), remarks: raw.slice(idx + 3).trim() };
}

// Filter remarks: remove aircraft type tokens and empty/HTL-only strings
const ACTYPE_RE = /^(B737|B787|B767|A320|A321|A319|A330|HTL|--|LC|SLS|LT)$/i;
function cleanRemarks(raw) {
  if (!raw) return '';
  return raw.split(/\s+/)
    .filter(t => !ACTYPE_RE.test(t))
    .join(' ')
    .trim();
}

// Build remarks HTML block for any activity or leg
function remarksHtml(actOrLeg) {
  if (!actOrLeg) return '';
  const all = [];
  if (actOrLeg.remarks && actOrLeg.remarks.length) all.push(...actOrLeg.remarks);
  const uniq = [...new Set(all.map(r => r.trim()).filter(Boolean))];
  if (!uniq.length) return '';
  const tags = uniq.map(r => `<span class="card-remarks-tag">${esc(r)}</span>`).join('');
  return `<div class="card-remarks"><span class="card-remarks-label">Note</span>${tags}</div>`;
}

// Returns +1 if arrival time is less than departure (crossed midnight), else 0
function nightOffset(dep, arr) {
  if (!dep || !arr) return 0;
  const toMin = t => { const p = t.split(':'); return +p[0]*60 + +p[1]; };
  return toMin(arr) < toMin(dep) ? 1 : 0;
}

// Given a dateIso (YYYY-MM-DD) and offset in days, returns "dd MMM" string
function arrDateLabel(dateIso, offset) {
  if (!offset) return '';

          if (!last.remarks) last.remarks = [];
          if (!last.remarks.includes(r)) last.remarks.push(r);
        }
      }
    }
  }

  flushDay();
  schedule.sort((a,b) => a.dateIso.localeCompare(b.dateIso));
  return { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays };
}

// ── Parse a continuation (non-date) line
function parseCont(raw, day, pendingCI, addLeg, unrecognized, overnightRef, dateIso) {
  const t = raw.trim();
  if (!t) return;
  if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date)/i.test(t)) return;
  // Skip pure remark spill-overs
  if (/^(confermare|Galaxy Service|Biglietti|Wetlease|R B7)/i.test(t)) return;

  // ─ DH with route label + DH keyword: "MXP - LIN  DH  MXP  LIN  05:00  06:00"
  const dh1 = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})(?:\s+([A-Z]{2}\d{2,6}|\d{2,6}[A-Z]?))?\s+DH\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh1) {
    { const act = {
      type:'DH', dep:dh1[4], arr:dh1[5],
      etd:parseTime(dh1[6]), eta:parseTime(dh1[7]),
      routeLabel:`${dh1[1]} → ${dh1[2]}`,
      flightLabel: dh1[3] || null,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    if (dh1[3]) act.remarks = [dh1[1] + ' - ' + dh1[2] + ' ' + dh1[3]];
    // Deduplicate: skip if identical DH already exists on this day
    const dupDH = day.activities.find(a => a.type==='DH' && a.dep===act.dep && a.arr===act.arr && a.etd===act.etd);
    if (!dupDH) day.activities.push(act);
    return; }
  }

  // ─ DH without route label but with DH keyword: "   DH   MXP  LIN  05:00  06:00"
  const dh2 = raw.match(/\bDH\b\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh2) {
    const act2 = {
      type:'DH', dep:dh2[1], arr:dh2[2],
      etd:parseTime(dh2[3]), eta:parseTime(dh2[4]),
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    const dupDH2 = day.activities.find(a => a.type==='DH' && a.dep===act2.dep && a.arr===act2.arr && a.etd===act2.etd);
    if (!dupDH2) day.activities.push(act2);
    return;
  }

  // ─ Galaxy Service / positioning WITHOUT "DH" keyword
  // e.g. "MXP - LIN  MXP  LIN  05:00  06:00  Galaxy Service"
  // Pattern: "AAA - BBB  [spaces]  AAA  BBB  HH:MM  HH:MM"
  const dhGalaxy = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dhGalaxy) {
    const actG = {
      type:'DH', dep:dhGalaxy[3], arr:dhGalaxy[4],
      etd:parseTime(dhGalaxy[5]), eta:parseTime(dhGalaxy[6]),
      routeLabel:`${dhGalaxy[1]} → ${dhGalaxy[2]}`,
      service: /Galaxy/i.test(raw) ? 'Galaxy Service' : undefined,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    const dupG = day.activities.find(a => a.type==='DH' && a.dep===actG.dep && a.arr===actG.arr && a.etd===actG.etd);
    if (!dupG) day.activities.push(actG);
    return;
  }

  // ─ Regular flight leg: FLTN  DEP  ARR  ETD  ETA  FH
  //   e.g. "   787  MXP  JFK  12:30  21:25  08.55  HTL  R B787"
  //   e.g. "EXT 6674  MXP  RMF  16:40  21:00  04.20"  (FDP extended)
  const leg1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.:]\d{2})/);
  if (leg1) {
    addLeg({
      fltn: leg1[1],
      dep: leg1[2], arr: leg1[3],
      toUtc: parseTime(leg1[4]), ldgUtc: parseTime(leg1[5]),
      blockUtc: parseTime(leg1[6].replace('.',':')),
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw),
      acType: null, // set later from remarks column
      multiDay: false,
      ext: /\bEXT\b/.test(raw),
    }); return;
  }

  // ─ Multi-day departure: "  789  JFK  >  22:00"
  const legMD1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+>\s+(\d{1,2}:\d{2})/);
  if (legMD1) {
    const newLeg = {
      fltn: legMD1[1], dep: legMD1[2], arr: '→',
      toUtc: parseTime(legMD1[3]), ldgUtc: null, blockUtc: null,
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw), multiDay: true,
      acType: null, // set later from remarks column
      ext: /\bEXT\b/.test(raw),
    };
    addLeg(newLeg);
    if (overnightRef) overnightRef.leg = newLeg; // mark as open overnight leg
    return;
  }

  // ─ Multi-day arrival: "      >  MXP  06:00  08.00"
  const legMD2 = raw.match(/>\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.]\d{2})/);
  if (legMD2) {
    const openLeg = overnightRef && overnightRef.leg;
    if (openLeg) {
      // Add an arrival-only leg to today's day (dep=null signals "continuation from yesterday")
      addLeg({
        fltn: openLeg.fltn, dep: null, arr: legMD2[1],
        toUtc: null, ldgUtc: parseTime(legMD2[2]),
        blockUtc: parseTime(legMD2[3].replace('.',':')),
        checkInUtc: null, hotel: openLeg.hotel,
        acType: openLeg.acType, multiDay: false,
      });
      if (overnightRef) overnightRef.leg = null; // close
    } else {
      // No open leg — standalone arrival segment
      addLeg({
        fltn: '—', dep: null, arr: legMD2[1],
        toUtc: null, ldgUtc: parseTime(legMD2[2]),
        blockUtc: parseTime(legMD2[3].replace('.',':')),
        checkInUtc: null, hotel: false, multiDay: false,
      });
    }
    return;
  }

  // ─ Fallback
  if (t.length > 5 && !/^[.]{5,}/.test(t)) {
    unrecognized.push(`[${day.dateIso}] ${t}`);
  }
}

// ─────────────────────────────────────────────────────────────
// PDF TEXT EXTRACTION — reconstruct line layout from pdf.js items
// ─────────────────────────────────────────────────────────────
async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const ct = await page.getTextContent();

    // Step 1: collect all items (skip markers that have no .str or .transform)
    const allItems = [];
    for (const item of ct.items) {
      if (!item.str || !item.transform) continue;
      if (!item.str.trim()) continue;
      allItems.push({ str: item.str, x: item.transform[4], y: item.transform[5] });
    }

    // Step 2: bucket items by rounded Y (round to nearest 8pt — NEOS rows differ up to 6pt on same line, row spacing ~12pt to tolerate PDF sub-pixel jitter)
    const buckets = {};
    for (const it of allItems) {
      const yKey = Math.round(it.y / 8) * 8;
      if (!buckets[yKey]) buckets[yKey] = [];
      buckets[yKey].push(it);
    }

    // Step 3: sort buckets top→bottom
    // pdf.js uses native PDF coords: Y=0 at bottom, increases upward → higher Y = earlier in document
    const sortedYs = Object.keys(buckets).map(Number).sort((a, b) => b - a);

    // Step 4: for each row, sort items left→right
    // Split at X≈450: left = main content, right = remarks column
    const REMARKS_X = 435;
    const pageLines = sortedYs.map(y => {
      const items = buckets[y].sort((a, b) => a.x - b.x);
      const main    = items.filter(it => it.x <  REMARKS_X).map(it => it.str).join(' ');
      const remarks = items.filter(it => it.x >= REMARKS_X).map(it => it.str).join(' ').trim();
      if (remarks && remarks !== 'Hotel Remarks' && remarks !== 'Remarks') {
        return main + (main ? '\t||' : '') + remarks;
      }
      return main;
    }).filter(l => l.trim());

    pages.push(pageLines.join('\n'));
  }
  return pages.join('\n\f\n');
}

let _iataToastTimer = null;
let _iataToastIata = null; // IATA currently shown in toast

function _iataLocalTime(tz) {
  try {
    const offsetStr = tz.replace('UTC','').trim();
    const parts = offsetStr.replace('+','').split(':').map(Number);
    const sign = offsetStr.startsWith('-') ? -1 : 1;
    const totalMin = sign * ((Math.abs(parts[0])||0)*60 + (parts[1]||0));
    const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
    const local = new Date(utcMs + totalMin * 60000);
    return local.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', hour12:false });
  } catch(e) { return ''; }
}

function closeIataPopup() {
  clearTimeout(_iataToastTimer);
  _iataToastIata = null;
  const t = document.getElementById('iataToast');

}

function showIataPopup(iataEl, iata) {
  const tz = IATA_TZ[iata];

  clearTimeout(_iataToastTimer);

  const localTime = _iataLocalTime(tz);

  const tc = document.getElementById('iataToastCode');

}

async function processPDF(file) {
  showLoading();
  try {
    if (typeof pdfjsLib === 'undefined') {
      throw new Error('pdf.js non caricato. Controlla la connessione internet e ricarica la pagina.');
    }
    const text = await extractText(file);
    if (!text || text.trim().length < 20) {
      throw new Error('Testo estratto vuoto. Il PDF potrebbe essere una scansione o protetto.');
    }
    window._lastRosterText = text;
    // DEBUG: log lines as parser sees them (after possible reversal)
    const _debugLines = text.split('\n').filter(l => l.trim());
    console.log('=== ROSTER LINES (' + _debugLines.length + ') ===');
    _debugLines.forEach((l,i) => console.log(i, JSON.stringify(l)));
    const { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays } = parseNeosRoster(text);
    console.log('=== SCHEDULE ===', schedule.map(d => d.dateIso + ' ' + d.activities.map(a=>a.type).join(',')));
    if (schedule.length === 0) {
      hideLoading();
      alert('Nessun dato riconosciuto nel PDF.\n\nAssicurati che sia un Individual Plan con testo selezionabile.');
      return;
    }
    Object.assign(S, { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays });
    // Persist for next session
    try {
      localStorage.setItem('crewroster_text', text);
      localStorage.setItem('crewroster_filename', file?.name || '');
    } catch(e) { /* storage full or unavailable */ }
    showTimeline();
  } catch (err) {
    hideLoading();
    alert('Errore caricamento PDF:\n' + err.message);
    console.error('processPDF error:', err);
  }
}


// ─────────────────────────────────────────────────────────────
// TURNO SUMMARY BANNER
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// TURNO COLLAPSIBLE BLOCK builder
// td: { route, dhRoute, totalFH, nLayover, acTypes, startIso, endIso, days[] }
// ─────────────────────────────────────────────────────────────
function buildTurnoBlock(td) {
  const IT_M = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
  const fmtD = iso => { const [,mo,d] = iso.split('-'); return d+' '+IT_M[+mo-1]; };

  // ── Build route rows from segments in chronological order
  // Rule: DH and VOL on the SAME day → same row (inline, DH greyed)
  //       DH on a different day → its own row
  const segs = td.segments || [];

  // Helper: render a deduplicated IATA chain with mixed styling
  // items = [{iata, dh}]
  const chainHtml = items => {
    const parts = [];
    let last = null;
    for (const {iata, dh} of items) {
      if (!iata || iata === last) continue;
      const cls = dh ? ' dh' : '';
      if (parts.length) parts.push(`<span class="tba-sep${cls}">›</span>`);
      parts.push(`<span class="tba-iata${cls}">${esc(iata)}</span>`);
      last = iata;
    }
    return parts.join('');
  };

  // Group segments by day, preserving order
  // dayGroups: [{dayIdx, segs:[]}]  in order of first appearance
  const dayGroups = [];
  const dayIdxMap = new Map();
  for (const s of segs) {
    if (!dayIdxMap.has(s.dayIdx)) {
      dayIdxMap.set(s.dayIdx, dayGroups.length);
      dayGroups.push({ dayIdx: s.dayIdx, segs: [] });
    }
    dayGroups[dayIdxMap.get(s.dayIdx)].segs.push(s);
  }

  // Build rows in chronological order.
  // Within each day-group: group consecutive same-kind segs into runs.
  // VOL+DH (or DH+VOL) consecutive within same day → merged on one row.
  // 'office' segs always get their own row, never merged.
  const rows = []; // [{kind, dayIdx, items?, volItems?, dhItems?}]

  for (const dg of dayGroups) {
    // Collect runs within this day
    const dayRuns = []; // [{kind, items}]
    let rKind = null, rItems = [];
    const flushDayRun = () => {
      if (!rKind) return;
      dayRuns.push({ kind: rKind, items: rKind === 'office' ? [] : [...rItems] });
      rKind = null; rItems = [];
    };
    for (const s of dg.segs) {
      const k = s.office ? 'office' : (s.onDuty ? 'vol' : 'dh');
      if (k !== rKind) flushDayRun();
      rKind = k;
      if (k !== 'office') {
        if (s.from) rItems.push({ iata: s.from, dh: k === 'dh' });
        if (s.to)   rItems.push({ iata: s.to,   dh: k === 'dh' });
      }
    }
    flushDayRun();

    // Merge adjacent VOL+DH or DH+VOL runs (same day, no office between them)
    for (let ri = 0; ri < dayRuns.length; ri++) {
      const r = dayRuns[ri], rn = dayRuns[ri + 1];
      if (r.kind !== 'office' && rn && rn.kind !== 'office' && r.kind !== rn.kind) {
        // Two adjacent flight runs of different type → same row
        const isVolFirst = r.kind === 'vol';
        rows.push({
          kind: 'mixed',
          volFirst: isVolFirst,
          volItems: isVolFirst ? r.items : rn.items,
          dhItems:  isVolFirst ? rn.items : r.items,
          dayIdx: dg.dayIdx,
        });
        ri++; // consume rn
      } else {
        rows.push({ kind: r.kind, items: r.items, dayIdx: dg.dayIdx });
      }
    }
  }

  const routeBlockHtml =
    `<div class="tba-route-rows">` +
    rows.map(row => {
      if (row.kind === 'office') {
        return `<div class="tba-route-row">` +
          `<span class="tba-row-label tba-row-label-office">PRACTICAL TRAINING</span>` +
        `</div>`;
      }
      if (row.kind === 'mixed') {
        const firstLbl  = row.volFirst ? 'VOL' : 'DH';
        const firstCls  = row.volFirst ? '' : ' tba-row-label-dh';
        const firstChain = chainHtml(row.volFirst ? row.volItems : row.dhItems);
        const secondLbl  = row.volFirst ? 'DH' : 'VOL';
        const secondCls  = row.volFirst ? ' tba-row-label-dh' : '';
        const secondChain = chainHtml(row.volFirst ? row.dhItems : row.volItems);
        return `<div class="tba-route-row">` +
          `<span class="tba-row-label${firstCls}">${firstLbl}</span>` +
          `<div class="tba-route-seq">${firstChain}</div>` +
          `<span class="tba-row-label${secondCls}" style="margin-left:6px">${secondLbl}</span>` +
          `<div class="tba-route-seq">${secondChain}</div>` +
        `</div>`;
      }
      const lbl    = row.kind === 'vol' ? 'VOL' : 'DH';
      const lblCls = row.kind === 'dh'  ? ' tba-row-label-dh' : '';
      return `<div class="tba-route-row">` +
        `<span class="tba-row-label${lblCls}">${lbl}</span>` +
        `<div class="tba-route-seq">${chainHtml(row.items)}</div>` +
      `</div>`;
    }).join('') +
    `</div>`;

  // ── Pills: ore volo, layover, actype
  let pillsHtml =
    (td.totalFH ? `<div class="tba-pill"><span class="tba-pill-val">${esc(td.totalFH)}</span><span class="tba-pill-lbl">Ore volo</span></div>` : '') +
    `<div class="tba-pill"><span class="tba-pill-val">${td.nLayover}</span><span class="tba-pill-lbl">Layover</span></div>`;
  if (td.acTypes.length)
    pillsHtml += `<div class="tba-pill"><span class="tba-pill-val">${td.acTypes.map(esc).join('/')}</span><span class="tba-pill-lbl">A/C</span></div>`;

  const block = document.createElement('div');
  block.className = 'turno-block' + (S.allExpanded ? ' expanded' : '');
  block.dataset.turnoStart = td.startIso;

  const header = document.createElement('div');
  header.className = 'turno-block-header';
  header.innerHTML =
    `<div class="tba-top-row">` +
      `<span class="turno-block-label">Turno</span>` +
      `<span class="turno-block-dates">${fmtD(td.startIso)} – ${fmtD(td.endIso)}</span>` +
      `<div class="turno-block-pills">${pillsHtml}</div>` +
      `<svg class="turno-block-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>` +
    `</div>` +
    `<div class="tba-bottom-row">${routeBlockHtml}</div>`;
  header.addEventListener('click', () => block.classList.toggle('expanded'));

  const body = document.createElement('div');
  body.className = 'turno-block-body';

  // Append day-groups for each day in this turno
  for (const dayGroup of td.dayGroups) {
    body.appendChild(dayGroup);
  }

  block.appendChild(header);
  block.appendChild(body);
  return block;
}

// ─────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────
function renderSchedule() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const filtered = S.schedule.filter(day => {
    if (S.showOnlyOff) {
      if (!day.activities.some(a => ['OFF','OFF_R','HOL'].includes(a.type))) return false;
    }
    if (S.search) return JSON.stringify(day).toLowerCase().includes(S.search);
    return true;
  });

  if (!filtered.length) {
    tl.innerHTML = `<div class="empty-state">Nessuna attività corrisponde ai filtri.</div>`;
    return;
  }

  const first = filtered[0];
  // Month + year from roster (Italian, uppercase)
  const _IT_MONTHS = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO',
    'LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
  const _rosterIso = first.dateIso; // e.g. "2026-03-01"
  const _rMonth = parseInt(_rosterIso.slice(5,7),10) - 1;
  const _rYear  = _rosterIso.slice(0,4);
  document.getElementById('headerDate').textContent = _IT_MONTHS[_rMonth] + ' ' + _rYear;
  document.getElementById('headerMeta').textContent = 'INDIVIDUAL PLAN · UTC';
  if (S.flightHours || S.dayOff || S.sbYDays) {
    document.getElementById('statFH').textContent  = S.flightHours || '—';
    document.getElementById('statOFF').textContent = S.dayOff      || '—';
    document.getElementById('statSBY').textContent = S.sbYDays     || '—';
    document.getElementById('headerStats').style.display = 'flex';
  }
  startCountdown();

  // ── Compute turno spans
  // A turno is: FLIGHT/DH day → ≥1 LAYOVER days → FLIGHT/DH day
  const turnoRole = new Map();
  const turnoData = new Map(); // startIso → summary object

  // Sum blockUtc "HH:MM" strings → "HH:MM"
  const sumBlock = legs => {
    let mins = 0;
    for (const l of legs) {
      if (!l.blockUtc) continue;
      const [h, m] = l.blockUtc.split(':').map(Number);
      if (!isNaN(h)) mins += h * 60 + m;
    }
    return mins ? String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0') : null;
  };

  const dayTypes = d => new Set(d.activities.map(a => a.type));

  // A FLIGHT day that contains ONLY overnight-arrival legs (dep===null) is a
  // "continuation day" — it belongs to the previous duty, not a standalone flight day.
  // Example: 10/10 has leg {dep:null, arr:'NKG'} — the arrival of the 09/10 overnight.
  const isContinuationOnly = d =>
    dayTypes(d).has('FLIGHT') &&
    d.activities.every(a => a.type !== 'FLIGHT' || a.legs.every(l => l.dep === null));

  // Helper: is this day a "duty day" (has FLIGHT or DH, excluding pure continuation arrivals)
  // NOTE: TRAINING/office days are NOT duty days — they don't trigger turno blocks
  const isDutyDay = d =>
    dayTypes(d).has('DH') ||
    (dayTypes(d).has('FLIGHT') && d.activities.some(a => a.type === 'FLIGHT' && a.legs.some(l => l.dep !== null)));

  // Build turno spans: any contiguous block of duty/layover/continuation days
  // Algorithm: scan filtered[], group consecutive days that are duty or layover or continuation-only.
  // Each such group becomes a turno block if it has at least one duty day.
  const alreadyInTurno = new Set();

  for (let i = 0; i < filtered.length; i++) {
    if (alreadyInTurno.has(filtered[i].dateIso)) continue;

    const dt = dayTypes(filtered[i]);
    // Start only on a real duty day (FLIGHT with real dep, or DH)
    if (!isDutyDay(filtered[i])) continue;

    // Walk forward: expand span across duty days, layovers, and continuation-only days
    let e = i;
    while (e + 1 < filtered.length) {
      const next = filtered[e + 1];
      const ndt = dayTypes(next);
      if (ndt.has('LAYOVER') || isDutyDay(next) || isContinuationOnly(next)) {
        e++;
      } else {
        break;
      }
    }

    // The span is filtered[i..e]. Mark roles.
    // s = first duty day, e_last = last duty/continuation day
    turnoRole.set(filtered[i].dateIso, 'start');
    for (let k = i + 1; k < e; k++) turnoRole.set(filtered[k].dateIso, 'mid');
    if (e > i) turnoRole.set(filtered[e].dateIso, 'end');

    for (let k = i; k <= e; k++) alreadyInTurno.add(filtered[k].dateIso);

    // ── Collect ALL legs across full span [i..e] (including continuation days)
    const flightLegs = [];
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) flightLegs.push(...act.legs);
      }
    }

    // ── routeParts: sequence [{iata, dh}]
    // Build ordered list of segments, then clip to [firstOnDuty..lastOnDuty].
    // Everything before firstOnDuty and after lastOnDuty is greyed as DH.
    //
    // Overnight legs: dep=IATA arr='→' on day N; continuation leg dep=null arr=IATA on day N+1.
    // We pair them: overnight dep becomes from, continuation arr becomes to.
    // Step 1: collect all continuation arrivals keyed by day index (for lookup)
    const _contArrs = new Map(); // dayIdx → arr IATA of continuation leg
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) {
          for (const l of act.legs) {
            if (l.dep === null && l.arr && l.arr !== '→' && l.arr !== '—')
              _contArrs.set(k, l.arr); // e.g. day k has continuation arrival ZNZ
          }
        }
      }
    }
    // Step 2: build segments in order — include dayIdx for same-day grouping
    const _segments = []; // [{from, to, onDuty, dayIdx}]
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) {
          for (const l of act.legs) {
            // Skip degenerate legs (no real IATA dep) and training-derived legs
            if (!l.dep || l.dep === '→') continue;
            if (!/^[A-Z]{3}$/.test(l.dep)) continue; // must be a real IATA
            if (l.arr && l.arr !== '→' && l.arr !== '—') {
              if (!/^[A-Z]{3}$/.test(l.arr)) continue; // arr must also be real IATA
              _segments.push({ from: l.dep, to: l.arr, onDuty: true, dayIdx: k });
            } else if (l.arr === '→') {
              const contArr = _contArrs.get(k + 1) || null;
              _segments.push({ from: l.dep, to: contArr, onDuty: true, dayIdx: k });
            }
          }
        }
        if (act.type === 'DH' && act.dep && act.arr) {
          _segments.push({ from: act.dep, to: act.arr, onDuty: false, dayIdx: k });
        }
        if (act.type === 'TRAINING') {
          _segments.push({ from: null, to: null, onDuty: false, office: true, dayIdx: k });
        }
      }
    }
    // Find first and last on-duty segment index
    const _firstOD = _segments.findIndex(s => s.onDuty);
    const _lastOD  = _segments.reduce((acc,s,idx) => s.onDuty ? idx : acc, -1);
    // Build routeParts: segments outside [_firstOD.._lastOD] are DH (grey)
    const routeParts = [];
    const _pushRP = (iata, dh) => {
      if (!iata) return;
      if (routeParts.length && routeParts[routeParts.length-1].iata === iata) return;
      routeParts.push({ iata, dh });
    };
    _segments.forEach((s, idx) => {
      const grey = _firstOD < 0 || idx < _firstOD || idx > _lastOD;
      _pushRP(s.from, grey);
      if (s.to) _pushRP(s.to, grey);
    });

    // ── Flight hours: completed legs only (arr !== '→')
    const completedLegs = flightLegs.filter(l => l.arr && l.arr !== '→');
    const totalFH = sumBlock(completedLegs);

    // ── Aircraft types from all flight legs
    const acTypes = [...new Set(flightLegs.map(l => l.acType).filter(Boolean))];

    // ── Layover count
    const nLayover = filtered.slice(i + 1, e).filter(d => dayTypes(d).has('LAYOVER')).length;

    // ── End date: last day in span
    const endIso = filtered[e].dateIso;

    // DEBUG — rimuovere dopo verifica
    if (filtered[i].dateIso === '2026-03-12' || filtered[i].dateIso === '2026-03-09') {
      console.log('TURNO', filtered[i].dateIso, '→', endIso, '_segments:', JSON.stringify(_segments));
    }
    turnoData.set(filtered[i].dateIso, {
      routeParts, segments: _segments, totalFH, acTypes, nLayover,
      startIso: filtered[i].dateIso, endIso,
      span: [i, e],
    });
  }

  // ── Build day-groups, then wrap turno spans in collapsible blocks
  // Pass 1: build all day-groups keyed by dateIso
  const dayGroupMap = new Map(); // dateIso → DOM element
  for (const day of filtered) {
    const g = document.createElement('div');
    const _role = turnoRole.get(day.dateIso);
    g.className = 'day-group' + (_role ? ' turno-wrap turno-' + _role : '');
    g.dataset.date = day.dateIso;
    const _p = isoParts(day.dateIso);
    const _WD_IT = {SUN:'Dom',MON:'Lun',TUE:'Mar',WED:'Mer',THU:'Gio',FRI:'Ven',SAT:'Sab',
                     mo:'Lun',tu:'Mar',we:'Mer',th:'Gio',fr:'Ven',sa:'Sab',su:'Dom'};
    const _wdIt = _WD_IT[day.weekdayLabel] || day.weekdayLabel;
    g.innerHTML = `
      <div class="day-label">
        <span class="day-label-num">${_p.d}</span>
        <span class="day-label-wd">${_wdIt}</span>
      </div>
      <div class="day-cards"></div>
    `;
    const _cardsEl = g.querySelector('.day-cards');
    for (const act of day.activities) {
      const el = renderAct(act);
      if (el) _cardsEl.appendChild(el);
    }
    dayGroupMap.set(day.dateIso, g);
  }

  // Pass 2: emit into timeline — turno days wrapped in blocks, others direct
  const emittedDates = new Set();
  for (const day of filtered) {
    if (emittedDates.has(day.dateIso)) continue;
    const _role = turnoRole.get(day.dateIso);

    if (_role === 'start' && turnoData.has(day.dateIso)) {
      const td = turnoData.get(day.dateIso);
      const [s, e] = td.span;
      // Collect all day-groups for this turno span in order
      const dayGroups = [];
      for (let k = s; k <= e; k++) {
        const iso = filtered[k].dateIso;
        if (dayGroupMap.has(iso)) {
          dayGroups.push(dayGroupMap.get(iso));
          emittedDates.add(iso);
        }
      }
      td.dayGroups = dayGroups;
      tl.appendChild(buildTurnoBlock(td));
    } else {
      tl.appendChild(dayGroupMap.get(day.dateIso));
      emittedDates.add(day.dateIso);
    }
  }

  // ── Inject DH arrival cards into the following day-group
  // A DH that crosses midnight has its departure on day N and arrival on day N+1.
  // The parser doesn't split DH legs, so we synthesise the arrival card here.
  // Use dayGroupMap (iso→el) for reliable lookup regardless of turno-block nesting.
  for (let fi = 0; fi < filtered.length - 1; fi++) {
    const dayObj = filtered[fi];
    for (const act of dayObj.activities) {
      if (act.type === 'DH' && act.dep && act.arr && nightOffset(act.etd, act.eta) > 0) {
        const ghost = {
          type: 'DH',
          dep: null, arr: act.arr,
          etd: null, eta: act.eta,
          checkInUtc: null,
          flightLabel: act.flightLabel || null,
          trainLabel: act.trainLabel || null,
          service: act.service || null,
          remarks: act.remarks || null,
          dateIso: filtered[fi + 1].dateIso,
        };
        const ghostEl = renderDH(ghost);
        const nextGroup = dayGroupMap.get(filtered[fi + 1].dateIso);
        if (!nextGroup) continue;
        const cardsCol = nextGroup.querySelector('.day-cards') || nextGroup;
        const firstCard = cardsCol.querySelector('.card-dh-dark, .card-flight-dark, .card, .card-off-dark');
        if (firstCard) cardsCol.insertBefore(ghostEl, firstCard);
        else cardsCol.appendChild(ghostEl);
      }
    }
  }

  if (S.unrecognized.length > 0) {
    const dp = document.createElement('div');
    dp.className = 'debug-panel';
    dp.innerHTML = `
      <div class="debug-header" onclick="toggleDebug(this)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span class="debug-title">Righe non riconosciute</span>
        <span class="debug-badge">${S.unrecognized.length}</span>
        <svg class="debug-chevron" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="debug-content">
        ${S.unrecognized.map(l=>`<div class="debug-line">${esc(l)}</div>`).join('')}
      </div>
    `;
    tl.appendChild(dp);
  }
}

function renderAct(act) {
  switch(act.type) {
    case 'FLIGHT':  return renderFlight(act);
    case 'SBY':     return renderSby(act);
    case 'TRAINING': return renderTraining(act);
    case 'OFF':     return renderOff(act);
    case 'OFF_R':   return renderOffR(act);
    case 'HOL':     return renderHol(act);
    case 'REST':    return renderRest();
    case 'LAYOVER': return renderLayover();
    case 'DH':      return renderDH(act);
    default:        return null;
  }
}

// ── FLIGHT
function renderFlight(act) {
  const frag = document.createDocumentFragment();
  for (let i=0; i<act.legs.length; i++) {
    const leg = act.legs[i];
    if (i > 0) {
      const prev = act.legs[i-1];
      if (prev.ldgUtc && leg.toUtc) {
        const gt = timeDiff(prev.ldgUtc, leg.toUtc);
        const gtEl = document.createElement('div');
        gtEl.className = 'ground-time';
        gtEl.textContent = 'TURNAROUND TIME · ' + gt;
        frag.appendChild(gtEl);
      }
    }
    const fltn = leg.fltn && leg.fltn !== '—' ? 'NO ' + leg.fltn : '—';
    const badges = [
      leg.ext   ? '<span class="cfd-badge-ext">⚡ EXT</span>' : '',
      leg.hotel ? '<span class="cfd-badge-htl">🏨 HTL</span>' : '',
    ].filter(Boolean).join('');
    const card = document.createElement('div');
    card.className = 'card-flight-dark';
    // Split card rendering based on whether this leg crosses midnight
    const isCont = !leg.dep && leg.arr;   // continuation (arrival-only) leg
    const isDepart = leg.multiDay === true; // departure-only leg (open overnight)
    let rightHtml;
    if (isDepart) {
      // Departure card: DEP STD → arrow → midnight indicator
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.dep) + '</div>' +
          '<div class="cfd-time">' + (leg.toUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STD</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          (leg.blockUtc ? '<span class="cfd-fh">' + leg.blockUtc + '</span>' : '') +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata cfd-iata-cont">···</div>' +
          '<div class="cfd-time" style="opacity:0.35">—</div>' +
          '<div class="cfd-lbl">→ +1</div>' +
        '</div>';
    } else if (isCont) {
      // Arrival card: continuation from previous day
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata cfd-iata-cont">···</div>' +
          '<div class="cfd-time" style="opacity:0.35">—</div>' +
          '<div class="cfd-lbl">← −1</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.arr) + '</div>' +
          '<div class="cfd-time">' + (leg.ldgUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STA</div>' +
        '</div>';
    } else {
      // Normal same-day leg
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.dep) + '</div>' +
          '<div class="cfd-time">' + (leg.toUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STD</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          (leg.blockUtc ? '<span class="cfd-fh">' + leg.blockUtc + '</span>' : '') +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.arr) + '</div>' +
          '<div class="cfd-time">' + (leg.ldgUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STA</div>' +
        '</div>';
    }
    card.innerHTML =
      '<div style="display:flex">' +
        '<div class="cfd-left">' +
          '<div class="cfd-fltn">' + esc(fltn) + '</div>' +
          '<div class="cfd-meta">' +
            '<span class="cfd-ci-label">CI</span>' +
            '<span class="cfd-ci">' + (leg.checkInUtc || '—') + '</span>' +
          '</div>' +
          (leg.acType ? '<span class="cfd-ac">' + esc(leg.acType) + '</span>' : '') +
          (badges ? '<div class="cfd-badges">' + badges + '</div>' : '') +
        '</div>' +
        '<div class="cfd-divider"></div>' +
        '<div class="cfd-right">' + rightHtml + '</div>' +
      '</div>';
    const fr = remarksHtml(leg);
    if (fr) card.insertAdjacentHTML('beforeend', fr);
    frag.appendChild(card);
  }
  return frag;
}

// ── OFF RICHIESTO
function renderOffR(act) {
  const c = document.createElement('div');
  c.className = 'card-off-dark';
  c.innerHTML =
    '<div class="off-left">' +
      '<div class="off-code">OFF</div>' +
      '<div class="off-label">RICHIESTO</div>' +
    '</div>';
  const r = remarksHtml(act);
  if (r) c.insertAdjacentHTML('beforeend', r);
  return c;
}

// ── FERIE
function renderHol(act) {
  const c = document.createElement('div');
  c.className = 'card-off-dark';
  c.style.background = '#059669';
  c.style.boxShadow  = '0 2px 8px rgba(5,150,105,0.30)';
  c.innerHTML =
    '<div class="off-left" style="background:#047857">' +
      '<div class="off-code" style="font-size:20px">🌴 FERIE</div>' +
      '<div class="off-label">HOLIDAYS</div>' +
    '</div>';
  const r = remarksHtml(act);
  if (r) c.insertAdjacentHTML('beforeend', r);

}

// ── TRAINING / OFFICE DUTY
function renderTraining(act) {
  const c = document.createElement('div');
  c.className = 'card-training';
  const itemsHtml = act.sessions.map((s, i) =>
    (i > 0 ? '<div class="trn-divider"></div>' : '') +
    '<div class="trn-item">' +
      '<div class="trn-item-name">' + esc(s.name) + '</div>' +
      (s.start ? '<div class="trn-item-times">' + s.start + (s.end ? ' – ' + s.end : '') + '</div>' : '') +
      (s.loc ? '<div class="trn-item-loc">' + esc(s.loc) + '</div>' : '') +
    '</div>'
  ).join('');
  c.innerHTML =
    '<div class="trn-left">' +
      '<div class="trn-code">OFFICE DUTY</div>' +
      (act.location ? '<div class="trn-sub">' + esc(act.location) + '</div>' : '') +
    '</div>' +
    '<div class="trn-right">' + itemsHtml + '</div>';
  const tr = remarksHtml(act);
  if (tr) c.insertAdjacentHTML('beforeend', tr);
  return c;
}

// ── SBY
function _sbyCoreCard(timeHtml, extraRemarks) {
  const c = document.createElement('div'); c.className = 'card-sby-dark';
  c.innerHTML =
    '<div class="sby-left">' +
      '<div class="sby-code">SBY</div>' +
      '<div class="sby-label">STANDBY</div>' +
    '</div>' +
    '<div class="sby-right">' +
      '<div class="sby-times">' + timeHtml + '<span class="sby-utc">UTC</span></div>' +
    '</div>';
  if (extraRemarks) c.insertAdjacentHTML('beforeend', extraRemarks);
  return c;
}
function renderSby(act) {
  if (act.openEnd) {
    // Parser already flagged as open-end: "HH:MM →" on departure day
    const timeHtml =
      '<span class="sby-time">' + act.startUtc + '</span>' +
      '<span class="sby-sep">→</span>' +
      '<span class="sby-time sby-overflow">+1</span>';
    const c = _sbyCoreCard(timeHtml, null);
    const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
    return c;
  }
  if (act.openStart) {
    // Parser already flagged as open-start: "← HH:MM" on arrival day
    const timeHtml =
      '<span class="sby-time sby-overflow">←</span>' +
      '<span class="sby-sep"></span>' +
      '<span class="sby-time">' + act.endUtc + '</span>';
    const c = _sbyCoreCard(timeHtml, null);
    const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
    return c;
  }
  // Full SBY: check if it crosses midnight (endUtc < startUtc as strings, e.g. "02:00" < "22:00")
  const crossMid = act.startUtc && act.endUtc && act.endUtc < act.startUtc;
  if (crossMid) {
    // Split into two cards: departure side + arrival side
    const frag = document.createDocumentFragment();
    const depHtml =
      '<span class="sby-time">' + act.startUtc + '</span>' +
      '<span class="sby-sep">→</span>' +
      '<span class="sby-time sby-overflow">+1</span>';
    const arrHtml =
      '<span class="sby-time sby-overflow">←</span>' +
      '<span class="sby-sep"></span>' +
      '<span class="sby-time">' + act.endUtc + '</span>';
    frag.appendChild(_sbyCoreCard(depHtml, null));
    const arrCard = _sbyCoreCard(arrHtml, null);
    const sr = remarksHtml(act); if (sr) arrCard.insertAdjacentHTML('beforeend', sr);
    frag.appendChild(arrCard);
    return frag;
  }
  // Normal same-day SBY
  const timeHtml =
    '<span class="sby-time">' + (act.startUtc||'—') + '</span>' +
    '<span class="sby-sep">–</span>' +
    '<span class="sby-time">' + (act.endUtc||'—') + '</span>';
  const c = _sbyCoreCard(timeHtml, null);
  const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
  return c;
}

function scrollToToday(animated) {
  const todayIso = new Date().toISOString().slice(0, 10);
  const groups = document.querySelectorAll('.day-group[data-date]');
  if (!groups.length) return;
  const dates = [...groups].map(g => g.dataset.date).sort();
  const rosterStart = dates[0], rosterEnd = dates[dates.length - 1];
  let targetDate;
  if (todayIso >= rosterStart && todayIso <= rosterEnd) {
    targetDate = dates.find(d => d >= todayIso) || rosterStart;
  } else {
    targetDate = rosterStart;
  }
  const target = document.querySelector(`.day-group[data-date="${targetDate}"]`);
  if (!target) return;

  const doScroll = () => {
    const headerH = document.querySelector('.header')?.offsetHeight || 70;
    const dest = target.getBoundingClientRect().top + window.scrollY - headerH - 12;

    if (animated === false) {
      window.scrollTo({ top: dest, behavior: 'instant' });
      return;
    }

    // Custom easing: ease-out-expo — fast start, decelerates smoothly to stop
    const start = window.scrollY;
    const delta = dest - start;
    const duration = Math.min(900, Math.max(300, Math.abs(delta) * 0.4));
    let startTime = null;

    const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

    const step = ts => {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const progress = Math.min(elapsed / duration, 1);
      window.scrollTo(0, start + delta * easeOutExpo(progress));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  };

  // Initial load: instant; FAB click: animated
  if (animated === false) { setTimeout(doScroll, 50); } else { doScroll(); }
}

// COUNTDOWN — next duty check-in
// ─────────────────────────────────────────────────────────────
let _cdTimer = null;
function startCountdown() {
  if (_cdTimer) clearInterval(_cdTimer);

  // Build a flat list of { dateIso, checkInUtc } from all activities
  function nextCheckIn() {
    const now = new Date();
    // Collect all upcoming check-in times from the schedule
    const candidates = [];
    for (const day of S.schedule) {
      for (const act of day.activities) {
        // Gather check-in time from various activity types
        const ci = act.checkInUtc   // DH, FLIGHT legs carry this
          || (act.legs && act.legs.length && act.legs[0].checkInUtc)
          || (act.type === 'SBY' && act.startUtc)
          || (act.type === 'TRAINING' && act.sessions && act.sessions.length && act.sessions[0].start);
        if (!ci) continue;
        // Parse: dateIso = "2026-03-12", ci = "HH:MM"
        const [h, m] = ci.split(':').map(Number);
        if (isNaN(h) || isNaN(m)) continue;
        const dt = new Date(day.dateIso + 'T' + ci + ':00Z'); // UTC
        if (dt > now) candidates.push({ dt, act, day });
      }
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.dt - b.dt);
    return candidates[0];
  }

  function tick() {
    const next = nextCheckIn();
    const el = document.getElementById('headerCountdown');
    const val = document.getElementById('countdownValue');
    const lbl = document.getElementById('countdownLabel');
    if (!next || !el || !val) return;

    const now = new Date();
    let diff = Math.max(0, Math.floor((next.dt - now) / 1000));

    const dd = Math.floor(diff / 86400);
    diff -= dd * 86400;
    const hh = Math.floor(diff / 3600);
    diff -= hh * 3600;
    const mm = Math.floor(diff / 60);
    const ss = diff % 60;

    const pad = n => String(n).padStart(2,'0');
    val.textContent = `${pad(dd)}:${pad(hh)}:${pad(mm)}:${pad(ss)}`;

    // Imminent = less than 2 hours away
    val.classList.toggle('cd-imminent', (dd === 0 && hh < 2));

    // Label: show duty type and date
    const act = next.act;
    const dayIso = next.day.dateIso;
    const [y, mo, d] = dayIso.split('-');
    const IT_MONTHS_SHORT = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
    const dateStr = d + ' ' + IT_MONTHS_SHORT[parseInt(mo,10)-1];
    const typeStr = act.type === 'FLIGHT' ? 'VOLO'
      : act.type === 'DH'       ? 'DH'
      : act.type === 'SBY'      ? 'STANDBY'
      : act.type === 'TRAINING' ? 'TRAINING'
      : act.type;
    lbl.textContent = typeStr + ' · ' + dateStr;

    el.style.display = 'flex';
  }

  tick();
  _cdTimer = setInterval(tick, 1000);
}

window.addEventListener('scroll',()=>{

  const targetFab = todayIsoFab >= rosterStartFab && todayIsoFab <= rosterEndFab

    : rosterStartFab;
  const todayGroup = document.querySelector(`.day-group[data-date="${targetFab}"]`);
  if (fabToday && todayGroup) {
    const fabObs = new IntersectionObserver(([e]) => {
      fabToday.classList.toggle('visible', !e.isIntersecting);
    }, { threshold: 0.1 });
    fabObs.observe(todayGroup);
  }

},{passive:true});

<script>
// ── PWA Icons: canvas-generated default, overridable with a user photo
function makeDefaultIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1B2A4A');
  grad.addColorStop(1, '#0F172A');
  ctx.fillStyle = grad;
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${Math.round(size*0.45)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✈', size/2, size/2 + size*0.03);
  ctx.fillStyle = '#2563EB';
  const lh = size*0.045, ly = size*0.78, lw = size*0.5;
  ctx.beginPath();
  ctx.roundRect((size-lw)/2, ly, lw, lh, lh/2);
  ctx.fill();
  return canvas.toDataURL('image/png');
}

function makeSquareIcon(srcDataUrl, size) {
  // Crop image to square, apply rounded corners mask, return dataURL
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Clip with rounded rect
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(size-r,0);
      ctx.quadraticCurveTo(size,0,size,r);
      ctx.lineTo(size,size-r);
      ctx.quadraticCurveTo(size,size,size-r,size);
      ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
      ctx.closePath(); ctx.clip();
      // Draw image centred/cropped to square
      const s = Math.min(img.width, img.height);
      const sx = (img.width  - s) / 2;
      const sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = srcDataUrl;
  });
}

function applyIcons(dataUrl) {
  // dataUrl: null = use default canvas icon; string = custom image
  if (dataUrl) {
    Promise.all([
      makeSquareIcon(dataUrl, 180),
      makeSquareIcon(dataUrl, 152),
      makeSquareIcon(dataUrl, 120),
      makeSquareIcon(dataUrl, 32),
    ]).then(([i180, i152, i120, i32]) => {
      try {
        if (i180) document.getElementById('appleTouchIcon').href    = i180;
        if (i152) document.getElementById('appleTouchIcon152').href = i152;
        if (i120) document.getElementById('appleTouchIcon120').href = i120;
        if (i32) {
          const lnk = document.querySelector("link[rel~='icon']") || document.createElement('link');
          lnk.rel='icon'; lnk.type='image/png'; lnk.href=i32;
          document.head.appendChild(lnk);
        }
      } catch(e) {}
    });
  } else {
    try {
      document.getElementById('appleTouchIcon').href    = makeDefaultIcon(180);
      document.getElementById('appleTouchIcon152').href = makeDefaultIcon(152);
      document.getElementById('appleTouchIcon120').href = makeDefaultIcon(120);
      const lnk = document.querySelector("link[rel~='icon']") || document.createElement('link');
      lnk.rel='icon'; lnk.type='image/png'; lnk.href=makeDefaultIcon(32);
      document.head.appendChild(lnk);
    } catch(e) {}
  }
}

// On load: use saved custom icon if present, else default
(function() {
  try {
    const saved = localStorage.getItem('crewroster_icon');
    applyIcons(saved || null);
    if (saved) { setTimeout(() => _updateIconBtn(saved), 0); }
  } catch(e) { applyIcons(null); }
})();
