<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CrewRoster</title>

<!-- PWA: iOS Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CrewRoster">
<meta name="mobile-web-app-capable" content="yes">

<!-- Theme color (header bar in mobile browsers) -->
<meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">

<!-- Apple Touch Icons (generated inline as SVG→PNG via canvas at runtime) -->
<link rel="apple-touch-icon" sizes="180x180" href="#" id="appleTouchIcon">
<link rel="apple-touch-icon" sizes="152x152" href="#" id="appleTouchIcon152">
<link rel="apple-touch-icon" sizes="120x120" href="#" id="appleTouchIcon120">

<!-- iOS Splash screens (minimal — Safari uses the icon + title) -->
<meta name="format-detection" content="telephone=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root {
    --bg:             #F0F2F5;
    --surface:        #FFFFFF;
    --surface-2:      #F8F9FB;
    --border:         #E2E6EC;
    --border-subtle:  rgba(0,0,0,0.06);
    --text-primary:   #0F172A;
    --text-secondary: #475569;
    --text-muted:     #94A3B8;
    --accent-flight:  #2563EB;
    --accent-sby:     #EA580C;
    --accent-off:     #16A34A;
    --accent-holiday: #7C3AED;
    --accent-training:#374151;
    --accent-layover: #0891B2;
    --accent-dh:      #64748B;
    --radius:         18px;
    --radius-sm:      12px;
    --shadow:         0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md:      0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    --shadow-lg:      0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    --glass-bg:       rgba(248,249,251,0.85);
    --glass-border:   rgba(255,255,255,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* All numeric/time values use DM Mono globally */
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ═══════════════════════════════════════════════════════
     HEADER — glassmorphism + scroll-compact behaviour
  ═══════════════════════════════════════════════════════ */
  .header {
    position: sticky; top: 0; z-index: 100;
    padding: 12px 20px 10px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-left:  max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 0.5px solid var(--glass-border);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.04);
    transition: box-shadow 0.35s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
    contain: layout style;
    transform: translateZ(0); /* own compositor layer */
  }

  /* Compact state */
  .header.header-compact {
    padding-top: max(8px, env(safe-area-inset-top));
    padding-bottom: 7px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.10), 0 4px 20px rgba(0,0,0,0.08);
  }

  .header-inner {
    max-width: 700px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }

  /* ── FIXED BLOCK: date + countdown ── */
  .header-primary {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
    flex: 1;
  }
  .header-date {
    font-size: 19px; font-weight: 800; letter-spacing: -0.8px;
    color: var(--text-primary); line-height: 1.1;
    font-family: 'Inter', sans-serif;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: font-size 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .header-compact .header-date {
    font-size: 16px; letter-spacing: -0.5px;
  }
  .header-meta {
    font-size: 9px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.8px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.6;
    transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1), height 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .header-compact .header-meta { opacity: 0; max-height: 0; overflow: hidden; margin: 0; }

  .header-countdown {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 2px;
  }
  .countdown-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 700;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--text-muted); flex-shrink: 0;
  }
  .countdown-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 800;
    color: #FBBF24; letter-spacing: 0.3px; line-height: 1;
  }
  .countdown-value.cd-imminent { color: #F87171; }
  @media (prefers-color-scheme: dark) {
    .countdown-value { color: #FCD34D; }
    .countdown-value.cd-imminent { color: #FCA5A5; }
  }

  /* ── COLLAPSIBLE: stats pills ── */
  .header-collapsible {
    max-height: 120px;
    opacity: 1;
    overflow: hidden;
    transform-origin: top center;
    transform: scaleY(1) translateZ(0);
    will-change: transform, opacity;
    transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1),
                opacity     0.30s cubic-bezier(0.4,0,0.2,1) 0.05s,
                transform   0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .header-compact .header-collapsible {
    max-height: 0;
    opacity: 0;
    transform: scaleY(0) translateZ(0);
    pointer-events: none;
    transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1),
                opacity     0.22s cubic-bezier(0.4,0,0.2,1),
                transform   0.32s cubic-bezier(0.4,0,0.2,1);
  }

  /* Stats container */
  .header-stats {
    display: none; /* shown via JS when data loaded */
    align-items: center;
    gap: 5px;
    padding-top: 8px;
  }

  /* ── STAT PILLS — glass minimal ── */
  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5px 11px;
    gap: 1px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.14);
    position: relative;
    overflow: hidden;
  }
  @media (prefers-color-scheme: light) {
    .stat-pill {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.08);
    }
  }
  /* coloured top-edge accent */
  .stat-pill::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 10px 10px 0 0;
  }
  .stat-value {
    font-size: 14px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .stat-label {
    font-size: 8px; font-weight: 700;
    letter-spacing: 0.7px; color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .stat-pill.stat-fh  { border-color: rgba(59,130,246,0.35); }
  .stat-pill.stat-off { border-color: rgba(22,163,74,0.35); }
  .stat-pill.stat-sby { border-color: rgba(234,88,12,0.35); }
  .stat-pill.stat-hol { border-color: rgba(124,58,237,0.35); }
  .stat-pill.stat-fh::before  { background: rgba(59,130,246,0.8); }
  .stat-pill.stat-off::before { background: rgba(22,163,74,0.8); }
  .stat-pill.stat-sby::before { background: rgba(234,88,12,0.8); }
  .stat-pill.stat-hol::before { background: rgba(124,58,237,0.8); }
  .stat-pill.stat-fh  .stat-value { color: var(--accent-flight); }
  .stat-pill.stat-off .stat-value { color: var(--accent-off); }
  .stat-pill.stat-sby .stat-value { color: var(--accent-sby); }
  .stat-pill.stat-hol .stat-value { color: var(--accent-holiday); }

  /* ── HEADER ACTIONS — iOS-style buttons ── */
  .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px;
    border: 0.5px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.15s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  }
  @media (prefers-color-scheme: light) {
    .btn-icon {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.10);
    }
  }
  .btn-icon:hover {
    background: rgba(255,255,255,0.14);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .btn-icon:active { transform: scale(0.92); }
  .btn-icon.active {
    background: var(--accent-flight);
    border-color: var(--accent-flight);
    color: white;
    box-shadow: 0 2px 10px rgba(37,99,235,0.4);
  }
  @media (prefers-color-scheme: light) {
    .btn-icon:hover { background: rgba(0,0,0,0.09); }
  }

  /* ── Month History Strip ── */
  .month-strip {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 8px;
    overflow: hidden;
    max-width: 100%;
  }
  .month-strip-nav {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 5px;
    font-size: 14px;
    flex-shrink: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .month-strip-nav:hover { color: var(--text-primary); }
  .month-strip-nav:disabled { opacity: 0.2; cursor: default; }
  .month-strip-scroll {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
    flex: 1;
    padding: 2px 0;
  }
  .month-strip-scroll::-webkit-scrollbar { display: none; }
  .month-pill {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    padding: 4px 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .month-pill:hover { border-color: var(--accent-flight); color: var(--accent-flight); }
  .month-pill.active {
    background: var(--accent-flight);
    border-color: var(--accent-flight);
    color: #fff;
  }
  .month-pill-del {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.5;
    font-size: 9px;
    vertical-align: middle;
  }
  .month-pill-del:hover { opacity: 1; }
  @media (max-width: 430px) {
    .month-pill { font-size: 9px; padding: 3px 7px; }
    .month-strip { margin-top: 6px; }
  }

  /* ── Mobile header overrides ≤430px ── */
  @media (max-width: 430px) {
    .header                { padding: 10px 14px 8px; padding-top: max(10px, env(safe-area-inset-top)); }
    .header-date           { font-size: 15px; letter-spacing: -0.3px; }
    .header-meta           { font-size: 8px; margin-top: 1px; }
    .header-stats          { gap: 4px; padding-top: 6px; }
    .header-actions        { gap: 5px; }
    .btn-icon              { width: 30px; height: 30px; }
    .stat-pill             { padding: 4px 8px; }
    .stat-value            { font-size: 12px; }
    .countdown-value       { font-size: 11px; }
    .countdown-label       { font-size: 7px; }
  }

  .main { max-width: 700px; margin: 0 auto; padding: 24px 18px calc(100px + env(safe-area-inset-bottom)); box-sizing: border-box; width: 100%; }

  /* ── UPLOAD SCREEN ── */
  /* ════════════════════════════════════════════════════
     LANDING PAGE — Upload Card
  ════════════════════════════════════════════════════ */
  .upload-screen {
    min-height: calc(100vh - 70px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
    box-sizing: border-box;
    width: 100%;
    gap: 0;
  }

  /* Central upload card */
  .upload-card {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: uploadCardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    will-change: transform, opacity;
  }
  @keyframes uploadCardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Squircle icon container */
  .upload-squircle {
    width: 96px;
    height: 96px;
    border-radius: 28px;
    background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(37,99,235,0.35), 0 2px 8px rgba(0,0,0,0.2);
    animation: squirclePulse 3s ease-in-out infinite;
    margin-bottom: 28px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    will-change: transform, box-shadow;
    backface-visibility: hidden;
  }
  .upload-squircle::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    border-radius: inherit;
  }
  @keyframes squirclePulse {
    0%, 100% { box-shadow: 0 0 0 1px rgba(37,99,235,0.3), 0 8px 32px rgba(37,99,235,0.35), 0 2px 8px rgba(0,0,0,0.2); transform: scale(1) translateZ(0); }
    50%       { box-shadow: 0 0 0 6px rgba(37,99,235,0.12), 0 12px 40px rgba(37,99,235,0.45), 0 2px 8px rgba(0,0,0,0.2); transform: scale(1.02) translateZ(0); }
  }
  .upload-squircle svg {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }

  /* Wordmark */
  .upload-wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-flight);
    opacity: 0.7;
    margin-bottom: 12px;
  }

  /* Heading */
  .upload-heading {
    font-family: 'Inter', sans-serif;
    font-size: clamp(24px, 7vw, 34px);
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -1.2px;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 10px;
  }
  .upload-heading span { color: #2563EB; }

  .upload-sub {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 36px;
    max-width: 280px;
  }

  /* .upload-zone removed — CTA is now a standalone button */

  /* Pill CTA button */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    background: linear-gradient(135deg, #2563EB 0%, #1d4ed8 100%);
    color: #ffffff;
    border: none;
    border-radius: 100px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.2px;
    cursor: pointer;
    width: 100%;
    box-shadow:
      0 4px 20px rgba(37,99,235,0.40),
      0 1px 0 rgba(255,255,255,0.15) inset,
      0 -1px 0 rgba(0,0,0,0.15) inset;
    transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }
  .btn-primary:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow:
      0 8px 28px rgba(37,99,235,0.50),
      0 1px 0 rgba(255,255,255,0.15) inset,
      0 -1px 0 rgba(0,0,0,0.15) inset;
  }
  .btn-primary:active {
    transform: scale(0.95);
    box-shadow:
      0 2px 10px rgba(37,99,235,0.30),
      0 1px 0 rgba(255,255,255,0.10) inset;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  /* Drag-over state */
  #uploadZone.drag-over .upload-squircle {
    animation: none;
    box-shadow: 0 0 0 6px rgba(37,99,235,0.20), 0 12px 40px rgba(37,99,235,0.45);
  }
  #uploadZone.drag-over .btn-primary {
    transform: scale(0.98);
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    box-shadow: 0 2px 12px rgba(37,99,235,0.3);
  }

  /* .upload-hint removed */

  /* Bottom footnote row */
  .upload-footer-row {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .upload-footnote {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    opacity: 0.45;
  }
  /* Subtle icon button — barely visible, for power users */
  .btn-icon-subtle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    flex-shrink: 0;
  }
  .btn-icon-subtle:hover {
    opacity: 0.75;
    background: var(--border-subtle);
    border-color: var(--border-subtle);
  }
  .btn-icon-subtle:active { transform: scale(0.92); }

  /* ── Roster Library ── */
  .roster-library {
    width: 100%;
    max-width: 380px;
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: uploadCardIn 0.5s cubic-bezier(0.22,1,0.36,1) 0.15s both;
  }
  .roster-library-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .roster-library-title {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .roster-library-line {
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }
  .roster-library-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .roster-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid rgba(59,130,246,0.25);
    background: rgba(59,130,246,0.07);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-flight);
    letter-spacing: 0.3px;
    transition: background 0.18s ease, border-color 0.18s ease,
                transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.18s ease, color 0.18s ease;
    animation: pillFadeIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
  }
  @keyframes pillFadeIn {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .roster-pill:hover {
    background: rgba(59,130,246,0.14);
    border-color: rgba(59,130,246,0.50);
    box-shadow: 0 4px 16px rgba(59,130,246,0.18);
    transform: translateY(-1px);
  }
  .roster-pill.roster-pill-active {
    background: rgba(59,130,246,0.18);
    border-color: rgba(59,130,246,0.60);
    box-shadow: 0 2px 12px rgba(59,130,246,0.22);
  }
  .roster-pill.roster-pill-active::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-flight);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(59,130,246,0.8);
  }
  .roster-pill:active {
    transform: scale(0.95);
    box-shadow: none;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .roster-pill-icon {
    font-size: 13px;
    line-height: 1;
    opacity: 0.75;
  }
  .roster-pill-del {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(59,130,246,0.15);
    font-size: 9px;
    color: var(--accent-flight);
    opacity: 0.5;
    transition: opacity 0.15s, background 0.15s;
    flex-shrink: 0;
    margin-left: 2px;
    line-height: 1;
  }
  .roster-pill:hover .roster-pill-del { opacity: 1; }
  .roster-pill-del:hover {
    background: rgba(239,68,68,0.2) !important;
    color: #EF4444 !important;
    opacity: 1 !important;
  }
  /* dark mode adjustments */
  @media (prefers-color-scheme: dark) {
    .roster-pill {
      background: rgba(59,130,246,0.10);
      border-color: rgba(59,130,246,0.22);
      color: #60A5FA;
    }
    .roster-pill:hover {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.45);
    }
    .roster-library-line { background: rgba(255,255,255,0.06); }
  }

  .import-banner {
    background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; animation: fadeUp 0.3s ease both;
  }
  .import-banner-icon { color: #16A34A; flex-shrink: 0; }
  .import-banner-text { font-size: 13px; font-weight: 500; color: #166534; }
  .import-banner-btn {
    margin-left: auto; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1;
  }

  .filters {
    display: flex; gap: 8px; margin-bottom: 16px;
    flex-wrap: wrap; animation: fadeUp 0.35s ease both;
  }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 20px; font-size: 12px;
    font-weight: 600; border: 1px solid var(--border-subtle);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.15s ease; white-space: nowrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .filter-chip.active { background: #2563EB; color: white; border-color: #2563EB; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
  .filter-chip:hover:not(.active) { background: var(--surface-2); border-color: rgba(37,99,235,0.3); color: var(--text-primary); }
  .search-input {
    flex: 1; min-width: 100px; padding: 6px 14px;
    border: 1px solid var(--border-subtle); border-radius: 20px;
    font-family: inherit; font-size: 12px; background: var(--surface);
    color: var(--text-primary); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .search-input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }



  /* ── TURNO COLLAPSIBLE BLOCK ── */
  .turno-block {
    margin-bottom: 20px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(37,99,235,0.18);
    contain: layout style paint;
    box-shadow: 0 2px 16px rgba(37,99,235,0.08), 0 1px 0 rgba(37,99,235,0.12);
    transition: box-shadow 0.2s ease;
  }
  .turno-block:hover { box-shadow: 0 4px 24px rgba(37,99,235,0.14); }
  .turno-block-header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 12px 16px 11px;
    background: linear-gradient(135deg, rgba(37,99,235,0.08) 0%, rgba(37,99,235,0.04) 100%);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }
  .turno-block-header:active { background: rgba(59,130,246,0.13); }
  .turno-block-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: #60A5FA; flex-shrink: 0;
  }
  .turno-block-dates {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 800;
    color: #E2E8F0;
    flex-shrink: 0;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 6px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .turno-block-route {
    display: flex; align-items: center; flex-wrap: nowrap;
    gap: 0; flex: 1; min-width: 0; overflow: hidden;
  }

  /* ── Two-row turno header layout ── */
  .tba-top-row {
    display: flex; align-items: center; gap: 8px; width: 100%;
  }
  .tba-bottom-row {
    width: 100%; margin-top: 6px;
  }
  .tba-route-rows {
    display: flex; flex-direction: column; gap: 4px;
  }
  .tba-route-row {
    display: flex; align-items: center; gap: 6px;
  }
  .tba-row-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    color: #93C5FD;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 4px;
    padding: 1px 5px;
    flex-shrink: 0;
    min-width: 26px; text-align: center;
  }
  .tba-row-label-dh {
    color: #9CA3AF;
    background: rgba(156,163,175,0.12);
    border-color: rgba(156,163,175,0.22);
  }
  .tba-row-label-office {
    color: #A78BFA;
    background: rgba(167,139,250,0.12);
    border-color: rgba(167,139,250,0.22);
  }
  /* Flight card special states — colored left accent */
  .card-flight-dark.has-lc {
    border-left: 2px solid rgba(239,68,68,0.7);
  }
  .card-flight-dark.has-fam {
    border-left: 2px solid rgba(245,158,11,0.7);
  }
  .card-flight-dark.has-lc .cfd-left,
  .card-flight-dark.has-fam .cfd-left {
    border-right: none;
  }

  .tba-tag-lc {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800; letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #FECACA;
    background: rgba(239,68,68,0.18);
    border: 1px solid rgba(239,68,68,0.38);
    border-radius: 5px;
    padding: 2px 7px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tba-tag-fam {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800; letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #FDE68A;
    background: rgba(245,158,11,0.18);
    border: 1px solid rgba(245,158,11,0.38);
    border-radius: 5px;
    padding: 2px 7px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tba-route-seq {
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
  }
  .tba-iata {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800;
    color: var(--text-primary); white-space: nowrap;
  }
  .tba-iata.dh { color: #9CA3AF; }
  .tba-sep {
    font-size: 11px; color: #60A5FA; opacity: 0.5; padding: 0 2px; flex-shrink: 0;
  }
  .tba-sep.dh { color: #9CA3AF; }
  .turno-block-pills {
    display: flex; gap: 5px; flex-shrink: 0; align-items: center;
  }
  .tba-pill {
    display: flex; flex-direction: column; align-items: center;
    padding: 3px 8px; border-radius: 7px;
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.18);
  }
  .tba-pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800; color: #93C5FD; line-height: 1.15;
  }
  .tba-pill-lbl {
    font-family: 'Inter', sans-serif; font-size: 7px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase; color: #60A5FA; opacity: 0.75;
  }
  .turno-block-chevron {
    color: #60A5FA; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .turno-block.expanded .turno-block-chevron { transform: rotate(180deg); }
  .turno-block-body {
    display: none;
    background: transparent;
    border-top: 1px solid rgba(59,130,246,0.12);
    padding: 0 10px;
  }
  .turno-block.expanded .turno-block-body { display: block; }
  .turno-block-body > .day-group {
    margin-bottom: 0;
    animation: none;
    padding: 6px 0 0;
  }
  .turno-block-body > .day-group:first-child { padding-top: 10px; }
  .turno-block-body > .day-group:last-child { padding-bottom: 10px; }
  /* inside turno block, day-label not sticky */
  .turno-block-body .day-label { position: static; }

  /* Day-group inside a turno block: remove turno connector lines */
  .turno-block-body .turno-wrap::before { display: none; }

  /* Keep normal day-group style for standalone days */
  .day-group { margin-bottom: 20px; flex-direction: row; align-items: flex-start; gap: 10px; }
  /* Standalone day-groups (not inside turno) get same lateral padding as turno body */
  #timeline > .day-group { padding: 0 10px; }
  #timeline { animation: fadeUp 0.25s ease both; }

  /* ── IATA TOAST IN HEADER ── */
  #iataToast {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 5px;
    padding: 5px 12px;
    border-radius: 10px;
    background: rgba(37,99,235,0.10);
    border: 1px solid rgba(37,99,235,0.22);
    animation: iataFadeIn 0.15s ease;
    align-self: flex-start;
    width: fit-content;
  }
  @keyframes iataFadeIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:none; } }
  #iataToastCode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 800;
    color: var(--text-primary);
  }
  #iataToastTz {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 700;
    color: #60A5FA;
  }
  #iataToastTime {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--text-secondary);
  }
  @media (prefers-color-scheme: dark) {
    .turno-block { border-color: rgba(37,99,235,0.22); background: transparent; }
    .turno-block-header { background: linear-gradient(135deg, rgba(37,99,235,0.12) 0%, rgba(37,99,235,0.06) 100%); }
    .turno-block-body { border-top-color: rgba(37,99,235,0.15); }
    /* OFF card dark */
    .card-off-dark { background: var(--surface); border-color: rgba(22,163,74,0.2); }
    .off-code { color: #4ade80; }
    .off-label { color: var(--text-muted); }
    /* SBY card dark */
    .card-sby-dark { background: linear-gradient(135deg, rgba(234,88,12,0.10) 0%, rgba(234,88,12,0.04) 100%); border-color: rgba(234,88,12,0.18); }
    .sby-code { color: #fb923c; }
    .sby-label { color: rgba(251,146,60,0.5); }
    .sby-left { background: rgba(234,88,12,0.08); border-color: rgba(234,88,12,0.12); }
    /* Ferie dark */
    .card-ferie { background: linear-gradient(135deg, rgba(124,58,237,0.12) 0%, rgba(124,58,237,0.05) 100%); border-color: rgba(124,58,237,0.22); }
    .ferie-code { color: #a78bfa; }
    /* Layover dark */
    .card-layover-premium { background: linear-gradient(135deg, rgba(8,145,178,0.12) 0%, rgba(8,145,178,0.05) 100%); border-color: rgba(8,145,178,0.22); }
    .layover-title { color: #22d3ee; }
    /* Rest dark */
    .card-rest-premium { border-color: rgba(255,255,255,0.05); }
    #iataToast { background: rgba(96,165,250,0.10); border-color: rgba(96,165,250,0.22); }
  }
  @media (max-width: 600px) {
    .tba-iata { font-size: 10px; }
    .tba-pill-val { font-size: 10px; }
    .turno-block-dates { font-size: 10px; }
  }

  /* ── TURNO SUMMARY BANNER ── */
  .turno-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(59,130,246,0.07);
    border: 1px solid rgba(59,130,246,0.20);
  }
  .turno-banner-label {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    color: #60A5FA;
    flex-shrink: 0;
  }
  .turno-banner-route {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    min-width: 0;
    flex-wrap: wrap;
  }
  .turno-leg-iata {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .turno-leg-arrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #60A5FA;
    opacity: 0.6;
    padding: 0 2px;
  }
  .turno-banner-pills {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    align-items: center;
  }
  .turno-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3px 8px;
    border-radius: 7px;
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.18);
  }
  .turno-pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 800;
    color: #93C5FD;
    line-height: 1.15;
  }
  .turno-pill-lbl {
    font-family: 'Inter', sans-serif;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #60A5FA;
    opacity: 0.75;
  }
  @media (prefers-color-scheme: dark) {
    .turno-banner { background: rgba(59,130,246,0.09); border-color: rgba(59,130,246,0.26); }
  }
  @media (max-width: 600px) {
    .turno-leg-iata { font-size: 11px; }
    .turno-pill-val { font-size: 10px; }
    .turno-pill { padding: 2px 6px; }
  }

  .day-group { margin-bottom: 20px; flex-direction: row; align-items: flex-start; gap: 10px; }

  .cfd-iata-cont {
    font-size: 14px !important;
    opacity: 0.4;
    letter-spacing: 3px;
  }

  /* REMARKS SECTION — shared base */
  .card-remarks {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    padding: 7px 14px 9px;
    margin-top: 0;
  }
  .card-remarks-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-right: 2px;
    flex-shrink: 0;
  }
  .card-remarks-tag {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    border-radius: 5px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  /* Dark cards: flight, DH, SBY, OFF */
  .card-flight-dark .card-remarks,
  .card-dh-dark .card-remarks,
  .card-sby-dark .card-remarks,
  .card-off-dark .card-remarks,
  .card-training .card-remarks {
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .card-flight-dark .card-remarks-label,
  .card-dh-dark .card-remarks-label,
  .card-sby-dark .card-remarks-label,
  .card-off-dark .card-remarks-label,
  .card-training .card-remarks-label {
    color: rgba(255,255,255,0.4);
  }
  .card-flight-dark .card-remarks-tag,
  .card-dh-dark .card-remarks-tag,
  .card-sby-dark .card-remarks-tag,
  .card-off-dark .card-remarks-tag,
  .card-training .card-remarks-tag {
    color: rgba(255,255,255,0.82);
    background: rgba(255,255,255,0.1);
  }
  /* Light cards: .card (layover, rest, hol) */
  .card .card-remarks {
    border-top: 1px solid var(--border);
  }
  .card .card-remarks-label { color: var(--text-muted); }
  .card .card-remarks-tag   { color: var(--text-secondary); background: var(--bg); }
  @media (prefers-color-scheme: dark) {
    .card .card-remarks-tag { background: #21262D; color: #8B949E; }
    .card .card-remarks      { border-top-color: var(--border); }
  }

  /* OGGI highlight animations */
  .today-flash {
    animation: todayPulse 2.0s ease-out 1;
  }
  .turno-flash {
    animation: turnoPulse 2.0s ease-out 1;
  }
  @keyframes todayPulse {
    0%   { box-shadow: 0 0 0 0    rgba(37,99,235,0);    background: transparent; border-radius: 18px; }
    15%  { box-shadow: 0 0 0 10px rgba(37,99,235,0.20); background: rgba(37,99,235,0.09); }
    100% { box-shadow: 0 0 0 0    rgba(37,99,235,0);    background: transparent; }
  }
  @keyframes turnoPulse {
    0%   { box-shadow: 0 2px 16px rgba(37,99,235,0.08), 0 1px 0 rgba(37,99,235,0.12); }
    15%  { box-shadow: 0 0 0 5px  rgba(37,99,235,0.50), 0 4px 32px rgba(37,99,235,0.30); }
    100% { box-shadow: 0 2px 16px rgba(37,99,235,0.08), 0 1px 0 rgba(37,99,235,0.12); }
  }

  /* TODAY FAB */
  .fab-today {
    position: fixed;
    bottom: max(24px, calc(16px + env(safe-area-inset-bottom)));
    right: max(20px, calc(12px + env(safe-area-inset-right)));
    z-index: 200;
    display: none;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: #F1F5F9;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 100px;
    padding: 10px 18px 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.30), 0 1px 0 rgba(255,255,255,0.06) inset;
    white-space: nowrap;
    will-change: transform;
    transform: translateZ(0);
    transition: box-shadow 0.15s ease;
  }
  .fab-today.visible { display: flex; }
  @media (hover: hover) {
    .fab-today:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.40); }
  }
  .fab-today:active { transform: scale(0.95) translateZ(0); }
  .fab-today svg { flex-shrink: 0; }

  /* TURNO connector — vertical line only in the gap between day-groups */
  .turno-wrap {
    position: relative;
  }
  /* The ::before covers only the bottom margin (gap to next card) */
  .turno-wrap::before {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 100%;
    height: 20px; /* matches margin-bottom of .day-group */
    width: 2px;
    background: #3B82F6;
    opacity: 0.35;
    pointer-events: none;
  }
  /* Last day: no line after it */
  .turno-wrap.turno-end::before {
    display: none;
  }
  /* ── DAY LABEL — floating, minimal ── */
  .day-group {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 12px;

  }
  .day-label {
    flex-shrink: 0;
    width: 48px;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 6px;
    gap: 3px;
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    position: sticky;
    top: var(--header-h, 120px);
    align-self: flex-start;
  }
  .day-label-num {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 200;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -1.5px;
  }
  .day-label-wd {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    line-height: 1;
  }
  /* cards column — takes remaining width */
  .day-cards {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  /* hide old mid/month/year elements */
  .day-label-mid, .day-label-month, .day-label-year { display: none; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden; display: flex; margin-bottom: 8px;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px) translateZ(0); }
  .card-bar { width: 4px; flex-shrink: 0; }
  .bar-flight   { background: var(--accent-flight); }
  .bar-sby      { background: var(--accent-sby); }
  .bar-off      { background: var(--accent-off); }
  .bar-layover  { background: var(--accent-layover); }
  .bar-dh       { background: var(--accent-dh); }
  .bar-rest     { background: #C4C4C4; }

  .card-body { padding: 12px 14px; flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 1px; letter-spacing: -0.2px;
  }
  .card-subtitle {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.6px; margin-bottom: 8px;
  }
  .card-row {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; flex-wrap: wrap;
  }
  .card-row:last-child { margin-bottom: 0; }
  .lbl { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }
  .sep { color: var(--border); }
  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; white-space: nowrap;
  }
  .b-flight  { background: #EEF3FF; color: var(--accent-flight); }
  .b-sby     { background: #FFF4EE; color: var(--accent-sby); }
  .b-dh      { background: #F3F4F6; color: #374151; }
  .b-layover { background: #ECFEFF; color: var(--accent-layover); }
  .b-hotel   { background: #FDF4FF; color: #7E22CE; margin-left: 4px; }

  .bar-hol { background: var(--accent-holiday); }
  .card-hol { border-left: none; }

  /* ── FERIE CARD ── */
  .card-ferie {
    background: linear-gradient(135deg, rgba(124,58,237,0.08) 0%, rgba(124,58,237,0.03) 100%);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid rgba(124,58,237,0.18);
    height: 64px;
    display: flex;
    align-items: stretch;
  }
  .ferie-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    width: 100%;
  }
  .ferie-icon {
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }
  .ferie-code {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: #7C3AED;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .ferie-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── LAYOVER PREMIUM ── */
  .card-layover-premium {
    background: linear-gradient(135deg, rgba(8,145,178,0.10) 0%, rgba(8,145,178,0.04) 100%);
    border-radius: var(--radius);
    margin-bottom: 6px;
    border: 1px solid rgba(8,145,178,0.20);
    box-shadow: var(--shadow);
    height: 64px;
    display: flex;
    align-items: stretch;
  }
  .layover-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    width: 100%;
  }
  .layover-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .layover-title {
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 800;
    color: #0891B2; letter-spacing: -0.3px; line-height: 1;
  }
  .layover-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 500;
    color: var(--text-muted); margin-top: 3px;
  }

  /* ── REST PREMIUM ── */
  .card-rest-premium {
    background: transparent;
    border-radius: var(--radius);
    margin-bottom: 6px;
    border: 1px dashed var(--border-subtle);
    height: 48px;
    display: flex;
    align-items: stretch;
  }
  .rest-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    width: 100%;
  }
  .rest-dash {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; color: var(--text-muted); opacity: 0.5;
  }
  .rest-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px; color: var(--text-muted); opacity: 0.7;
  }

  /* DARK FLIGHT CARD */
  .card-flight-dark {
    background: linear-gradient(145deg, #1e293b 0%, #020617 100%);
    border-radius: 16px;
    margin-bottom: 5px;
    overflow: hidden;
    contain: layout style;
    box-shadow: 0 2px 12px rgba(0,0,0,0.30), 0 1px 0 rgba(255,255,255,0.05) inset;
    border: 0.5px solid rgba(255,255,255,0.10);
    transition: box-shadow 0.18s ease, transform 0.14s ease, background 0.18s ease;
    cursor: pointer;
  }
  @media (hover: hover) {
    .card-flight-dark:hover {
      background: linear-gradient(145deg, #243347 0%, #0b1120 100%);
      box-shadow: 0 6px 24px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.07) inset;
    }
  }
  .card-flight-dark:active { transform: scale(0.99); }
  .cfd-left {
    padding: 11px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
    width: 120px;
    flex-shrink: 0;
    flex-grow: 0;
    background: rgba(0,0,0,0.15);
    border-right: 0.5px solid rgba(255,255,255,0.07);
  }
  .cfd-fltn {
    font-size: 13px;
    font-weight: 700;
    color: #60A5FA;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cfd-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cfd-ac {
    display: inline-block;
    align-self: flex-start;
    font-size: 9px;
    font-weight: 700;
    color: #7DD3FC;
    letter-spacing: 0.6px;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(125,211,252,0.10);
    padding: 1px 5px;
    border-radius: 4px;
    margin-bottom: 1px;
    opacity: 0.85;
  }
  .cfd-ci {
    font-size: 12px;
    font-weight: 700;
    color: #FCD34D;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
    opacity: 0.9;
  }
  .cfd-ci-label {
    font-size: 9px;
    font-weight: 600;
    color: rgba(148,163,184,0.6);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .cfd-divider {
    display: none;
  }
  .cfd-right {
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
    position: relative;
  }
  .cfd-airport {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .cfd-iata {
    cursor: pointer;
    font-size: 17px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.3px;
    line-height: 1;
    transition: color 0.12s;
  }
  .cfd-iata:hover { color: #93C5FD; }
  .cfd-time {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
  }
  .cfd-arrow {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 6px;
    gap: 3px;
  }
  .cfd-fh {
    font-size: 10px;
    font-weight: 600;
    color: #BFDBFE;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    white-space: nowrap;
    opacity: 0.55;
  }
  .card-dh-dark .cfd-fh { color: rgba(255,255,255,0.6); }
  .cfd-arrow-row {
    width: 100%;
    display: flex;
    align-items: center;
    position: relative;
  }
  .cfd-arrow-line {
    width: 100%;
    height: 0.5px;
    background: linear-gradient(90deg, transparent 0%, rgba(96,165,250,0.35) 30%, rgba(96,165,250,0.35) 70%, transparent 100%);
  }
  .cfd-arrow-plane {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(96,165,250,0.7);
    line-height: 1;
    background: #0d1623;
    padding: 0 3px;
  }
  .cfd-nextday {
    font-size: 9px;
    font-weight: 700;
    color: #FBBF24;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .card-dh-dark .cfd-nextday { color: #FDE68A; }

  .cfd-lbl {
    font-size: 8px;
    font-weight: 600;
    color: rgba(148,163,184,0.45);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .cfd-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .cfd-badge-overnight {
    font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
    color: #A78BFA; background: rgba(167,139,250,0.12);
    border-radius: 4px; padding: 2px 6px;
  }
  .cfd-badge-htl {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 700;
    color: #A5F3FC; background: rgba(165,243,252,0.10);
    border: 0.5px solid rgba(165,243,252,0.25);
    border-radius: 4px; padding: 1px 5px;
  }
  .cfd-badge-ext {
    font-family: 'Inter', sans-serif;
    font-size: 8px; font-weight: 800; letter-spacing: 0.5px;
    color: #FDE68A; background: rgba(253,230,138,0.12);
    border: 0.5px solid rgba(253,230,138,0.3);
    border-radius: 4px; padding: 1px 5px;
  }

  /* TRAINING / OFFICE DUTY CARD */
  .card-training {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.22), 0 1px 0 rgba(255,255,255,0.04) inset;
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: stretch;
  }
  .trn-left {
    background: #162D4A;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    width: 148px;
    flex-shrink: 0;
  }
  .trn-code {
    font-size: 11px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .trn-sub {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .trn-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 14px;
    gap: 5px;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .trn-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .trn-item-name {
    font-size: 13px;
    font-weight: 700;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    flex: 1;
  }
  .trn-item-times {
    font-size: 12px;
    font-weight: 600;
    color: #93C5FD;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .trn-item-loc {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .trn-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 1px 0;
  }

  /* OFF CARD */
  .card-off-dark {
    background: var(--surface, #fff);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    align-items: stretch;
    height: 64px;
    border: 1px solid var(--border-subtle);
    position: relative;
  }
  /* accent bar on left */
  .card-off-dark::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent-off);
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .off-left {
    background: transparent;
    padding: 14px 16px 14px 20px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .off-code {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent-off);
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .off-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
  }

  /* SBY CARD */
  .card-sby-dark {
    background: linear-gradient(135deg, rgba(234,88,12,0.12) 0%, rgba(234,88,12,0.05) 100%);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    align-items: stretch;
    height: 64px;
    border: 1px solid rgba(234,88,12,0.22);
  }
  .sby-left {
    background: rgba(234,88,12,0.10);
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 3px;
    width: 86px;
    flex-shrink: 0;
    border-right: 1px solid rgba(234,88,12,0.15);
  }
  .sby-code {
    font-size: 13px;
    font-weight: 800;
    color: #EA580C;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
    line-height: 1;
  }
  .sby-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: rgba(234,88,12,0.6);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .sby-right {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 18px;
  }
  .sby-times {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .sby-time {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0px;
    line-height: 1;
  }
  .sby-sep {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .sby-overflow {
    font-size: 14px !important;
    opacity: 0.7;
    letter-spacing: 0;
  }
  .sby-utc {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    margin-left: 2px;
  }

  /* DH DARK CARD */
  .card-dh-dark {
    background: linear-gradient(145deg, #161e2e 0%, #0a0f1a 100%);
    border-radius: 16px;
    margin-bottom: 5px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.22);
    border: 0.5px solid rgba(255,255,255,0.06);
    transition: box-shadow 0.18s ease, transform 0.14s ease;
    cursor: pointer;
  }
  @media (hover: hover) { .card-dh-dark:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.32); } }
  .card-dh-dark .cfd-left        { background: rgba(107,116,128,0.25); border-right-color: rgba(255,255,255,0.06); }
  .card-dh-dark .cfd-fltn        { color: #94A3B8; }
  .card-dh-dark .cfd-ci          { color: #FCD34D; font-weight: 800; }
  .card-dh-dark .cfd-ci-label    { color: rgba(255,255,255,0.65); }
  .card-dh-dark .cfd-iata        { color: #FFFFFF; }
  .card-dh-dark .cfd-time        { color: #FFFFFF; font-size: 14px; font-weight: 700; }
  .card-dh-dark .cfd-lbl         { color: rgba(255,255,255,0.6); }
  .card-dh-dark .cfd-divider     { background: rgba(255,255,255,0.2); }
  .card-dh-dark .cfd-arrow-line  { background: rgba(255,255,255,0.35); }
  .card-dh-dark .cfd-arrow-plane { color: rgba(255,255,255,0.4); background: #0a0f1a; }
  .card-dh-dark .cfd-dh-badge    { color: #FFFFFF; background: rgba(255,255,255,0.18); }
  .card-dh-dark .cfd-service-badge { color: #FFFFFF; background: rgba(255,255,255,0.18); }
  .cfd-dh-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
    color: #94A3B8; background: rgba(148,163,184,0.12);
    border-radius: 4px; padding: 2px 6px;
    text-transform: uppercase;
  }
  .cfd-train-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #FFFFFF;
    background: #87919E;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }

  .cfd-service-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
    color: #7DD3FC; background: rgba(125,211,252,0.10);
    border-radius: 4px; padding: 2px 6px;
  }

  /* GROUND TIME (between legs) */

  /* CHECK-IN BANNER */
  .ci-banner {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #EEF3FF;
    border: 1px solid #BFDBFE;
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--accent-flight);
  }
  .ci-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent-flight);
    font-family: 'Inter', sans-serif;
  }
  .ci-time {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-flight);
    letter-spacing: -0.5px;
    margin-left: 2px;
  }
  .ci-utc {
    font-size: 10px;
    font-weight: 600;
    color: #93C5FD;
    letter-spacing: 0.8px;
    align-self: flex-end;
    margin-bottom: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* FLIGHT NUMBER BADGE */
  .fltn-badge {
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-flight);
    background: #EEF3FF;
    border: 1px solid #BFDBFE;
    border-radius: 8px;
    padding: 3px 8px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .ground-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    color: rgba(148,163,184,0.5);
    letter-spacing: 1px;
    text-align: center;
    padding: 3px 0;
    text-transform: uppercase;
  }
  .ground-time::before, .ground-time::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .loading {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 60px 24px; animation: fadeUp 0.3s ease both;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--border); border-top-color: var(--accent-flight);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: var(--text-muted); font-weight: 500; }

  .debug-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-top: 20px; overflow: hidden;
  }
  .debug-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; cursor: pointer; user-select: none;
  }
  .debug-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .debug-badge {
    background: #FEF3C7; color: #92400E;
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px;
  }
  .debug-chevron { margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
  .debug-chevron.open { transform: rotate(180deg); }
  .debug-content { display: none; padding: 0 14px 12px; }
  .debug-content.open { display: block; }
  .debug-line {
    font-size: 11px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace; padding: 2px 0;
    border-bottom: 1px solid var(--bg);
  }

  .scroll-progress {
    position: absolute; bottom: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa); z-index: 200;
    transform-origin: left; transform: scaleX(0);
  
    transform-origin: left;
    transform: scaleX(0);
    transition: none;
  }
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text-muted); font-size: 13px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── DESKTOP ── */
  @media (min-width: 640px) {
    .header { padding: 14px 28px 11px; }
    .header-date { font-size: 21px; }
    .main { padding: 24px 28px 100px; }
  }

  /* ── MOBILE BASE (≤ 600px) ── */
  /* ══════════════════════════════════════════════════════════
     MOBILE — iPhone notch / Dynamic Island  (≤ 430px)
     Reference: iPhone 15 Pro  390×844  safe-area-top ~59px
     Budget:   390 - 2×10 main-pad - 40px day-label - 7px gap = 323px per card
     cfd-left: 90px → cfd-right netto: 323-90-1 = 232px → airport ~100px each ✓
     ══════════════════════════════════════════════════════════ */
  @media (max-width: 430px) {

    /* ── Layout ───────────────────────────────────────────── */
    .main {
      padding: 14px 10px calc(90px + env(safe-area-inset-bottom));
      padding-left:  max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      padding: 8px 14px 8px;
      padding-top: max(8px, env(safe-area-inset-top));
    }
    .header-inner         { gap: 6px; }
    .header-date          { font-size: 16px; letter-spacing: -0.3px; }
    .header-meta          { font-size: 9px; margin-top: 1px; }
    .header-lastupdate    { font-size: 9px; }
    .header-stats         { gap: 4px; margin-top: 6px; }
    .stat-pill            { padding: 4px 9px; }
    .stat-value           { font-size: 12px; }
    .stat-label           { font-size: 8px; letter-spacing: 0.3px; }
    .countdown-label      { font-size: 8px; letter-spacing: 0.8px; }
    .countdown-value      { font-size: 12px; }
    #iataToast            { margin-top: 4px; padding: 4px 9px; }
    #iataToastCode        { font-size: 11px; }
    #iataToastTz          { font-size: 10px; }
    #iataToastTime        { font-size: 10px; }
    .btn-icon             { width: 30px; height: 30px; border-radius: 8px; }
    .header-actions       { gap: 5px; }

    /* ── Filter bar ───────────────────────────────────────── */
    .filters              { gap: 5px; margin-bottom: 10px; }
    .filter-chip          { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
    .search-input         { padding: 5px 10px; font-size: 12px; }

    /* ── Day group ────────────────────────────────────────── */
    .day-group            { margin-bottom: 12px; gap: 7px; }
    #timeline > .day-group { padding: 0; }

    /* ── Date sidebar card ────────────────────────────────── */
    .day-label     { width: 40px; min-height: 64px; padding: 6px 4px; border-radius: 10px; }
    .day-label-num { font-size: 20px; letter-spacing: -1px; }
    .day-label-wd  { font-size: 8px; letter-spacing: 0.5px; }

    /* ── FLIGHT / DH — left panel ─────────────────────────── */
    .cfd-left           { width: 86px; padding: 10px 9px; gap: 3px; }
    .cfd-fltn           { font-size: 13px; }
    .cfd-meta           { gap: 4px; }
    .cfd-ci             { font-size: 11px; }
    .cfd-ci-label       { font-size: 8px; }
    .cfd-ac             { font-size: 9px; padding: 1px 5px; margin-bottom: 1px; }
    .cfd-badges         { gap: 2px; margin-top: 2px; }
    .cfd-dh-badge       { font-size: 7px !important; padding: 2px 4px !important; letter-spacing: 0.2px; }
    .cfd-service-badge  { font-size: 7px !important; padding: 2px 4px !important; }
    .cfd-badge-ext      { font-size: 7px !important; padding: 1px 4px !important; }

    /* ── FLIGHT / DH — right panel ───────────────────────── */
    /* netto: 323 - 90 - 1(divider) - 16(pad) = 216px          */
    /* 2 airport + arrow: (216-28)÷2 = 94px each → IATA@15px ✓ */
    .cfd-right          { padding: 10px 8px; gap: 6px; }
    .cfd-iata           { font-size: 15px; letter-spacing: -0.2px; }
    .cfd-time           { font-size: 11px; }
    .cfd-lbl            { font-size: 7px; letter-spacing: 0.4px; }
    .cfd-fh             { font-size: 9px; letter-spacing: 0.4px; }
    .cfd-arrow-plane    { font-size: 11px; }
    .cfd-train-label    { font-size: 8px !important; letter-spacing: 0.3px; }
    .cfd-nextday        { font-size: 8px; }

    /* ── SBY card ─────────────────────────────────────────── */
    /* height:64px fixed → content area = 64px, center everything */
    .sby-left           { width: 66px; flex-shrink: 0; padding: 0 10px; }
    .sby-code           { font-size: 12px; }
    .sby-label          { font-size: 7px; letter-spacing: 0.8px; }
    .sby-right          { padding: 0 10px; }
    .sby-times          { gap: 4px; flex-wrap: nowrap; }
    .sby-time           { font-size: 17px; letter-spacing: 0.2px; }
    .sby-sep            { font-size: 12px; }
    .sby-utc            { font-size: 7px; }
    .sby-overflow       { font-size: 11px !important; }

    /* ── OFF / FERIE card ────────────────────────────────── */
    .off-left           { padding: 0 10px 0 14px; gap: 8px; }
    .off-code           { font-size: 14px; }
    .off-label          { font-size: 9px; }

    /* ── TRAINING card ────────────────────────────────────── */
    /* Stack vertically: label on top full-width, sessions below  */
    .card-training      { flex-direction: column; height: auto !important; }
    .trn-left           { width: 100%; padding: 9px 12px 7px;
                          flex-direction: row; align-items: center;
                          gap: 8px; border-radius: 0; }
    .trn-code           { font-size: 10px; letter-spacing: 0.6px; }
    .trn-sub            { font-size: 9px; }
    .trn-right          { padding: 7px 12px 10px; border-left: none;
                          border-top: 1px solid rgba(255,255,255,0.08); gap: 4px; }
    .trn-item           { flex-direction: row; gap: 8px; align-items: baseline; }
    .trn-item-name      { font-size: 12px; flex: 1; min-width: 0; }
    .trn-item-times     { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
    .trn-item-loc       { font-size: 10px; flex-shrink: 0; }
    .trn-divider        { margin: 3px 0; }

    /* ── TURNO block header ───────────────────────────────── */
    .turno-block-header { padding: 8px 10px 8px; }
    .tba-top-row        { gap: 5px; }
    .turno-block-label  { font-size: 7px; letter-spacing: 1px; }
    .turno-block-dates  { font-size: 10px; padding: 2px 5px; }
    .tba-iata           { font-size: 12px; }
    .tba-sep            { font-size: 10px; }
    .tba-row-label      { font-size: 7px; padding: 1px 4px; min-width: 22px; }

    .tba-pill-val       { font-size: 11px; }

    .turno-block-body > .day-group:last-child  { padding-bottom: 10px; }

    /* ── Remarks ──────────────────────────────────────────── */
    .card-remarks       { padding: 5px 10px 7px; gap: 3px; }
    .card-remarks-tag   { font-size: 9px; padding: 2px 5px; }
    .card-remarks-label { font-size: 7px; }

    /* ── FAB ──────────────────────────────────────────────── */
    .fab-today {
      bottom: max(14px, calc(8px + env(safe-area-inset-bottom)));
      right:  max(12px, calc(8px + env(safe-area-inset-right)));
      padding: 8px 12px 8px 10px; font-size: 12px; gap: 5px;
    }

    /* ── Upload screen ────────────────────────────────────── */
    .upload-screen { padding: 32px 16px calc(40px + env(safe-area-inset-bottom)); }
    .upload-squircle { width: 80px; height: 80px; border-radius: 24px; margin-bottom: 22px; }
    .upload-squircle svg { width: 34px; height: 34px; }
    .upload-heading { font-size: clamp(22px, 8vw, 28px); }
    .upload-sub { font-size: 13px; margin-bottom: 28px; }
    .btn-primary { padding: 13px 24px; font-size: 14px; }
    .roster-library { max-width: 100%; margin-top: 28px; }
    .roster-pill { font-size: 11px; padding: 8px 13px; }
    .btn-icon-subtle { width: 24px; height: 24px; }
  }

  /* ── COMPACT (≤ 375px — iPhone SE 3rd gen) ────────────── */
  @media (max-width: 375px) {
    .main           { padding-left: 8px; padding-right: 8px; }
    .day-label      { width: 36px; min-height: 60px; }
    .day-label-num  { font-size: 18px; }
    .day-group      { gap: 6px; }
    .cfd-left       { width: 84px; padding: 9px 8px; }
    .cfd-fltn       { font-size: 12px; }
    .cfd-iata       { font-size: 14px; }
    .cfd-time       { font-size: 11px; }
    .cfd-right      { padding: 9px 6px; gap: 3px; }
    .sby-left       { width: 62px; }
    .sby-time       { font-size: 15px; }
    .stat-pill      { padding: 3px 7px; }
    .stat-value     { font-size: 11px; }
    .tba-iata       { font-size: 11px; }
    .turno-block-dates { font-size: 9px; }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:             #020617;
      --surface:        #0f172a;
      --surface-2:      #1e293b;
      --border:         #1e293b;

    .header {
      background: var(--glass-bg);
      border-bottom-color: var(--glass-border);
      box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.4);

    .stat-pill {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.10);
    }
    /* Day label — high contrast on dark background */
    .day-label-num { color: #e2e8f0; font-weight: 200; }
    .day-label-wd  { color: #475569; }
    .day-label { background: transparent; border-color: transparent; box-shadow: none; }
    /* Cards */
    .card { background: var(--surface); border-color: var(--border-subtle); }
    /* Turno connector */
    .turno-wrap::before { opacity: 0.45; }
    /* Search / filter bar */
    .filter-bar { background: rgba(13,17,23,0.94); border-color: var(--border); }
    .search-input { background: var(--surface); color: var(--text-primary); border-color: var(--border-subtle); }
    .search-input::placeholder { color: var(--text-muted); }
    .filter-chip { background: var(--surface); color: var(--text-secondary); border-color: var(--border-subtle); }
    .filter-chip.active { background: #2563EB; color: #fff; border-color: #2563EB; }
    /* Upload screen */
    .upload-heading { color: #f1f5f9; }
    .upload-sub { color: #475569; }

    .upload-drop-title { color: #E6EDF3; }
    .upload-drop-sub { color: #6E7681; }
    .upload-divider::before, .upload-divider::after { background: #30363D; }
    .upload-divider span { color: #484F58; }
    .btn-primary { background: #21262D; color: #E6EDF3; border: 1px solid #30363D; }
    .btn-primary:hover { background: #30363D; }
    /* Debug panel */
    .debug-panel { background: #161B22; border-color: #30363D; }
    .debug-header { color: #8B949E; }
    /* FAB */
    .fab-today { box-shadow: 0 4px 20px rgba(0,0,0,0.50), 0 1px 0 rgba(255,255,255,0.06) inset; }
    /* Stat pills */
    .stat-pill { background: #161B22; }
    .stat-pill.stat-fh  { border-color: rgba(59,130,246,0.30); }
    .stat-pill.stat-off { border-color: rgba(50,159,91,0.30); }
    .stat-pill.stat-sby { border-color: rgba(234,88,12,0.30); }
    .stat-pill.stat-hol { border-color: rgba(124,58,237,0.30); }
    /* Unrecognized panel */
    .debug-content { background: #0D1117; }
    .debug-line { color: #8B949E; border-bottom-color: #21262D; }
  }

  #fileInput { display: none; }
</style>
</head>
