<script>
// ─────────────────────────────────────────────────────────────
// PDF.js
// ─────────────────────────────────────────────────────────────
if (typeof pdfjsLib !== 'undefined') {
  // Try to use the worker; fall back to main thread if unavailable
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  } catch(e) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = '';
  }
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const S = { schedule:[], showOnlyOff:false, allExpanded:false, search:'', unrecognized:[], crewName:'', rosterRange:'', printDate:'', flightHours:'', dayOff:'', sbYDays:'', holidays:'' };

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const parseTime = t => {
  if (!t) return null;
  t = String(t).trim().replace(/\./g,':');
  const m4 = t.match(/^(\d{2})(\d{2})$/);
  if (m4) return `${m4[1]}:${m4[2]}`;
  const m5 = t.match(/^(\d{1,2}):(\d{2})$/);
  if (m5) return `${m5[1].padStart(2,'0')}:${m5[2]}`;
  return null;
};

const timeDiff = (t1,t2) => {
  if (!t1||!t2) return '—';
  const tm = t => { const[h,m]=t.split(':').map(Number); return h*60+m; };
  let d = tm(t2)-tm(t1); if (d<0) d+=1440;
  return `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
};

const parseDDMMYYYY = s => {
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m ? `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` : null;
};

const MONTHS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const isoParts = iso => {
  if (!iso) return { d:'', mo:'', y:'' };
  const [y, mo, d] = iso.split('-');
  return { d, mo: MONTHS_EN[+mo-1], y };
};
const isoDisplayEN = iso => {
  if(!iso) return '';
  const[y,mo,d]=iso.split('-');
  return `${d} ${MONTHS_EN[+mo-1]} ${y}`;
};
const isoWD = iso => ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(iso+'T00:00:00Z').getUTCDay()];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ─────────────────────────────────────────────────────────────
// INDIVIDUAL PLAN PARSER
//
// PDF column layout (approximate char positions in extracted text):
//   DATE(0)  DUTY(16)  CkIn(47)  DH(55)  FLTN(61)  DEP(69)  ARR(76)
//   ETD(84)  ETA(91)   FH(101)   Hotel(111)  Remarks(118)
//
// Day patterns recognised:
//   dd/MM/yyyy  wd  OFF              → OFF day
//   dd/MM/yyyy  wd  LAYOVER          → Hotel layover day
//   dd/MM/yyyy  wd  Stand-by HH-HH   → Standby
//   dd/MM/yyyy  wd  ---              → Rest (unassigned)
//   dd/MM/yyyy  wd  ......  CkIn     → Flight day header (check-in on dotted line)
//
// Continuation lines (no date):
//   ......  CkIn                     → check-in time for next flight
//   <route> DH  DEP ARR ETD ETA      → deadhead / positioning leg
//            DH  DEP ARR ETD ETA     → deadhead (no route label)
//   FLTN  DEP  ARR  ETD  ETA  FH     → regular flight leg
//   FLTN  DEP  >    ETD              → multi-day departure (overnight)
//            >  ARR  ETA  FH         → multi-day arrival (next day)
// ─────────────────────────────────────────────────────────────

function hasIATAFn(s) { return /\b[A-Z]{3}\b\s+\b[A-Z]{3}\b/.test(s); }

// Split a raw line into main content + remarks
// Returns { main, remarks } — remarks is '' if none present
function splitRemarks(raw) {
  const idx = raw.indexOf('\t||');
  if (idx === -1) return { main: raw, remarks: '' };
  return { main: raw.slice(0, idx), remarks: raw.slice(idx + 3).trim() };
}

// Filter remarks: remove aircraft type tokens and empty/HTL-only strings
const ACTYPE_RE = /^(B737|B787|B767|A320|A321|A319|A330|HTL|--|LC|SLS|LT)$/i;
function cleanRemarks(raw) {
  if (!raw) return '';
  // Remove LC + following inspector code (e.g. LC W9I-WHX or LC R2E-KUH-PIU)
  let s = raw.replace(/\bLC\b(?:\s+[A-Z0-9]{2,6}(?:-[A-Z0-9]{2,6})*)?/g, '').trim();
  // Remove Fam. Flt. + following inspector code
  s = s.replace(/Fam\.?\s*Flt\.?(?:\s+[A-Z0-9]{2,3}(?:-[A-Z0-9]{2,3})+)?/gi, '').trim();
  // Remove leftover LT, SLS tokens and actype patterns
  return s.split(/\s+/)
    .filter(t => !ACTYPE_RE.test(t))
    .join(' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

// Build remarks HTML block for any activity or leg
function remarksHtml(actOrLeg) {
  if (!actOrLeg) return '';
  const all = [];
  if (actOrLeg.remarks && actOrLeg.remarks.length) all.push(...actOrLeg.remarks);
  // Append LC / Fam Flt inspector codes as synthetic remark entries
  if (actOrLeg.lineCheckCodes && actOrLeg.lineCheckCodes.length)
    all.push('LC ' + actOrLeg.lineCheckCodes.join(' '));
  if (actOrLeg.famFltCodes && actOrLeg.famFltCodes.length)
    all.push('Fam Flt ' + actOrLeg.famFltCodes.join(' '));
  const uniq = [...new Set(all.map(r => r.trim()).filter(Boolean))];
  if (!uniq.length) return '';
  const tags = uniq.map(r => `<span class="card-remarks-tag">${esc(r)}</span>`).join('');
  return `<div class="card-remarks"><span class="card-remarks-label">Note</span>${tags}</div>`;
}

// Returns +1 if arrival time is less than departure (crossed midnight), else 0
function nightOffset(dep, arr) {
  if (!dep || !arr) return 0;
  const toMin = t => { const p = t.split(':'); return +p[0]*60 + +p[1]; };
  return toMin(arr) < toMin(dep) ? 1 : 0;
}

// Given a dateIso (YYYY-MM-DD) and offset in days, returns "dd MMM" string
function arrDateLabel(dateIso, offset) {
  if (!offset) return '';
  const d = new Date(dateIso + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + offset);
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', timeZone:'UTC' }).toUpperCase();
}

function parseNeosRoster(text) {
  const schedule = [];
  const unrecognized = [];

  // Meta extraction
  let crewName = '', rosterRange = '', printDate = '';
  const nm = text.match(/A\/V\s+[RC]\s+([A-Z][A-Z\s]+?)\s{3,}/);
  if (nm) crewName = nm[1].trim().replace(/\s+/g,' ');
  const rm = text.match(/From\s+(\d{2}\/\d{2}\/\d{4})\s+to\s+(\d{2}\/\d{2}\/\d{4})/i);
  if (rm) rosterRange = `${rm[1]} → ${rm[2]}`;
  const pdM = text.match(/Print Date\/Time:\s*([\d\/]+)\s*-\s*([\d:]+)/i);
  if (pdM) printDate = `${pdM[1]} ${pdM[2]}`;
  let flightHours = '', dayOff = '', sbYDays = '', holidays = '';
  // Collapse tab-separated remarks markers so numbers split across columns are found
  const _metaText = text.replace(/\t\|\|/g, ' ');
  const fhM  = _metaText.match(/Flight Hours from[^\n]*?([\d]+\.[\d]+)\s+Holidays/i);
  if (fhM) flightHours = fhM[1];
  const holM = _metaText.match(/Holidays\s+([1-9][\d]*)/i);
  if (holM) holidays = holM[1];
  const offM = _metaText.match(/Day OFF\s+Month\s+([\d]+)/i);
  if (offM) dayOff = offM[1];
  const sbyM2 = _metaText.match(/SBY_Days\s+([\d]+)/i);
  if (sbyM2) sbYDays = sbyM2[1];

  // Split lines, stop at true footer (Flight Hours / Document Expiration).
  // LEGENDA, page headers, and EXT= lines appear between pages — skip them, don't stop.
  const lines = [];
  for (const l of text.split('\n')) {
    const lt = l.trim();
    if (/^(Flight Hours from|DOCUMENT EXPIRATION)/i.test(lt)) break;
    if (/^(LEGENDA|EXT\s*=|\(R\)\s*=|ALL TIMES ARE UTC)/i.test(lt)) continue;
    // Skip repeated page headers (DATE DUTY CkIn..., NEOS S.p.A., print date, A/V R)
    if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date|A\/V\s)/i.test(lt)) continue;
    // Skip bare page numbers like "1" or "2"
    if (/^\d$/.test(lt)) continue;
    lines.push(l);
  }

  // Detect if pdf.js returned lines in reverse order (Y=0 at bottom in PDF coords).
  // Find the first two date lines and check their order.
  const _datePat = /^(\d{2}\/\d{2}\/\d{4})/;
  const _foundDates = lines.map(l => l.match(_datePat)).filter(Boolean).slice(0, 3);
  const _toISO = d => { const p = d.split('/'); return `${p[2]}-${p[1]}-${p[0]}`; };
  if (_foundDates.length >= 2 && _toISO(_foundDates[0][1]) > _toISO(_foundDates[1][1])) {
    lines.reverse(); // pdf.js native coords: flip to top-to-bottom order
  }

  // openOvernightLeg: holds reference to a leg that departed but hasn't landed yet (next-day arrival)
  let curDate = null, curDay = null, pendingCI = null, pendingSby = null;
  let openOvernightLeg = null; // { legRef, sourceDayIso }
  let prevRaw = ''; // track previous line for lone "DH" lookahead
  let lastPendingCI = null; // persists after pendingCI is cleared, for lone-DH case
  let curDayCI = null;      // CI of the day when it was first opened — never overwritten by continuation lines
  let pendingTraining = null; // training sessions that arrived before their date line
  let curDayHasContent = false; // true when the date-line itself contained duty/CI content

  const flushDay = () => {
    if (curDay && curDay.activities.length > 0) schedule.push(curDay);
  };

  const newDay = iso => {
    flushDay();
    curDate = iso; pendingCI = null; lastPendingCI = null; curDayCI = null;
    curDay = { dateIso: iso, weekdayLabel: isoWD(iso), activities: [], remarks: [], hotel: false };
    curDayHasContent = false;
    if (pendingSby) { curDay.activities.push(pendingSby); pendingSby = null; }
    if (pendingTraining) { curDay.activities.push(pendingTraining); pendingTraining = null; }
  };

  const addLeg = leg => {
    curDayHasContent = true;
    const ex = curDay.activities.find(a => a.type === 'FLIGHT');
    if (ex) ex.legs.push(leg);
    else curDay.activities.push({ type: 'FLIGHT', dateIso: curDate, legs: [leg] });
  };

  for (let i = 0; i < lines.length; i++) {
    const rawFull = lines[i];
    const { main: raw, remarks: lineRemarks } = splitRemarks(rawFull);
    const trimmed = raw.trim();
    if (i > 0) prevRaw = splitRemarks(lines[i - 1]).main;
    if (!trimmed) continue;
    // If HTL appears in this line's remarks column, mark the current day as hotel
    if (lineRemarks && /\bHTL\b/.test(lineRemarks) && curDay) curDay.hotel = true;

    // ── SKIP: header rows and noise
    if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date|A\/V\s)/i.test(trimmed)) continue;
    if (/^(confermare|Galaxy Service|Biglietti|Wetlease)/i.test(trimmed)) continue; // spill-over remarks

    // ── A) Line starts with dd/MM/yyyy (with or without duty content after weekday)
    const dateLineM = raw.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2})(.*)/);
    if (dateLineM) {
      const iso = parseDDMMYYYY(dateLineM[1]);
      if (!iso) continue;

      const duty = dateLineM[3].trim();

      // BUG-FIX 1: "dd/MM/yyyy wd" with no duty text, or only a time/HTL
      // These are continuation rows that pdf.js extracted with a duplicate date stamp.
      // If curDay already has this same date, don't create a new day — just update pendingCI.
      const isDupDate = curDay && curDay.dateIso === iso;
      if (isDupDate) {
        // Extract check-in time if present (e.g. "02/02/2026 mo 11:00")
        const ciM = duty.match(/^(\d{1,2}:\d{2})(\s+HTL)?$/);
        if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; if (!curDayCI) curDayCI = pendingCI; }
        // It may also be a bare date line with no extra info — just skip
        continue;
      }

      // New day
      // Guard: if iso < curDate, it means pdf.js Y-order inversion caused curDay
      // (the "future" day) to receive activities that belong to `iso` (the earlier day).
      // Heuristic: DH/SBY activities whose latest timestamp < curDay's check-in time
      // are the misplaced ones; FLIGHT legs with dep≠null (real departures from this day)
      // stay with curDay.
      if (curDay && iso < curDate) {
        // pdf.js Y-order inversion: curDay (the later date) received activities
        // that belong to iso (the earlier date). Re-partition them.
        //
        // Use lastPendingCI (= the check-in of curDay, set when we opened it)
        // as the boundary. Activities ending before that CI belong to the earlier day.
        const tMin = t => { if (!t) return Infinity; const [h,m]=t.split(':').map(Number); return h*60+m; };
        const actLatest = a => {
          if (a.type === 'DH') return tMin(a.eta || a.etd);
          if (a.type === 'FLIGHT') {
            if (a.legs && a.legs.every(l => l.dep === null))
              return tMin(a.legs[a.legs.length-1].ldgUtc);
            return Infinity; // real departure stays on curDay
          }
          return Infinity;
        };
        // Threshold: curDay's opening CI (curDayCI), fallback to lastPendingCI, fallback to midnight
        const threshMin = tMin(curDayCI) < Infinity ? tMin(curDayCI) : tMin(lastPendingCI) < Infinity ? tMin(lastPendingCI) : 24*60;
        const misplaced = [], keep = [];
        for (const a of curDay.activities) {
          actLatest(a) < threshMin ? misplaced.push(a) : keep.push(a);
        }
        curDay.activities = keep;
        newDay(iso);
        curDay.activities.push(...misplaced);
      } else {
        newDay(iso);
      }
      // Mark day as having content if the date-line itself carries duty info (time, overnight cont, dots)
      if (/\d{1,2}:\d{2}|>|\.{5,}/.test(duty)) curDayHasContent = true;

      // Empty duty (bare date line like "05/02/2026 th") → flight day, no special activity
      if (!duty) continue;

      if (/^OFF$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'OFF' }); if(lineRemarks){const _r=cleanRemarks(lineRemarks);if(_r){const _l=curDay.activities[curDay.activities.length-1];if(_l&&!_l.remarks)_l.remarks=[];if(_l&&!_l.remarks.includes(_r))_l.remarks.push(_r);}} continue;
      }
      if (/^-\s*OFF\(R\)$/i.test(duty) || /^OFF\(R\)$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'OFF_R' }); if(lineRemarks){const _r=cleanRemarks(lineRemarks);if(_r){const _l=curDay.activities[curDay.activities.length-1];if(_l&&!_l.remarks)_l.remarks=[];if(_l&&!_l.remarks.includes(_r))_l.remarks.push(_r);}} continue;
      }
      if (/^Holidays$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'HOL' }); if(lineRemarks){const _r=cleanRemarks(lineRemarks);if(_r){const _l=curDay.activities[curDay.activities.length-1];if(_l&&!_l.remarks)_l.remarks=[];if(_l&&!_l.remarks.includes(_r))_l.remarks.push(_r);}} continue;
      }
      if (/^LAYOVER/i.test(duty)) {
        curDay.activities.push({ type: 'LAYOVER' }); if(lineRemarks){const _r=cleanRemarks(lineRemarks);if(_r){const _l=curDay.activities[curDay.activities.length-1];if(_l&&!_l.remarks)_l.remarks=[];if(_l&&!_l.remarks.includes(_r))_l.remarks.push(_r);}} continue;
      }
      if (/^---+$/.test(duty)) {
        curDay.activities.push({ type: 'REST' }); if(lineRemarks){const _r=cleanRemarks(lineRemarks);if(_r){const _l=curDay.activities[curDay.activities.length-1];if(_l&&!_l.remarks)_l.remarks=[];if(_l&&!_l.remarks.includes(_r))_l.remarks.push(_r);}} continue;
      }
      // Stand-by  — three forms:
      //   A) "Stand-by HH:MM - HH:MM"  (same day, complete)
      //   B) "Stand-by HH:MM >>"        (starts today, ends next day)
      //   C) "Stand-by >> HH:MM"        (continuation from prev day)
      const sbyFull = duty.match(/Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
      if (sbyFull) {
        pendingSby = null;
        curDay.activities.push({
          type:'SBY', label:'Home Stand-by',
          startUtc: parseTime(sbyFull[1]), endUtc: parseTime(sbyFull[2])
        }); continue;
      }
      // Form B: open SBY starting today
      const sbyOpenM = duty.match(/Stand-by\s+(\d{1,2}:\d{2})\s*(?:>>|&gt;&gt;)/i)
                    || raw.match(/Stand-by\s+(\d{1,2}:\d{2})\s*(?:>>|&gt;&gt;)/i);
      if (sbyOpenM) {
        pendingSby = null;
        curDay.activities.push({
          type:'SBY', label:'Home Stand-by',
          startUtc: parseTime(sbyOpenM[1]), endUtc: null, openEnd: true
        }); continue;
      }
      // Form C: SBY continuation ending today
      const sbyCont = duty.match(/Stand-by\s*(?:>>|&gt;&gt;)\s*(\d{1,2}:\d{2})/i)
                   || raw.match(/Stand-by\s*(?:>>|&gt;&gt;)\s*(\d{1,2}:\d{2})/i);
      if (sbyCont) {
        pendingSby = null;
        curDay.activities.push({
          type:'SBY', label:'Home Stand-by',
          startUtc: null, endUtc: parseTime(sbyCont[1]), openStart: true
        }); continue;
      }
      // Dotted = check-in on same line, possibly followed by overnight arrival
      if (/^\.{5,}/.test(duty)) {
        const ciM = raw.match(/\.{5,}\s+(\d{1,2}:\d{2})/);
        if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; curDayCI = pendingCI; }
        // Check if line also contains overnight arrival "  >  ARR  HH:MM  HH.HH"
        const oaM = raw.match(/>\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.]\d{2})/);
        if (oaM && openOvernightLeg) {
          // Add arrival-only leg to today's day
          const _ol = openOvernightLeg;
          if (curDay) curDay.activities.push({
            type: 'FLIGHT',
            legs: [{
              fltn: _ol.fltn, dep: null, arr: oaM[1],
              toUtc: null, ldgUtc: parseTime(oaM[2]),
              blockUtc: parseTime(oaM[3].replace('.',':')),
              checkInUtc: null, hotel: _ol.hotel,
              acType: _ol.acType, multiDay: false,
            }],
            dateIso: curDate,
          });
          openOvernightLeg = null;
        }
        continue;
      }
      // Arrival summary lines: "MXP 23:35" or "MXP 21:50 Fam.Flt. ..." — silently skip
      // These are PDF-generated notes showing the arrival airport+time from the previous duty.
      if (/^[A-Z]{3}\s+\d{1,2}:\d{2}/.test(duty) && !hasIATAFn(duty)) {
        newDay(iso); // still create the day (might have continuation lines after)
        continue;
      }

      // BUG-FIX 2: bare time (check-in) on duty column, e.g. "14/02/2026 sa 05:00"
      const bareTimeM = duty.match(/^(\d{1,2}:\d{2})(\s+HTL)?$/);
      if (bareTimeM) {
        pendingCI = parseTime(bareTimeM[1]); lastPendingCI = pendingCI;
        continue;
      }
      // Training / office duty on date line
      // duty may be "EST" alone, or "EST 08:00 12:00 Aula 4" (all in one token from pdf.js)
      if (/^[A-Z]/.test(duty) && !hasIATAFn(raw)) {
        const dutyTimeM = duty.match(/^(.+?)\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s*(.*)?$/);
        const rawTimeM  = !dutyTimeM && raw.match(/(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
        if (dutyTimeM || rawTimeM) {
          let sessionName, t1, t2, loc;
          if (dutyTimeM) {
            sessionName = dutyTimeM[1].trim();
            t1 = parseTime(dutyTimeM[2]); t2 = parseTime(dutyTimeM[3]);
            loc = (dutyTimeM[4]||'').trim().replace(/^HTL\s*/i,'');
          } else {
            sessionName = duty;
            t1 = parseTime(rawTimeM[1]); t2 = parseTime(rawTimeM[2]);
            const locM = raw.match(/\d{1,2}:\d{2}\s+\d{1,2}:\d{2}\s+([\w][\w\s\d]*)$/);
            loc = locM ? locM[1].trim() : '';
          }
          // Merge with pendingTraining sessions if any (they belong to this same day)
          if (pendingTraining) {
            pendingTraining.sessions.push({ name: sessionName, start: t1, end: t2, loc });
            curDay.activities.push(pendingTraining);
            pendingTraining = null;
          } else {
            let trn = curDay.activities.find(a => a.type === 'TRAINING');
            if (!trn) { trn = { type:'TRAINING', location: loc, sessions:[] }; curDay.activities.push(trn); }
            trn.sessions.push({ name: sessionName, start: t1, end: t2, loc });
          }
          continue;
        }
      }
      // Anything else — try as continuation
      { const ref = {leg: openOvernightLeg}; parseCont(raw, curDay, pendingCI, addLeg, unrecognized, ref, curDate); openOvernightLeg = ref.leg; }
      pendingCI = null;
      continue;
    }

    // ── B) Continuation line (no date prefix) — belongs to curDay
    if (!curDay) continue;

    // Dotted check-in line
    if (/^\.{5,}/.test(trimmed)) {
      const ciM = raw.match(/\.{5,}\s+(\d{1,2}:\d{2})/);
      if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; }
      continue;
    }

    // BUG-FIX 3: continuation line that starts with dd/MM/yyyy of a DIFFERENT date
    // e.g. "[2026-02-19] 20/02/2026 LAYOVER HTL" — pdf.js mis-assigned it to prev day
    const contDateM = trimmed.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2}\s+)?(LAYOVER|Holidays|OFF\(R\)|OFF|-\s*OFF\(R\)|Stand-by|---)/i);
    if (contDateM) {
      const iso2 = parseDDMMYYYY(contDateM[1]);
      if (iso2 && iso2 !== curDay.dateIso) {
        newDay(iso2);
        const dtype = contDateM[3].trim().toUpperCase();
        if (dtype === 'OFF') curDay.activities.push({ type:'OFF' });
        else if (/^-?\s*OFF\(R\)$/i.test(contDateM[3].trim())) curDay.activities.push({ type:'OFF_R' });
        else if (/^HOLIDAYS$/i.test(dtype)) curDay.activities.push({ type:'HOL' });
        else if (dtype === 'LAYOVER') curDay.activities.push({ type:'LAYOVER' });
        else if (/stand-by/i.test(contDateM[3])) {
          const sbM2full = trimmed.match(/Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
          const sbM2open = !sbM2full && trimmed.match(/Stand-by\s+(\d{1,2}:\d{2})\s*(?:>>|&gt;&gt;)/i);
          const sbM2cont = !sbM2full && !sbM2open && trimmed.match(/Stand-by\s*(?:>>|&gt;&gt;)\s*(\d{1,2}:\d{2})/i);
          if (sbM2full) curDay.activities.push({ type:'SBY', label:'Home Stand-by', startUtc:parseTime(sbM2full[1]), endUtc:parseTime(sbM2full[2]) });
          else if (sbM2open) curDay.activities.push({ type:'SBY', label:'Home Stand-by', startUtc:parseTime(sbM2open[1]), endUtc:null, openEnd:true });
          else if (sbM2cont) curDay.activities.push({ type:'SBY', label:'Home Stand-by', startUtc:null, endUtc:parseTime(sbM2cont[1]), openStart:true });
        }
        continue;
      }
    }

    // BUG-FIX 4: continuation line starting with dd/MM/yyyy + bare weekday (no duty)
    // e.g. "23/02/2026 mo" or "26/02/2026 th"
    const contBareDate = trimmed.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2})\s*$/i);
    if (contBareDate) {
      const iso3 = parseDDMMYYYY(contBareDate[1]);
      if (iso3 && iso3 !== curDay.dateIso) newDay(iso3);
      continue;
    }

    // Stand-by line without date prefix: save as pending — will be applied to the NEXT day
    // (pdf.js sometimes emits the duty text before the date line for the same row)
    if (!trimmed.match(/^\d{2}\/\d{2}\/\d{4}/)) {
      const sbyNakedFull  = trimmed.match(/^Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
      const sbyNakedOpen  = !sbyNakedFull && trimmed.match(/^Stand-by\s+(\d{1,2}:\d{2})\s*(?:>>|&gt;&gt;)/i);
      const sbyNakedCont  = !sbyNakedFull && !sbyNakedOpen && trimmed.match(/^Stand-by\s*(?:>>|&gt;&gt;)\s*(\d{1,2}:\d{2})/i);
      if (sbyNakedFull) {
        pendingSby = { type:'SBY', label:'Home Stand-by', startUtc:parseTime(sbyNakedFull[1]), endUtc:parseTime(sbyNakedFull[2]) };
        continue;
      }
      if (sbyNakedOpen) {
        // Buffer — pdf.js emitted this before the date line, belongs to the NEXT day
        pendingSby = { type:'SBY', label:'Home Stand-by', startUtc:parseTime(sbyNakedOpen[1]), endUtc:null, openEnd:true };
        continue;
      }
      if (sbyNakedCont) {
        // Continuation from previous day — belongs to curDay
        if (curDay) curDay.activities.push({ type:'SBY', label:'Home Stand-by', startUtc:null, endUtc:parseTime(sbyNakedCont[1]), openStart:true });
        continue;
      }
    }

    // Lone "DH" line — re-parse previous line as DH
    if (/^DH$/.test(trimmed) && curDay) {
      // prevRaw pattern: "AAA - BBB [FLTN] DEP ARR ETD ETA [remarks]"
      const loneM = prevRaw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})(?:\s+([A-Z]{1,2}\d{2,6}))?\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
      if (loneM) {
        const loneDep = loneM[4], loneArr = loneM[5], loneEtd = parseTime(loneM[6]);
        // Skip if prevRaw already produced an identical DH (e.g. via dhGalaxy pattern)
        const alreadyExists = curDay.activities.some(
          a => a.type === 'DH' && a.dep === loneDep && a.arr === loneArr && a.etd === loneEtd
        );
        if (!alreadyExists) {
          curDay.activities.push({
            type: 'DH', dateIso: curDate,
            dep: loneDep, arr: loneArr,
            etd: loneEtd, eta: parseTime(loneM[7]),
            routeLabel: loneM[1] + ' → ' + loneM[2],
            flightLabel: loneM[3] || null,
            remarks: loneM[3] ? [loneM[1] + ' - ' + loneM[2] + ' ' + loneM[3]] : undefined,
            checkInUtc: pendingCI || lastPendingCI || null,
          });
        }
        prevRaw = raw;
        continue;
      }
    }

    // Frecciarossa / train label continuation line
    const frecM = trimmed.match(/^(frecciarossa|italo|frecciargento|frecciabianca)\s*(\S+)?/i);
    if (frecM && curDay) {
      const lastDH = [...curDay.activities].reverse().find(a => a.type === 'DH');
      if (lastDH) lastDH.trainLabel = trimmed;
      continue;
    }

    // BUG-FIX 6: LAYOVER HTL as bare continuation (no date)
    if (/^LAYOVER(\s+HTL)?$/i.test(trimmed)) {
      if (!curDay.activities.find(a => a.type === 'LAYOVER'))
        curDay.activities.push({ type:'LAYOVER' });
      continue;
    }

    // Training continuation: session name + two HH:MM + optional location (no date prefix, no IATA)
    if (curDay && /^[A-Z]/.test(trimmed) && !hasIATAFn(trimmed)) {
      const nameM = trimmed.match(/^(.+?)\s{1,}(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s*(.*)?$/);
      if (nameM) {
        const loc = (nameM[4]||'').trim().replace(/^HTL\s*/i,'');
        const existingTrn = curDay.activities.find(a => a.type === 'TRAINING');
        if (existingTrn) {
          // curDay already has a TRAINING activity — this is a same-day continuation
          existingTrn.sessions.push({ name: nameM[1].trim(), start: parseTime(nameM[2]), end: parseTime(nameM[3]), loc });
        } else if (!curDayHasContent) {
          // curDay opened with no duty content — training line likely belongs to the NEXT day
          // (pdf.js Y-bucket: training row sits just above its date line)
          if (!pendingTraining) pendingTraining = { type:'TRAINING', location: loc, sessions:[] };
          pendingTraining.sessions.push({ name: nameM[1].trim(), start: parseTime(nameM[2]), end: parseTime(nameM[3]), loc });
        } else {
          // curDay has content (flights or duty) — push training to current day
          const newTrn = { type:'TRAINING', location: loc, sessions: [{ name: nameM[1].trim(), start: parseTime(nameM[2]), end: parseTime(nameM[3]), loc }] };
          curDay.activities.push(newTrn);
        }
        continue;
      }
    }

    { const ref = {leg: openOvernightLeg}; parseCont(raw, curDay, pendingCI, addLeg, unrecognized, ref, curDate); openOvernightLeg = ref.leg; }
    pendingCI = null;
    // Attach remarks and extract acType / special flags from the remarks column
    if (lineRemarks && curDay) {
      const last = curDay.activities[curDay.activities.length - 1];
      if (last) {
        // Extract aircraft type
        const acRem = lineRemarks.match(/\b(B7[0-9]{2}|B767|A3[0-9]{2})\b/);
        if (acRem) {
          if (last.type === 'FLIGHT' && last.legs && last.legs.length) {
            const lastLeg = last.legs[last.legs.length - 1];
            if (!lastLeg.acType) lastLeg.acType = acRem[1];
          } else if (!last.acType) {
            last.acType = acRem[1];
          }
        }
        // Hotel flag on DH
        if (last.type === 'DH' && /\bHTL\b/.test(lineRemarks)) {
          last.hotel = true;
        }
        // Helper: apply lineCheck / famFlt flags to last activity/leg
        const _applyFlag = (flagName, codesName, codes) => {
          if (last.type === 'FLIGHT' && last.legs && last.legs.length) {
            const lastLeg = last.legs[last.legs.length - 1];
            lastLeg[flagName] = true;
            if (codes.length) lastLeg[codesName] = [...new Set((lastLeg[codesName]||[]).concat(codes))];
            last[flagName] = true; // propagate to activity for banner
          } else {
            last[flagName] = true;
            if (codes.length) last[codesName] = [...new Set((last[codesName]||[]).concat(codes))];
          }
        };

        // Search both lineRemarks AND raw (main column) for LC and Fam.Flt.
        const _src = (lineRemarks || '') + ' ' + (raw || '');

        // LINE CHECK: "LC" keyword followed by inspector code
        // Code can be: standalone token (BRT, MFM, MTV) OR hyphen-chain (W9I-WHX, R2E-KUH-PIU)
        // Also handles compound codes like X9I-HDF-B76-MOG-HDFB76 (variable length segments)
        if (/\bLC\b/.test(_src)) {
          const _lcCodes = [];
          // Match LC followed by a code: one or more alphanumeric segments separated by hyphens
          const _lcRe = /\bLC\b\s+([A-Z0-9]{2,6}(?:-[A-Z0-9]{2,6})*)/g;
          let _lcM;
          while ((_lcM = _lcRe.exec(_src)) !== null) {
            // Exclude pure aircraft types (B737, B787 etc.)
            if (!/^B[0-9]{3}$/.test(_lcM[1])) _lcCodes.push(_lcM[1]);
          }
          _applyFlag('lineCheck', 'lineCheckCodes', _lcCodes);
        }

        // FAM FLT: "Fam. Flt." or "Fam Flt" followed by optional inspector code
        const _famRe = /Fam\.?\s*Flt\.?(?:\s+([A-Z0-9]{2,3}(?:-[A-Z0-9]{2,3})+))?/i;
        const _famM = _src.match(_famRe);
        if (_famM) {
          const codes = _famM[1] ? [_famM[1]] : [];
          _applyFlag('famFlt', 'famFltCodes', codes);
        }
        // Attach non-actype text as remarks
        const r = cleanRemarks(lineRemarks);
        if (r) {
          if (!last.remarks) last.remarks = [];
          if (!last.remarks.includes(r)) last.remarks.push(r);
        }
      }
    }
  }

  flushDay();
  schedule.sort((a,b) => a.dateIso.localeCompare(b.dateIso));
  return { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays, holidays };
}

// ── Parse a continuation (non-date) line
function parseCont(raw, day, pendingCI, addLeg, unrecognized, overnightRef, dateIso) {
  const t = raw.trim();
  if (!t) return;
  if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date)/i.test(t)) return;
  // Skip pure remark spill-overs
  if (/^(confermare|Galaxy Service|Biglietti|Wetlease|R B7)/i.test(t)) return;

  // ─ DH with route label + DH keyword: "MXP - LIN  DH  MXP  LIN  05:00  06:00"
  const dh1 = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})(?:\s+([A-Z]{2}\d{2,6}|\d{2,6}[A-Z]?))?\s+DH\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh1) {
    { const act = {
      type:'DH', dep:dh1[4], arr:dh1[5],
      etd:parseTime(dh1[6]), eta:parseTime(dh1[7]),
      routeLabel:`${dh1[1]} → ${dh1[2]}`,
      flightLabel: dh1[3] || null,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    if (dh1[3]) act.remarks = [dh1[1] + ' - ' + dh1[2] + ' ' + dh1[3]];
    // Deduplicate: skip if identical DH already exists on this day
    const dupDH = day.activities.find(a => a.type==='DH' && a.dep===act.dep && a.arr===act.arr && a.etd===act.etd);
    if (!dupDH && act.dep !== act.arr) day.activities.push(act); // skip dep===arr (placeholder)
    return; }
  }

  // ─ DH without route label but with DH keyword: "   DH   MXP  LIN  05:00  06:00"
  const dh2 = raw.match(/\bDH\b\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh2) {
    const act2 = {
      type:'DH', dep:dh2[1], arr:dh2[2],
      etd:parseTime(dh2[3]), eta:parseTime(dh2[4]),
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    const dupDH2 = day.activities.find(a => a.type==='DH' && a.dep===act2.dep && a.arr===act2.arr && a.etd===act2.etd);
    if (!dupDH2) day.activities.push(act2);
    return;
  }

  // ─ Galaxy Service / positioning WITHOUT "DH" keyword
  // e.g. "MXP - LIN  MXP  LIN  05:00  06:00  Galaxy Service"
  // Pattern: "AAA - BBB  [spaces]  AAA  BBB  HH:MM  HH:MM"
  const dhGalaxy = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dhGalaxy) {
    const actG = {
      type:'DH', dep:dhGalaxy[3], arr:dhGalaxy[4],
      etd:parseTime(dhGalaxy[5]), eta:parseTime(dhGalaxy[6]),
      routeLabel:`${dhGalaxy[1]} → ${dhGalaxy[2]}`,
      service: /Galaxy/i.test(raw) ? 'Galaxy Service' : undefined,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    };
    const dupG = day.activities.find(a => a.type==='DH' && a.dep===actG.dep && a.arr===actG.arr && a.etd===actG.etd);
    if (!dupG) day.activities.push(actG);
    return;
  }

  // ─ Regular flight leg: FLTN  DEP  ARR  ETD  ETA  FH
  //   e.g. "   787  MXP  JFK  12:30  21:25  08.55  HTL  R B787"
  //   e.g. "EXT 6674  MXP  RMF  16:40  21:00  04.20"  (FDP extended)
  const leg1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.:]\d{2})/);
  if (leg1) {
    addLeg({
      fltn: leg1[1],
      dep: leg1[2], arr: leg1[3],
      toUtc: parseTime(leg1[4]), ldgUtc: parseTime(leg1[5]),
      blockUtc: parseTime(leg1[6].replace('.',':')),
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw),
      acType: null, // set later from remarks column
      multiDay: false,
      ext: /\bEXT\b/.test(raw),
    }); return;
  }

  // ─ Flight leg without block time (e.g. "6421 DSS MXP 01:25 06:55" same-night turnaround)
  {
    const leg1nf = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s*$/);
    if (leg1nf) {
      addLeg({
        fltn: leg1nf[1], dep: leg1nf[2], arr: leg1nf[3],
        toUtc: parseTime(leg1nf[4]), ldgUtc: parseTime(leg1nf[5]),
        blockUtc: null, checkInUtc: pendingCI || null,
        hotel: /HTL/.test(raw), multiDay: false, ext: /\bEXT\b/.test(raw),
      }); return;
    }
  }

  // ─ Multi-day departure: "  789  JFK  >  22:00"
  const legMD1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+>\s+(\d{1,2}:\d{2})/);
  if (legMD1) {
    const newLeg = {
      fltn: legMD1[1], dep: legMD1[2], arr: '→',
      toUtc: parseTime(legMD1[3]), ldgUtc: null, blockUtc: null,
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw), multiDay: true,
      acType: null, // set later from remarks column
      ext: /\bEXT\b/.test(raw),
    };
    addLeg(newLeg);
    if (overnightRef) overnightRef.leg = newLeg; // mark as open overnight leg
    return;
  }

  // ─ Multi-day arrival: "      >  MXP  06:00  08.00"
  const legMD2 = raw.match(/>\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.]\d{2})/);
  if (legMD2) {
    const openLeg = overnightRef && overnightRef.leg;
    if (openLeg) {
      // Add an arrival-only leg to today's day (dep=null signals "continuation from yesterday")
      addLeg({
        fltn: openLeg.fltn, dep: null, arr: legMD2[1],
        toUtc: null, ldgUtc: parseTime(legMD2[2]),
        blockUtc: parseTime(legMD2[3].replace('.',':')),
        checkInUtc: null, hotel: openLeg.hotel,
        acType: openLeg.acType, multiDay: false,
      });
      if (overnightRef) overnightRef.leg = null; // close
    } else {
      // No open leg — standalone arrival segment
      addLeg({
        fltn: '—', dep: null, arr: legMD2[1],
        toUtc: null, ldgUtc: parseTime(legMD2[2]),
        blockUtc: parseTime(legMD2[3].replace('.',':')),
        checkInUtc: null, hotel: false, multiDay: false,
      });
    }
    return;
  }

  // ─ Fam. Flt. / LC / inspector-code standalone line
  // Helper: is a token an inspector code? (no backtracking-prone regex)
  const _isInspCode = tok => {
    if (!tok || /^(EXT|HTL|DH|LC|SLS|LT|SNS|SPV|EJU|NOS)$/i.test(tok)) return false;
    if (/^[AB][0-9]{3}$/.test(tok)) return false; // B737, B787 etc.
    if (/^[A-Z]{3}$/.test(tok)) return false;      // pure 3-letter tokens/IATAs
    if (/^[A-Z0-9]{2,8}(?:-[A-Z0-9]{2,8})+$/.test(tok)) return true; // hyphen chain
    if (/^(?=[A-Z0-9]*[0-9])(?=[A-Z0-9]*[A-Z])[A-Z0-9]{4,}$/.test(tok)) return true; // mixed alnum ≥4
    return false;
  };

  // Attach flag+codes to last leg/activity
  const _attachFlag = (flagName, codesName, codes) => {
    const last = day.activities[day.activities.length - 1];
    if (!last) return;
    const target = (last.type === 'FLIGHT' && last.legs && last.legs.length)
      ? last.legs[last.legs.length - 1] : last;
    target[flagName] = true;
    if (last.type === 'FLIGHT') last[flagName] = true;
    if (codes.length) target[codesName] = [...new Set((target[codesName]||[]).concat(codes))];
  };

  // "Fam. Flt." — use simple includes check first to avoid backtracking
  if (/Fam\.?\s*Flt/i.test(t)) {
    const _famCode = t.match(/Fam\.?\s*Flt\.?\s+([A-Z0-9]{2,8}(?:[-+]\s*[A-Z0-9]{2,8})*)/i);
    const rawCode = _famCode ? _famCode[1].replace(/\s*\+\s*/g, '-') : '';
    _attachFlag('famFlt', 'famFltCodes', rawCode ? [rawCode] : []);
    return;
  }

  // "LC [code]" standalone
  if (/^LC/.test(t)) {
    const _lcCode = t.match(/^LC\s+([A-Z0-9]{2,8}(?:-[A-Z0-9]{2,8})*)/);
    const codes = _lcCode && !/^B[0-9]{3}$/.test(_lcCode[1]) ? [_lcCode[1]] : [];
    _attachFlag('lineCheck', 'lineCheckCodes', codes);
    return;
  }

  // Pure inspector code continuation (e.g. "39P-W7E-NVE", "XAJ8XT", "CXHEHQ + XAJ8XT")
  {
    const _parts = t.split(/\s*\+\s*/);
    const _codes = _parts.filter(_isInspCode);
    if (_codes.length > 0 && _codes.length === _parts.length) {
      const last = day.activities[day.activities.length - 1];
      if (last) {
        const target = (last.type === 'FLIGHT' && last.legs && last.legs.length)
          ? last.legs[last.legs.length - 1] : last;
        if (target.famFlt || last.famFlt) {
          target.famFltCodes = [...new Set((target.famFltCodes||[]).concat(_codes))];
        } else if (target.lineCheck || last.lineCheck) {
          target.lineCheckCodes = [...new Set((target.lineCheckCodes||[]).concat(_codes))];
        } else {
          target.famFlt = true;
          if (last.type === 'FLIGHT') last.famFlt = true;
          target.famFltCodes = [...new Set((target.famFltCodes||[]).concat(_codes))];
        }
      }
      return;
    }
  }

  // ─ Fallback
  if (t.length > 5 && !/^[.]{5,}/.test(t)) {
    unrecognized.push(`[${day.dateIso}] ${t}`);
  }
}

// ─────────────────────────────────────────────────────────────
// PDF TEXT EXTRACTION — reconstruct line layout from pdf.js items
// ─────────────────────────────────────────────────────────────
async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const ct = await page.getTextContent();

    // Step 1: collect all items (skip markers that have no .str or .transform)
    const allItems = [];
    for (const item of ct.items) {
      if (!item.str || !item.transform) continue;
      if (!item.str.trim()) continue;
      allItems.push({ str: item.str, x: item.transform[4], y: item.transform[5] });
    }

    // Step 2: bucket items by rounded Y (round to nearest 8pt — rows differ up to 6pt on same line, row spacing ~12pt to tolerate PDF sub-pixel jitter)
    const buckets = {};
    for (const it of allItems) {
      const yKey = Math.round(it.y / 8) * 8;
      if (!buckets[yKey]) buckets[yKey] = [];
      buckets[yKey].push(it);
    }

    // Step 3: sort buckets top→bottom
    // pdf.js uses native PDF coords: Y=0 at bottom, increases upward → higher Y = earlier in document
    const sortedYs = Object.keys(buckets).map(Number).sort((a, b) => b - a);

    // Step 4: for each row, sort items left→right
    // Split at X≈450: left = main content, right = remarks column
    const REMARKS_X = 435;
    const pageLines = sortedYs.map(y => {
      const items = buckets[y].sort((a, b) => a.x - b.x);
      const main    = items.filter(it => it.x <  REMARKS_X).map(it => it.str).join(' ');
      const remarks = items.filter(it => it.x >= REMARKS_X).map(it => it.str).join(' ').trim();
      if (remarks && remarks !== 'Hotel Remarks' && remarks !== 'Remarks') {
        return main + (main ? '\t||' : '') + remarks;
      }
      return main;
    }).filter(l => l.trim());

    pages.push(pageLines.join('\n'));
  }
  return pages.join('\n\f\n');
}

// ─────────────────────────────────────────────────────────────
// FILE HANDLING
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// EXPAND / COLLAPSE ALL TURNI
// ─────────────────────────────────────────────────────────────
function toggleAllTurni() {
  S.allExpanded = !S.allExpanded;
  document.querySelectorAll('.turno-block').forEach(b => {
    b.classList.toggle('expanded', S.allExpanded);
  });
  // Update icon: chevrons-up when expanded, chevrons-down when collapsed
  const icon = document.getElementById('expandAllIcon');
  if (icon) icon.innerHTML = S.allExpanded
    ? '<polyline points="18 15 12 9 6 15"/>'   // chevron-up
    : '<polyline points="6 9 12 15 18 9"/>';    // chevron-down
}

// Show/hide btnExpandAll depending on whether turno blocks exist
function syncExpandBtn() {
  const btn = document.getElementById('btnExpandAll');
  if (!btn) return;
  const hasTurni = document.querySelectorAll('.turno-block').length > 0;
  btn.style.display = hasTurni ? '' : 'none';
  // Reset icon to collapsed state
  const icon = document.getElementById('expandAllIcon');
  if (icon) icon.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
  S.allExpanded = false;
}

let _iataToastTimer = null;

function _iataLocalTime(tz) {
  try {
    const offsetStr = tz.replace('UTC','').trim();
    const parts = offsetStr.replace('+','').split(':').map(Number);
    const sign = offsetStr.startsWith('-') ? -1 : 1;
    const totalMin = sign * ((Math.abs(parts[0])||0)*60 + (parts[1]||0));
    const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
    const local = new Date(utcMs + totalMin * 60000);
    return local.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', hour12:false });
  } catch(e) { return ''; }
}

  showLoading();
  try {
    if (typeof pdfjsLib === 'undefined') {
      throw new Error('pdf.js non caricato. Controlla la connessione internet e ricarica la pagina.');
    }
    const text = await extractText(file);
    if (!text || text.trim().length < 20) {
      throw new Error('Testo estratto vuoto. Il PDF potrebbe essere una scansione o protetto.');
    }
    window._lastRosterText = text;
    // DEBUG: log lines as parser sees them (after possible reversal)
    const _debugLines = text.split('\n').filter(l => l.trim());
    console.log('=== ROSTER LINES (' + _debugLines.length + ') ===');
    _debugLines.forEach((l,i) => console.log(i, JSON.stringify(l)));
    const { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays, holidays } = parseNeosRoster(text);
    console.log('=== SCHEDULE ===', schedule.map(d => d.dateIso + ' ' + d.activities.map(a=>a.type).join(',')));
    if (schedule.length === 0) {
      hideLoading();
      alert('Nessun dato riconosciuto nel PDF.\n\nAssicurati che sia un Individual Plan con testo selezionabile.');
      return;
    }
    Object.assign(S, { schedule, unrecognized, crewName, rosterRange, printDate, flightHours, dayOff, sbYDays, holidays });
    // Determine month key from schedule
    const _firstDay = schedule[0]?.dateIso || '';
    const _isoMonth = _firstDay.slice(0, 7); // YYYY-MM
    const _IT_M2 = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    const [_y, _m] = _isoMonth.split('-');
    const _label = _IT_M2[+_m-1] + ' ' + _y;
    histAddMonth(text, _isoMonth, _label);
    // Legacy key for backward compat
    try {

  }

// ─────────────────────────────────────────────────────────────
// TURNO SUMMARY BANNER
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// TURNO COLLAPSIBLE BLOCK builder
// td: { route, dhRoute, totalFH, nLayover, acTypes, startIso, endIso, days[] }
// ─────────────────────────────────────────────────────────────
function buildTurnoBlock(td) {
  const IT_M = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
  const fmtD = iso => { const [,mo,d] = iso.split('-'); return d+' '+IT_M[+mo-1]; };

  // ── Build route rows from segments in chronological order
  // Rule: DH and VOL on the SAME day → same row (inline, DH greyed)
  //       DH on a different day → its own row
  const segs = td.segments || [];

  // Helper: render a deduplicated IATA chain with mixed styling
  // items = [{iata, dh}]
  const chainHtml = items => {
    const parts = [];
    let last = null;
    for (const {iata, dh} of items) {
      if (!iata || iata === last) continue;
      const cls = dh ? ' dh' : '';
      if (parts.length) parts.push(`<span class="tba-sep${cls}">›</span>`);
      parts.push(`<span class="tba-iata${cls}">${esc(iata)}</span>`);
      last = iata;
    }
    return parts.join('');
  };

  // Group segments by day, preserving order
  // dayGroups: [{dayIdx, segs:[]}]  in order of first appearance
  const dayGroups = [];
  const dayIdxMap = new Map();
  for (const s of segs) {
    if (!dayIdxMap.has(s.dayIdx)) {
      dayIdxMap.set(s.dayIdx, dayGroups.length);
      dayGroups.push({ dayIdx: s.dayIdx, segs: [] });
    }
    dayGroups[dayIdxMap.get(s.dayIdx)].segs.push(s);
  }

  // Build rows in chronological order.
  // Within each day-group: group consecutive same-kind segs into runs.
  // VOL+DH (or DH+VOL) consecutive within same day → merged on one row.
  // 'office' segs always get their own row, never merged.
  const rows = []; // [{kind, dayIdx, items?, volItems?, dhItems?}]

  for (const dg of dayGroups) {
    // Collect runs within this day
    const dayRuns = []; // [{kind, items}]
    let rKind = null, rItems = [];
    const flushDayRun = () => {
      if (!rKind) return;
      dayRuns.push({ kind: rKind, items: rKind === 'office' ? [] : [...rItems] });
      rKind = null; rItems = [];
    };
    for (const s of dg.segs) {
      const k = s.office ? 'office' : (s.onDuty ? 'vol' : 'dh');
      if (k !== rKind) flushDayRun();
      rKind = k;
      if (k !== 'office') {
        if (s.from) rItems.push({ iata: s.from, dh: k === 'dh' });
        if (s.to)   rItems.push({ iata: s.to,   dh: k === 'dh' });
      }
    }
    flushDayRun();

    // Merge adjacent VOL+DH or DH+VOL runs (same day, no office between them)
    for (let ri = 0; ri < dayRuns.length; ri++) {
      const r = dayRuns[ri], rn = dayRuns[ri + 1];
      if (r.kind !== 'office' && rn && rn.kind !== 'office' && r.kind !== rn.kind) {
        // Two adjacent flight runs of different type → same row
        const isVolFirst = r.kind === 'vol';
        rows.push({
          kind: 'mixed',
          volFirst: isVolFirst,
          volItems: isVolFirst ? r.items : rn.items,
          dhItems:  isVolFirst ? rn.items : r.items,
          dayIdx: dg.dayIdx,
        });
        ri++; // consume rn
      } else {
        rows.push({ kind: r.kind, items: r.items, dayIdx: dg.dayIdx });
      }
    }
  }

  const routeBlockHtml =
    `<div class="tba-route-rows">` +
    rows.map(row => {
      if (row.kind === 'office') {
        return `<div class="tba-route-row">` +
          `<span class="tba-row-label tba-row-label-office">OFFICE DUTY</span>` +
        `</div>`;
      }
      if (row.kind === 'mixed') {
        const firstLbl  = row.volFirst ? 'VOLO' : 'DH';
        const firstCls  = row.volFirst ? '' : ' tba-row-label-dh';
        const firstChain = chainHtml(row.volFirst ? row.volItems : row.dhItems);
        const secondLbl  = row.volFirst ? 'DH' : 'VOLO';
        const secondCls  = row.volFirst ? ' tba-row-label-dh' : '';
        const secondChain = chainHtml(row.volFirst ? row.dhItems : row.volItems);
        return `<div class="tba-route-row">` +
          `<span class="tba-row-label${firstCls}">${firstLbl}</span>` +
          `<div class="tba-route-seq">${firstChain}</div>` +
          `<span class="tba-row-label${secondCls}" style="margin-left:6px">${secondLbl}</span>` +
          `<div class="tba-route-seq">${secondChain}</div>` +
        `</div>`;
      }
      const lbl    = row.kind === 'vol' ? 'VOLO' : 'DH';
      const lblCls = row.kind === 'dh'  ? ' tba-row-label-dh' : '';
      return `<div class="tba-route-row">` +
        `<span class="tba-row-label${lblCls}">${lbl}</span>` +
        `<div class="tba-route-seq">${chainHtml(row.items)}</div>` +
      `</div>`;
    }).join('') +
    `</div>`;

  // ── Pills: ore volo, layover, actype
  let pillsHtml =
    (td.totalFH ? `<div class="tba-pill"><span class="tba-pill-val">${esc(td.totalFH)}</span><span class="tba-pill-lbl">Ore volo</span></div>` : '') +
    `<div class="tba-pill"><span class="tba-pill-val">${td.nLayover}</span><span class="tba-pill-lbl">Layover</span></div>`;
  if (td.acTypes.length)
    pillsHtml += `<div class="tba-pill"><span class="tba-pill-val">${td.acTypes.map(esc).join('/')}</span><span class="tba-pill-lbl">A/C</span></div>`;

  const block = document.createElement('div');
  block.className = 'turno-block' + (S.allExpanded ? ' expanded' : '');
  block.dataset.turnoStart = td.startIso;

  const header = document.createElement('div');
  header.className = 'turno-block-header';
  header.innerHTML =
    `<div class="tba-top-row">` +
      `<span class="turno-block-label">Turno</span>` +
      `<span class="turno-block-dates">${td.startIso === td.endIso ? fmtD(td.startIso) : fmtD(td.startIso) + ' – ' + fmtD(td.endIso)}</span>` +
      (td.lineCheck ? `<span class="tba-tag-lc">LINE CHECK</span>` : '') +
      (td.famFlt    ? `<span class="tba-tag-fam">FAM FLT</span>`   : '') +
      `<div class="turno-block-pills">${pillsHtml}</div>` +
      `<svg class="turno-block-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>` +
    `</div>` +
    `<div class="tba-bottom-row">${routeBlockHtml}</div>`;
  header.addEventListener('click', () => block.classList.toggle('expanded'));

  const body = document.createElement('div');
  body.className = 'turno-block-body';

  // Append day-groups for each day in this turno
  for (const dayGroup of td.dayGroups) {
    body.appendChild(dayGroup);
  }

  block.appendChild(header);
  block.appendChild(body);
  return block;
}

// ─────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────
function renderSchedule() {
  const tl = document.getElementById('timeline');
  if (!tl) return;
  tl.textContent = ''; // fastest DOM clear
  const _tlFrag = document.createDocumentFragment();

  const filtered = S.schedule.filter(day => {
    if (S.showOnlyOff) {
      if (!day.activities.some(a => ['OFF','OFF_R','HOL'].includes(a.type))) return false;
    }
    if (S.search) {
      // Search specific fields only — avoids serializing the full object
      const q = S.search;
      const haystack = [
        day.dateIso,
        ...day.activities.flatMap(a => [
          a.type, a.dep, a.arr, a.routeLabel,
          ...(a.legs||[]).flatMap(l => [l.dep, l.arr, l.fltn]),
          ...(a.sessions||[]).map(s => s.name),
          ...(day.remarks||[]),
        ].filter(Boolean))
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });

  if (!filtered.length) {
    const _emptyEl = document.createElement('div'); _emptyEl.className = 'empty-state'; _emptyEl.textContent = 'Nessuna attività corrisponde ai filtri.'; tl.appendChild(_emptyEl);
    return;
  }

  const first = filtered[0];
  // Month + year from roster (Italian, uppercase)
  const _IT_MONTHS = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO',
    'LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
  const _rosterIso = first.dateIso; // e.g. "2026-03-01"
  const _rMonth = parseInt(_rosterIso.slice(5,7),10) - 1;
  const _rYear  = _rosterIso.slice(0,4);
  document.getElementById('headerDate').textContent = _IT_MONTHS[_rMonth] + ' ' + _rYear;
  document.getElementById('headerMeta').textContent = 'INDIVIDUAL PLAN · UTC';
  if (S.flightHours || S.dayOff || S.sbYDays) {
    document.getElementById('statFH').textContent  = S.flightHours || '—';
    document.getElementById('statOFF').textContent = S.dayOff      || '—';
    document.getElementById('statSBY').textContent = S.sbYDays     || '—';
    document.getElementById('headerStats').style.display = 'flex';
  }
  // Holidays pill: show only when > 0
  const _holPill = document.getElementById('statHolPill');
  if (_holPill) {
    const _holN = parseInt(S.holidays || '0', 10);
    if (_holN > 0) {
      document.getElementById('statHOL').textContent = S.holidays;
      _holPill.style.display = 'flex';
    } else {
      _holPill.style.display = 'none';
    }
  }
  startCountdown();

  // ── Compute turno spans
  // A turno is: FLIGHT/DH day → ≥1 LAYOVER days → FLIGHT/DH day
  const turnoRole = new Map();
  const turnoData = new Map(); // startIso → summary object

  // Sum blockUtc "HH:MM" strings → "HH:MM"
  const sumBlock = legs => {
    let mins = 0;
    for (const l of legs) {
      if (!l.blockUtc) continue;
      const [h, m] = l.blockUtc.split(':').map(Number);
      if (!isNaN(h)) mins += h * 60 + m;
    }
    return mins ? String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0') : null;
  };

  const dayTypes = d => new Set(d.activities.map(a => a.type));

  // A FLIGHT day that contains ONLY overnight-arrival legs (dep===null) is a
  // "continuation day" — it belongs to the previous duty, not a standalone flight day.
  // Example: 10/10 has leg {dep:null, arr:'NKG'} — the arrival of the 09/10 overnight.
  const isContinuationOnly = d =>
    dayTypes(d).has('FLIGHT') &&
    d.activities.every(a => a.type !== 'FLIGHT' || a.legs.every(l => l.dep === null));

  // Helper: is this day a "duty day" (has FLIGHT or DH, excluding pure continuation arrivals)
  // NOTE: TRAINING/office days are NOT duty days — they don't trigger turno blocks
  const isDutyDay = d =>
    dayTypes(d).has('DH') ||
    (dayTypes(d).has('FLIGHT') && d.activities.some(a => a.type === 'FLIGHT' && a.legs.some(l => l.dep !== null)));

  // Build turno spans: any contiguous block of duty/layover/continuation days
  // Algorithm: scan filtered[], group consecutive days that are duty or layover or continuation-only.
  // Each such group becomes a turno block if it has at least one duty day.
  const alreadyInTurno = new Set();

  for (let i = 0; i < filtered.length; i++) {
    if (alreadyInTurno.has(filtered[i].dateIso)) continue;

    const dt = dayTypes(filtered[i]);
    // Start only on a real duty day (FLIGHT with real dep, or DH)
    if (!isDutyDay(filtered[i])) continue;

    // Walk forward: a turno continues as long as the crew ends the day away from base.
    //
    // "ends away from base" means the day's LAST meaningful signal is an overnight:
    //   - LAYOVER activity
    //   - hotel flag on any FLIGHT leg
    //   - hotel flag on a DH activity
    //   - open overnight departure (arr === '→')
    //
    // A continuation-only day (pure arrival) does NOT count as "away" by itself —
    // it may also have a DH that brings the crew home (e.g. 2-nov: >VRN + VRN→MXP DH).
    // We check the non-continuation activities on that day for hotel/overnight signals.

    const endsAwayFromBase = d => {
      // Explicit LAYOVER activity = away
      if (dayTypes(d).has('LAYOVER')) return true;
      // Day-level hotel flag (HTL in remarks of date/dots line)
      if (d.hotel) return true;
      // Any flight leg with hotel flag or open overnight
      if (d.activities.some(a =>
        a.type === 'FLIGHT' && a.legs &&
        a.legs.some(l => l.hotel || l.arr === '→')
      )) return true;
      // Any DH with hotel flag
      if (d.activities.some(a => a.type === 'DH' && a.hotel)) return true;
      return false;
    };

    let e = i;
    while (e + 1 < filtered.length) {
      const cur  = filtered[e];
      const next = filtered[e + 1];
      const ndt  = dayTypes(next);

      // Always absorb explicit LAYOVER days (hotel nights in plan)
      if (ndt.has('LAYOVER')) { e++; continue; }

      // Always absorb continuation-only arrivals — they belong to the overnight
      // that started on the previous day (already in span)
      if (isContinuationOnly(next)) { e++; continue; }

      // Absorb next duty day only if current day ends away from base
      if (isDutyDay(next) && endsAwayFromBase(cur)) { e++; continue; }

      // Special case: same-night turnaround — crew arrives at a non-base airport,
      // stays overnight without hotel booking, departs again from same airport next day.
      // Detect: last arrival of cur === first departure of next, AND it's NOT the home base.
      if (isDutyDay(next)) {
        const _HOME = new Set(['MXP','BGY','LIN','VRN']); // Italian bases — not "away"
        const _lastArr = (() => {
          for (let ai = cur.activities.length-1; ai >= 0; ai--) {
            const a = cur.activities[ai];
            if (a.type === 'FLIGHT' && a.legs) {
              for (let li = a.legs.length-1; li >= 0; li--) {
                if (a.legs[li].arr && a.legs[li].arr !== '→') return a.legs[li].arr;
              }
            }
            if (a.type === 'DH' && a.arr) return a.arr;
          }
          return null;
        })();
        const _firstDep = (() => {
          for (const a of next.activities) {
            if (a.type === 'FLIGHT' && a.legs) {
              for (const l of a.legs) { if (l.dep) return l.dep; }
            }
            if (a.type === 'DH' && a.dep) return a.dep;
          }
          return null;
        })();
        // Only merge if arriving/departing from a non-base airport
        if (_lastArr && _firstDep && _lastArr === _firstDep && !_HOME.has(_lastArr)) {
          e++; continue;
        }
      }

      break;
    }

    // The span is filtered[i..e]. Mark roles.
    // s = first duty day, e_last = last duty/continuation day
    turnoRole.set(filtered[i].dateIso, 'start');
    for (let k = i + 1; k < e; k++) turnoRole.set(filtered[k].dateIso, 'mid');
    if (e > i) turnoRole.set(filtered[e].dateIso, 'end');

    for (let k = i; k <= e; k++) alreadyInTurno.add(filtered[k].dateIso);

    // ── Collect ALL legs across full span [i..e] (including continuation days)
    const flightLegs = [];
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) flightLegs.push(...act.legs);
      }
    }

    // ── routeParts: sequence [{iata, dh}]
    // Build ordered list of segments, then clip to [firstOnDuty..lastOnDuty].
    // Everything before firstOnDuty and after lastOnDuty is greyed as DH.
    //
    // Overnight legs: dep=IATA arr='→' on day N; continuation leg dep=null arr=IATA on day N+1.
    // We pair them: overnight dep becomes from, continuation arr becomes to.
    // Step 1: collect all continuation arrivals keyed by day index (for lookup)
    const _contArrs = new Map(); // dayIdx → arr IATA of continuation leg
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) {
          for (const l of act.legs) {
            if (l.dep === null && l.arr && l.arr !== '→' && l.arr !== '—')
              _contArrs.set(k, l.arr); // e.g. day k has continuation arrival ZNZ
          }
        }
      }
    }
    // Step 2: build segments in order — include dayIdx for same-day grouping
    const _segments = []; // [{from, to, onDuty, dayIdx}]
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.type === 'FLIGHT' && act.legs) {
          for (const l of act.legs) {
            // Skip degenerate legs (no real IATA dep) and training-derived legs
            if (!l.dep || l.dep === '→') continue;
            if (!/^[A-Z]{3}$/.test(l.dep)) continue; // must be a real IATA
            if (l.arr && l.arr !== '→' && l.arr !== '—') {
              if (!/^[A-Z]{3}$/.test(l.arr)) continue; // arr must also be real IATA
              _segments.push({ from: l.dep, to: l.arr, onDuty: true, dayIdx: k });
            } else if (l.arr === '→') {
              const contArr = _contArrs.get(k + 1) || null;
              _segments.push({ from: l.dep, to: contArr, onDuty: true, dayIdx: k });
            }
          }
        }
        if (act.type === 'DH' && act.dep && act.arr) {
          _segments.push({ from: act.dep, to: act.arr, onDuty: false, dayIdx: k });
        }
        if (act.type === 'TRAINING') {
          _segments.push({ from: null, to: null, onDuty: false, office: true, dayIdx: k });
        }
      }
    }
    // Find first and last on-duty segment index
    const _firstOD = _segments.findIndex(s => s.onDuty);
    const _lastOD  = _segments.reduce((acc,s,idx) => s.onDuty ? idx : acc, -1);
    // Build routeParts: segments outside [_firstOD.._lastOD] are DH (grey)
    const routeParts = [];
    const _pushRP = (iata, dh) => {
      if (!iata) return;
      if (routeParts.length && routeParts[routeParts.length-1].iata === iata) return;
      routeParts.push({ iata, dh });
    };
    _segments.forEach((s, idx) => {
      const grey = _firstOD < 0 || idx < _firstOD || idx > _lastOD;
      _pushRP(s.from, grey);
      if (s.to) _pushRP(s.to, grey);
    });

    // ── Flight hours: completed legs only (arr !== '→')
    const completedLegs = flightLegs.filter(l => l.arr && l.arr !== '→');
    const totalFH = sumBlock(completedLegs);

    // ── Aircraft types from all flight legs
    const acTypes = [...new Set(flightLegs.map(l => l.acType).filter(Boolean))];

    // ── Layover count
    const nLayover = filtered.slice(i + 1, e).filter(d => dayTypes(d).has('LAYOVER')).length;

    // ── End date: last day in span
    const endIso = filtered[e].dateIso;

    // DEBUG — rimuovere dopo verifica
    if (filtered[i].dateIso === '2026-03-12' || filtered[i].dateIso === '2026-03-09') {
      console.log('TURNO', filtered[i].dateIso, '→', endIso, '_segments:', JSON.stringify(_segments));
    }
    // Collect lineCheck / famFlt flags across all days in span
    let spanLineCheck = false, spanFamFlt = false;
    for (let k = i; k <= e; k++) {
      for (const act of filtered[k].activities) {
        if (act.lineCheck) spanLineCheck = true;
        if (act.famFlt)    spanFamFlt    = true;
        if (act.type === 'FLIGHT' && act.legs) {
          for (const l of act.legs) {
            if (l.lineCheck) spanLineCheck = true;
            if (l.famFlt)    spanFamFlt    = true;
          }
        }
      }
    }
    turnoData.set(filtered[i].dateIso, {
      routeParts, segments: _segments, totalFH, acTypes, nLayover,
      lineCheck: spanLineCheck, famFlt: spanFamFlt,
      startIso: filtered[i].dateIso, endIso,
      span: [i, e],
    });
  }

  // ── Build day-groups, then wrap turno spans in collapsible blocks
  // Pass 1: build all day-groups keyed by dateIso
  const dayGroupMap = new Map(); // dateIso → DOM element
  for (const day of filtered) {
    const g = document.createElement('div');
    const _role = turnoRole.get(day.dateIso);
    g.className = 'day-group' + (_role ? ' turno-wrap turno-' + _role : '');
    g.dataset.date = day.dateIso;
    const _p = isoParts(day.dateIso);
    const _WD_IT = {SUN:'Dom',MON:'Lun',TUE:'Mar',WED:'Mer',THU:'Gio',FRI:'Ven',SAT:'Sab',
                     mo:'Lun',tu:'Mar',we:'Mer',th:'Gio',fr:'Ven',sa:'Sab',su:'Dom'};
    const _wdIt = _WD_IT[day.weekdayLabel] || day.weekdayLabel;
    g.innerHTML = `
      <div class="day-label">
        <span class="day-label-num">${_p.d}</span>
        <span class="day-label-wd">${_wdIt}</span>
      </div>
      <div class="day-cards"></div>
    `;
    const _cardsEl = g.querySelector('.day-cards');
    for (const act of day.activities) {
      const el = renderAct(act);
      if (el) _cardsEl.appendChild(el);
    }
    dayGroupMap.set(day.dateIso, g);
  }

  // Pass 2: emit into timeline — turno days wrapped in blocks, others direct
  const emittedDates = new Set();
  for (const day of filtered) {
    if (emittedDates.has(day.dateIso)) continue;
    const _role = turnoRole.get(day.dateIso);

    if (_role === 'start' && turnoData.has(day.dateIso)) {
      const td = turnoData.get(day.dateIso);
      const [s, e] = td.span;
      // Collect all day-groups for this turno span in order
      const dayGroups = [];
      for (let k = s; k <= e; k++) {
        const iso = filtered[k].dateIso;
        if (dayGroupMap.has(iso)) {
          dayGroups.push(dayGroupMap.get(iso));
          emittedDates.add(iso);
        }
      }
      td.dayGroups = dayGroups;
      _tlFrag.appendChild(buildTurnoBlock(td));
    } else {
      _tlFrag.appendChild(dayGroupMap.get(day.dateIso));
      emittedDates.add(day.dateIso);
    }
  }

  // ── Inject DH arrival cards into the following day-group
  // A DH that crosses midnight has its departure on day N and arrival on day N+1.
  // The parser doesn't split DH legs, so we synthesise the arrival card here.
  // Use dayGroupMap (iso→el) for reliable lookup regardless of turno-block nesting.
  for (let fi = 0; fi < filtered.length - 1; fi++) {
    const dayObj = filtered[fi];
    for (const act of dayObj.activities) {
      if (act.type === 'DH' && act.dep && act.arr && nightOffset(act.etd, act.eta) > 0) {
        const ghost = {
          type: 'DH',
          dep: null, arr: act.arr,
          etd: null, eta: act.eta,
          checkInUtc: null,
          flightLabel: act.flightLabel || null,
          trainLabel: act.trainLabel || null,
          service: act.service || null,
          remarks: act.remarks || null,
          dateIso: filtered[fi + 1].dateIso,
        };
        const ghostEl = renderDH(ghost);
        const nextGroup = dayGroupMap.get(filtered[fi + 1].dateIso);
        if (!nextGroup) continue;
        const cardsCol = nextGroup.querySelector('.day-cards') || nextGroup;
        const firstCard = cardsCol.querySelector('.card-dh-dark, .card-flight-dark, .card, .card-off-dark');
        if (firstCard) cardsCol.insertBefore(ghostEl, firstCard);
        else cardsCol.appendChild(ghostEl);
      }
    }
  }

  if (S.unrecognized.length > 0) {
    const dp = document.createElement('div');
    dp.className = 'debug-panel';
    dp.innerHTML = `
      <div class="debug-header" onclick="toggleDebug(this)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span class="debug-title">Righe non riconosciute</span>
        <span class="debug-badge">${S.unrecognized.length}</span>
        <svg class="debug-chevron" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="debug-content">
        ${S.unrecognized.map(l=>`<div class="debug-line">${esc(l)}</div>`).join('')}
      </div>
    `;
    _tlFrag.appendChild(dp);
  }

  // Single DOM write — prevents multiple reflows
  tl.appendChild(_tlFrag);
}

function renderAct(act) {
  switch(act.type) {
    case 'FLIGHT':  return renderFlight(act);
    case 'SBY':     return renderSby(act);
    case 'TRAINING': return renderTraining(act);
    case 'OFF':     return renderOff(act);
    case 'OFF_R':   return renderOffR(act);
    case 'HOL':     return renderHol(act);
    case 'REST':    return renderRest();
    case 'LAYOVER': return renderLayover();
    case 'DH':      return renderDH(act);
    default:        return null;
  }
}

// ── FLIGHT
function renderFlight(act) {
  const frag = document.createDocumentFragment();
  for (let i=0; i<act.legs.length; i++) {
    const leg = act.legs[i];
    if (i > 0) {
      const prev = act.legs[i-1];
      if (prev.ldgUtc && leg.toUtc) {
        const gt = timeDiff(prev.ldgUtc, leg.toUtc);
        const gtEl = document.createElement('div');
        gtEl.className = 'ground-time';
        gtEl.textContent = 'TURNAROUND TIME · ' + gt;
        frag.appendChild(gtEl);
      }
    }
    const fltn = leg.fltn && leg.fltn !== '—' ? 'NO ' + leg.fltn : '—';
    const badges = [
      leg.ext   ? '<span class="cfd-badge-ext">⚡ EXT</span>' : '',
      leg.hotel ? '<span class="cfd-badge-htl">🏨 HTL</span>' : '',
    ].filter(Boolean).join('');
    const card = document.createElement('div');
    card.className = 'card-flight-dark' +
      (leg.lineCheck ? ' has-lc' : '') +
      (leg.famFlt    ? ' has-fam' : '');
    // Split card rendering based on whether this leg crosses midnight
    const isCont = !leg.dep && leg.arr;   // continuation (arrival-only) leg
    const isDepart = leg.multiDay === true; // departure-only leg (open overnight)
    let rightHtml;
    if (isDepart) {
      // Departure card: DEP STD → arrow → midnight indicator
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.dep) + '</div>' +
          '<div class="cfd-time">' + (leg.toUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STD</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          (leg.blockUtc ? '<span class="cfd-fh">' + leg.blockUtc + '</span>' : '') +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata cfd-iata-cont">···</div>' +
          '<div class="cfd-time" style="opacity:0.35">—</div>' +
          '<div class="cfd-lbl">→ +1</div>' +
        '</div>';
    } else if (isCont) {
      // Arrival card: continuation from previous day
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata cfd-iata-cont">···</div>' +
          '<div class="cfd-time" style="opacity:0.35">—</div>' +
          '<div class="cfd-lbl">← −1</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.arr) + '</div>' +
          '<div class="cfd-time">' + (leg.ldgUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STA</div>' +
        '</div>';
    } else {
      // Normal same-day leg
      rightHtml =
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.dep) + '</div>' +
          '<div class="cfd-time">' + (leg.toUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STD</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          (leg.blockUtc ? '<span class="cfd-fh">' + leg.blockUtc + '</span>' : '') +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(leg.arr) + '</div>' +
          '<div class="cfd-time">' + (leg.ldgUtc||'—') + '</div>' +
          '<div class="cfd-lbl">STA</div>' +
        '</div>';
    }
    card.innerHTML =
      '<div style="display:flex">' +
        '<div class="cfd-left">' +
          '<div class="cfd-fltn">' + esc(fltn) + '</div>' +
          '<div class="cfd-meta">' +
            '<span class="cfd-ci-label">CI</span>' +
            '<span class="cfd-ci">' + (leg.checkInUtc || '—') + '</span>' +
          '</div>' +
          (leg.acType ? '<span class="cfd-ac">' + esc(leg.acType) + '</span>' : '') +
          (badges ? '<div class="cfd-badges">' + badges + '</div>' : '') +
        '</div>' +
        '<div class="cfd-divider"></div>' +
        '<div class="cfd-right">' + rightHtml + '</div>' +
      '</div>';
    const fr = remarksHtml(leg);
    if (fr) card.insertAdjacentHTML('beforeend', fr);
    frag.appendChild(card);
  }
  return frag;
}

// ── SBY
function _sbyCoreCard(timeHtml, extraRemarks) {
  const c = document.createElement('div'); c.className = 'card-sby-dark';
  c.innerHTML =
    '<div class="sby-left">' +
      '<div class="sby-code">SBY</div>' +
      '<div class="sby-label">STANDBY</div>' +
    '</div>' +
    '<div class="sby-right">' +
      '<div class="sby-times">' + timeHtml + '<span class="sby-utc">UTC</span></div>' +
    '</div>';
  if (extraRemarks) c.insertAdjacentHTML('beforeend', extraRemarks);
  return c;
}
function renderSby(act) {
  if (act.openEnd) {
    // Parser already flagged as open-end: "HH:MM →" on departure day
    const timeHtml =
      '<span class="sby-time">' + act.startUtc + '</span>' +
      '<span class="sby-sep">→</span>' +
      '<span class="sby-time sby-overflow">+1</span>';
    const c = _sbyCoreCard(timeHtml, null);
    const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
    return c;
  }
  if (act.openStart) {
    // Parser already flagged as open-start: "← HH:MM" on arrival day
    const timeHtml =
      '<span class="sby-time sby-overflow">←</span>' +
      '<span class="sby-sep"></span>' +
      '<span class="sby-time">' + act.endUtc + '</span>';
    const c = _sbyCoreCard(timeHtml, null);
    const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
    return c;
  }
  // Full SBY: check if it crosses midnight (endUtc < startUtc as strings, e.g. "02:00" < "22:00")
  const crossMid = act.startUtc && act.endUtc && act.endUtc < act.startUtc;
  if (crossMid) {
    // Split into two cards: departure side + arrival side
    const frag = document.createDocumentFragment();
    const depHtml =
      '<span class="sby-time">' + act.startUtc + '</span>' +
      '<span class="sby-sep">→</span>' +
      '<span class="sby-time sby-overflow">+1</span>';
    const arrHtml =
      '<span class="sby-time sby-overflow">←</span>' +
      '<span class="sby-sep"></span>' +
      '<span class="sby-time">' + act.endUtc + '</span>';
    frag.appendChild(_sbyCoreCard(depHtml, null));
    const arrCard = _sbyCoreCard(arrHtml, null);
    const sr = remarksHtml(act); if (sr) arrCard.insertAdjacentHTML('beforeend', sr);
    frag.appendChild(arrCard);
    return frag;
  }
  // Normal same-day SBY
  const timeHtml =
    '<span class="sby-time">' + (act.startUtc||'—') + '</span>' +
    '<span class="sby-sep">–</span>' +
    '<span class="sby-time">' + (act.endUtc||'—') + '</span>';
  const c = _sbyCoreCard(timeHtml, null);
  const sr = remarksHtml(act); if (sr) c.insertAdjacentHTML('beforeend', sr);
  return c;
}

// ── DEADHEAD
function renderDH(act) {
  const badges =
    '<span class="cfd-dh-badge">DH POSITIONING</span>' +
    (act.service ? ' <span class="cfd-service-badge">' + esc(act.service) + '</span>' : '');
  const arrowInner =
    act.trainLabel  ? '<span class="cfd-train-label">' + esc(act.trainLabel) + '</span>'
    : act.flightLabel ? '<span class="cfd-train-label">' + esc(act.flightLabel) + '</span>'
    : '<span class="cfd-arrow-plane">✈</span>';
  const leftPanel =
    '<div class="cfd-left">' +
      '<div class="cfd-fltn">DH</div>' +
      '<div class="cfd-meta">' +
        '<span class="cfd-ci-label">CI</span>' +
        '<span class="cfd-ci">' + (act.checkInUtc || '—') + '</span>' +
      '</div>' +
      '<div class="cfd-badges">' + badges + '</div>' +
    '</div>' +
    '<div class="cfd-divider"></div>';

  // Departure side: suppress ARR when crossing midnight
  const isDepart = !act.dep && act.arr;   // arrival-only leg (cont from yesterday)
  const isCross  = act.dep && act.arr && nightOffset(act.etd, act.eta) > 0;

  let rightHtml;
  if (isDepart) {
    rightHtml =
      '<div class="cfd-airport">' +
        '<div class="cfd-iata cfd-iata-cont">···</div>' +
        '<div class="cfd-time" style="opacity:0.35">—</div>' +
        '<div class="cfd-lbl">← −1</div>' +
      '</div>' +
      '<div class="cfd-arrow"><div class="cfd-arrow-row"><div class="cfd-arrow-line"></div>' + arrowInner + '</div></div>' +
      '<div class="cfd-airport">' +
        '<div class="cfd-iata">' + esc(act.arr) + '</div>' +
        '<div class="cfd-time">' + (act.eta||'—') + '</div>' +
        '<div class="cfd-lbl">STA</div>' +
      '</div>';
  } else if (isCross) {
    rightHtml =
      '<div class="cfd-airport">' +
        '<div class="cfd-iata">' + esc(act.dep) + '</div>' +
        '<div class="cfd-time">' + (act.etd||'—') + '</div>' +
        '<div class="cfd-lbl">STD</div>' +
      '</div>' +
      '<div class="cfd-arrow"><div class="cfd-arrow-row"><div class="cfd-arrow-line"></div>' + arrowInner + '</div></div>' +
      '<div class="cfd-airport">' +
        '<div class="cfd-iata cfd-iata-cont">···</div>' +
        '<div class="cfd-time" style="opacity:0.35">—</div>' +
        '<div class="cfd-lbl">→ +1</div>' +
      '</div>';
  } else {
    rightHtml =
      '<div class="cfd-airport">' +
        '<div class="cfd-iata">' + esc(act.dep) + '</div>' +
        '<div class="cfd-time">' + (act.etd||'—') + '</div>' +
        '<div class="cfd-lbl">STD</div>' +
      '</div>' +
      '<div class="cfd-arrow"><div class="cfd-arrow-row"><div class="cfd-arrow-line"></div>' + arrowInner + '</div></div>' +
      '<div class="cfd-airport">' +
        '<div class="cfd-iata">' + esc(act.arr) + '</div>' +
        '<div class="cfd-time">' + (act.eta||'—') + '</div>' +
        '<div class="cfd-lbl">STA</div>' +
      '</div>';
  }

// ── TODAY / FAB ──────────────────────────────────────────────

function _localDateIso() {
  // Returns today in YYYY-MM-DD using LOCAL time (not UTC).
  // toISOString() is UTC and gives wrong date in UTC+1/+2 timezones.
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function _todayTarget() {
  if (!S.schedule.length) return null;
  const todayIso = _localDateIso();
  const dates = S.schedule.map(d => d.dateIso);
  const first = dates[0], last = dates[dates.length - 1];
  if (todayIso >= first && todayIso <= last) {
    // Find exact date; if not in schedule (gap day), take nearest after
    const target = dates.find(d => d === todayIso)
                || dates.find(d => d >  todayIso)
                || first;
    return { dateIso: target, isCurrent: true };
  }
  return { dateIso: first, isCurrent: false };
}

// Calcola la posizione assoluta di un elemento nel documento
// (non dipende da getBoundingClientRect, funziona anche fuori dal viewport)
function _getDocumentTop(el) {
  if (!el) return 0;
  return el.getBoundingClientRect().top + window.scrollY;
}

function _flashDay(target) {
  if (!target) return;
  target.classList.remove('today-flash');
  void target.offsetWidth;
  target.classList.add('today-flash');
  setTimeout(() => target.classList.remove('today-flash'), 2100);
}

function _flashTurno(el) {

  if (!block) return;

  block.classList.add('turno-flash');
  setTimeout(() => block.classList.remove('turno-flash'), 2100);
}

function _expandTurnoContaining(el) {
  const block = el?.closest('.turno-block');
  if (block && !block.classList.contains('expanded')) block.classList.add('expanded');
}

function scrollToToday(animated) {
  const tt = _todayTarget();
