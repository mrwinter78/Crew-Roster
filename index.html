<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewRoster — NEOS Individual Plan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #F6F7F9;
    --surface: #FFFFFF;
    --border: #E8EAED;
    --text-primary: #1A1D23;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --accent-flight: #2563EB;
    --accent-sby: #EA580C;
    --accent-off: #329F5B;
    --accent-holiday: #7C3AED;
    --accent-training: #374151;
    --accent-layover: #0891B2;
    --accent-dh: #6B7280;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* All numeric/time values use DM Mono globally */
  .mono { font-family: 'JetBrains Mono', monospace; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(246,247,249,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 10px;
  }
  .header-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-date {
    font-size: 20px; font-weight: 700; letter-spacing: -0.4px;
    color: var(--text-primary); line-height: 1.1;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-meta {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.9px; margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-range {
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; margin-top: 1px;
  }
  .header-stats {
    display: none;
    align-items: center;
    gap: 0;
    margin-top: 8px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(8px);
  }
  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 7px 14px;
    gap: 1px;
    border-right: 1px solid var(--border);
    flex: 1;
  }
  .stat-pill:last-child { border-right: none; }
  .stat-value {
    font-size: 15px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .stat-pill.stat-fh .stat-value  { color: var(--accent-flight); }
  .stat-pill.stat-off .stat-value { color: var(--accent-off); }
  .stat-pill.stat-sby .stat-value { color: var(--accent-sby); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; color: var(--text-secondary);
  }
  .btn-icon:hover { background: var(--border); }
  .btn-icon.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    background: var(--surface); padding: 48px 24px; text-align: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent-flight); background: #EEF3FF;
  }
  .upload-icon {
    width: 54px; height: 54px; margin: 0 auto 14px;
    background: var(--bg); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
  }
  .upload-title { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
  .upload-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .upload-format {
    display: inline-block; background: #F0FDF4; color: #166534;
    border: 1px solid #BBF7D0; border-radius: 8px;
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.4px; margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--text-primary); color: white; border: none;
    border-radius: 10px; padding: 10px 20px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  .import-banner {
    background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; animation: fadeUp 0.3s ease both;
  }
  .import-banner-icon { color: #16A34A; flex-shrink: 0; }
  .import-banner-text { font-size: 13px; font-weight: 500; color: #166534; }
  .import-banner-btn {
    margin-left: auto; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1;
  }

  .filters {
    display: flex; gap: 8px; margin-bottom: 16px;
    flex-wrap: wrap; animation: fadeUp 0.35s ease both;
  }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px; font-size: 12px;
    font-weight: 500; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
  .filter-chip:hover:not(.active) { background: var(--border); }
  .search-input {
    flex: 1; min-width: 100px; padding: 6px 12px;
    border: 1px solid var(--border); border-radius: 20px;
    font-family: inherit; font-size: 12px; background: var(--surface);
    color: var(--text-primary); outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent-flight); }

  .day-group { margin-bottom: 20px; animation: fadeUp 0.4s ease both; }

  /* TURNO connector — vertical line only in the gap between day-groups */
  .turno-wrap {
    position: relative;
  }
  /* The ::before covers only the bottom margin (gap to next card) */
  .turno-wrap::before {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 100%;
    height: 20px; /* matches margin-bottom of .day-group */
    width: 2px;
    background: #3B82F6;
    opacity: 0.35;
    pointer-events: none;
  }
  /* Last day: no line after it */
  .turno-wrap.turno-end::before {
    display: none;
  }
  .day-label {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 8px;
    padding: 0;
  }
  .day-label-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 800;
    color: #0F172A;
    line-height: 1;
    min-width: 54px;
    letter-spacing: -1px;
  }
  .day-label-mid {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
    flex: 1;
  }
  .day-label-month {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #475569;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    line-height: 1;
  }
  .day-label-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: #94A3B8;
    letter-spacing: 0.5px;
    line-height: 1;
    margin-top: 2px;
  }
  .day-label-wd {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #F1F5F9;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: #334155;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 3px 8px;
    line-height: 1;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; display: flex; margin-bottom: 8px;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card-bar { width: 4px; flex-shrink: 0; }
  .bar-flight   { background: var(--accent-flight); }
  .bar-sby      { background: var(--accent-sby); }
  .bar-off      { background: var(--accent-off); }
  .bar-layover  { background: var(--accent-layover); }
  .bar-dh       { background: var(--accent-dh); }
  .bar-rest     { background: #C4C4C4; }

  .card-body { padding: 12px 14px; flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 1px; letter-spacing: -0.2px;
  }
  .card-subtitle {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.6px; margin-bottom: 8px;
  }
  .card-row {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; flex-wrap: wrap;
  }
  .card-row:last-child { margin-bottom: 0; }
  .lbl { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }
  .sep { color: var(--border); }
  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; white-space: nowrap;
  }
  .b-flight  { background: #EEF3FF; color: var(--accent-flight); }
  .b-sby     { background: #FFF4EE; color: var(--accent-sby); }
  .b-dh      { background: #F3F4F6; color: #374151; }
  .b-layover { background: #ECFEFF; color: var(--accent-layover); }
  .b-hotel   { background: #FDF4FF; color: #7E22CE; margin-left: 4px; }

  .bar-hol { background: #10B981; }
  .card-hol { border-left: none; }

  /* DARK FLIGHT CARD */
  .card-flight-dark {
    background: #1B2A4A;
    border-radius: 14px;
    margin-bottom: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .cfd-left {
    padding: 13px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    width: 148px;
    flex-shrink: 0;
    flex-grow: 0;
  }
  .cfd-fltn {
    font-size: 17px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cfd-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cfd-ac {
    font-size: 11px;
    font-weight: 700;
    color: #7DD3FC;
    letter-spacing: 0.8px;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(125,211,252,0.12);
    padding: 2px 7px;
    border-radius: 5px;
  }
  .cfd-ci {
    font-size: 13px;
    font-weight: 800;
    color: #FCD34D;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }
  .cfd-ci-label {
    font-size: 10px;
    font-weight: 600;
    color: #94A3B8;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .cfd-divider {
    width: 1px;
    background: rgba(255,255,255,0.08);
    align-self: stretch;
    flex-shrink: 0;
  }
  .cfd-right {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .cfd-airport {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .cfd-iata {
    font-size: 20px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .cfd-time {
    font-size: 15px;
    font-weight: 700;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }
  .cfd-arrow {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 6px;
    gap: 3px;
  }
  .cfd-fh {
    font-size: 12px;
    font-weight: 700;
    color: #BFDBFE;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    white-space: nowrap;
    opacity: 0.9;
  }
  .card-dh-dark .cfd-fh { color: rgba(255,255,255,0.6); }
  .cfd-arrow-row {
    width: 100%;
    display: flex;
    align-items: center;
    position: relative;
  }
  .cfd-arrow-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, rgba(59,130,246,0.4) 0%, rgba(96,165,250,0.4) 100%);
  }
  .cfd-arrow-plane {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #60A5FA;
    line-height: 1;
    background: #1B2A4A;
    padding: 0 4px;
  }
  .cfd-nextday {
    font-size: 9px;
    font-weight: 700;
    color: #FBBF24;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .card-dh-dark .cfd-nextday { color: #FDE68A; }

  .cfd-lbl {
    font-size: 9px;
    font-weight: 700;
    color: #64748B;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .cfd-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .cfd-badge-overnight {
    font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
    color: #A78BFA; background: rgba(167,139,250,0.12);
    border-radius: 4px; padding: 2px 6px;
  }
  .cfd-badge-htl {
    font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
    color: #34D399; background: rgba(52,211,153,0.12);
    border-radius: 4px; padding: 2px 6px;
  }

  /* TRAINING / OFFICE DUTY CARD */
  .card-training {
    background: #1E3A5F;
    border-radius: 14px;
    margin-bottom: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(30,58,95,0.28);
    display: flex;
    align-items: stretch;
  }
  .trn-left {
    background: #162D4A;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    width: 148px;
    flex-shrink: 0;
  }
  .trn-code {
    font-size: 11px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .trn-sub {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .trn-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 14px;
    gap: 5px;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .trn-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .trn-item-name {
    font-size: 13px;
    font-weight: 700;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    flex: 1;
  }
  .trn-item-times {
    font-size: 12px;
    font-weight: 600;
    color: #93C5FD;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .trn-item-loc {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .trn-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 1px 0;
  }

  /* OFF CARD */
  .card-off-dark {
    background: #329F5B;
    border-radius: 14px;
    margin-bottom: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(50,159,91,0.30);
    display: flex;
    align-items: stretch;
  }
  .off-left {
    background: #267D47;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 3px;
    width: 100%;
  }
  .off-code {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    line-height: 1;
  }
  .off-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.65);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }

  /* SBY CARD */
  .card-sby-dark {
    background: #EA580C;
    border-radius: 14px;
    margin-bottom: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(234,88,12,0.30);
    display: flex;
    align-items: stretch;
  }
  .sby-left {
    background: #C44A08;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 3px;
    width: 148px;
    flex-shrink: 0;
  }
  .sby-code {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    line-height: 1;
  }
  .sby-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.65);
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }
  .sby-right {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-left: 1px solid rgba(255,255,255,0.15);
  }
  .sby-times {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .sby-time {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .sby-sep {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    font-family: 'JetBrains Mono', monospace;
  }
  .sby-utc {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    margin-left: 2px;
  }

  /* DH DARK CARD */
  .card-dh-dark {
    background: #87919E;
    border-radius: 14px;
    margin-bottom: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.14);
  }
  .card-dh-dark .cfd-left        { background: #6B7480; }
  .card-dh-dark .cfd-fltn        { color: #FFFFFF; }
  .card-dh-dark .cfd-ci          { color: #FCD34D; font-weight: 800; }
  .card-dh-dark .cfd-ci-label    { color: rgba(255,255,255,0.65); }
  .card-dh-dark .cfd-iata        { color: #FFFFFF; }
  .card-dh-dark .cfd-time        { color: #FFFFFF; font-size: 14px; font-weight: 700; }
  .card-dh-dark .cfd-lbl         { color: rgba(255,255,255,0.6); }
  .card-dh-dark .cfd-divider     { background: rgba(255,255,255,0.2); }
  .card-dh-dark .cfd-arrow-line  { background: rgba(255,255,255,0.35); }
  .card-dh-dark .cfd-arrow-plane { color: #FFFFFF; background: #87919E; }
  .card-dh-dark .cfd-dh-badge    { color: #FFFFFF; background: rgba(255,255,255,0.18); }
  .card-dh-dark .cfd-service-badge { color: #FFFFFF; background: rgba(255,255,255,0.18); }
  .cfd-dh-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px;

<script>
// ─────────────────────────────────────────────────────────────
// PDF.js
// ─────────────────────────────────────────────────────────────
if (typeof pdfjsLib !== 'undefined') {
  // Try to use the worker; fall back to main thread if unavailable
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  } catch(e) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = '';
  }
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const S = { schedule:[], showOff:true, search:'', unrecognized:[], crewName:'', rosterRange:'', flightHours:'', dayOff:'', sbYDays:'' };

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const parseTime = t => {
  if (!t) return null;
  t = String(t).trim().replace(/\./g,':');
  const m4 = t.match(/^(\d{2})(\d{2})$/);
  if (m4) return `${m4[1]}:${m4[2]}`;
  const m5 = t.match(/^(\d{1,2}):(\d{2})$/);
  if (m5) return `${m5[1].padStart(2,'0')}:${m5[2]}`;
  return null;
};

const timeDiff = (t1,t2) => {
  if (!t1||!t2) return '—';
  const tm = t => { const[h,m]=t.split(':').map(Number); return h*60+m; };
  let d = tm(t2)-tm(t1); if (d<0) d+=1440;
  return `${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
};

const parseDDMMYYYY = s => {
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m ? `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` : null;
};

const MONTHS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const isoParts = iso => {
  if (!iso) return { d:'', mo:'', y:'' };
  const [y, mo, d] = iso.split('-');
  return { d, mo: MONTHS_EN[+mo-1], y };
};
const isoDisplayEN = iso => {
  if(!iso) return '';
  const[y,mo,d]=iso.split('-');
  return `${d} ${MONTHS_EN[+mo-1]} ${y}`;
};
const isoWD = iso => ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(iso+'T00:00:00Z').getUTCDay()];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ─────────────────────────────────────────────────────────────
// NEOS INDIVIDUAL PLAN PARSER
//
// PDF column layout (approximate char positions in extracted text):
//   DATE(0)  DUTY(16)  CkIn(47)  DH(55)  FLTN(61)  DEP(69)  ARR(76)
//   ETD(84)  ETA(91)   FH(101)   Hotel(111)  Remarks(118)
//
// Day patterns recognised:
//   dd/MM/yyyy  wd  OFF              → OFF day
//   dd/MM/yyyy  wd  LAYOVER          → Hotel layover day
//   dd/MM/yyyy  wd  Stand-by HH-HH   → Standby
//   dd/MM/yyyy  wd  ---              → Rest (unassigned)
//   dd/MM/yyyy  wd  ......  CkIn     → Flight day header (check-in on dotted line)
//
// Continuation lines (no date):
//   ......  CkIn                     → check-in time for next flight
//   <route> DH  DEP ARR ETD ETA      → deadhead / positioning leg
//            DH  DEP ARR ETD ETA     → deadhead (no route label)
//   FLTN  DEP  ARR  ETD  ETA  FH     → regular flight leg
//   FLTN  DEP  >    ETD              → multi-day departure (overnight)
//            >  ARR  ETA  FH         → multi-day arrival (next day)
// ─────────────────────────────────────────────────────────────

function hasIATAFn(s) { return /[A-Z]{3}\s+[A-Z]{3}/.test(s); }

// Returns +1 if arrival time is less than departure (crossed midnight), else 0
function nightOffset(dep, arr) {
  if (!dep || !arr) return 0;
  const toMin = t => { const p = t.split(':'); return +p[0]*60 + +p[1]; };
  return toMin(arr) < toMin(dep) ? 1 : 0;
}

// Given a dateIso (YYYY-MM-DD) and offset in days, returns "dd MMM" string
function arrDateLabel(dateIso, offset) {
  if (!offset) return '';
  const d = new Date(dateIso + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + offset);
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', timeZone:'UTC' }).toUpperCase();
}

function parseNeosRoster(text) {
  const schedule = [];
  const unrecognized = [];

  // Meta extraction
  let crewName = '', rosterRange = '';
  const nm = text.match(/A\/V\s+[RC]\s+([A-Z][A-Z\s]+?)\s{3,}/);
  if (nm) crewName = nm[1].trim().replace(/\s+/g,' ');
  const rm = text.match(/From\s+(\d{2}\/\d{2}\/\d{4})\s+to\s+(\d{2}\/\d{2}\/\d{4})/i);
  if (rm) rosterRange = `${rm[1]} → ${rm[2]}`;
  let flightHours = '', dayOff = '', sbYDays = '';
  const fhM = text.match(/Flight Hours from[^\n]*?([\d]+\.[\d]+)\s+Holidays/i);
  if (fhM) flightHours = fhM[1];
  const offM = text.match(/Day OFF\s+Month\s+([\d]+)/i);
  if (offM) dayOff = offM[1];
  const sbyM2 = text.match(/SBY_Days\s+([\d]+)/i);
  if (sbyM2) sbYDays = sbyM2[1];

  // Split lines, stop at true footer (Flight Hours / Document Expiration).
  // LEGENDA, page headers, and EXT= lines appear between pages — skip them, don't stop.
  const lines = [];
  for (const l of text.split('\n')) {
    const lt = l.trim();
    if (/^(Flight Hours from|DOCUMENT EXPIRATION)/i.test(lt)) break;
    if (/^(LEGENDA|EXT\s*=|\(R\)\s*=|ALL TIMES ARE UTC)/i.test(lt)) continue;
    // Skip repeated page headers (DATE DUTY CkIn..., NEOS S.p.A., print date, A/V R)
    if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date|A\/V\s)/i.test(lt)) continue;
    // Skip bare page numbers like "1" or "2"
    if (/^\d$/.test(lt)) continue;
    lines.push(l);
  }

  // Detect if pdf.js returned lines in reverse order (Y=0 at bottom in PDF coords).
  // Find the first two date lines and check their order.
  const _datePat = /^(\d{2}\/\d{2}\/\d{4})/;
  const _foundDates = lines.map(l => l.match(_datePat)).filter(Boolean).slice(0, 3);
  const _toISO = d => { const p = d.split('/'); return `${p[2]}-${p[1]}-${p[0]}`; };
  if (_foundDates.length >= 2 && _toISO(_foundDates[0][1]) > _toISO(_foundDates[1][1])) {
    lines.reverse(); // pdf.js native coords: flip to top-to-bottom order
  }

  // openOvernightLeg: holds reference to a leg that departed but hasn't landed yet (next-day arrival)
  let curDate = null, curDay = null, pendingCI = null, pendingSby = null;
  let openOvernightLeg = null; // { legRef, sourceDayIso }
  let prevRaw = ''; // track previous line for lone "DH" lookahead
  let lastPendingCI = null; // persists after pendingCI is cleared, for lone-DH case

  const flushDay = () => {
    if (curDay && curDay.activities.length > 0) schedule.push(curDay);
  };

  const newDay = iso => {
    flushDay();
    curDate = iso; pendingCI = null; lastPendingCI = null;
    curDay = { dateIso: iso, weekdayLabel: isoWD(iso), activities: [] };
    // Apply any stand-by that arrived before its date line (pdf.js ordering issue)
    if (pendingSby) {
      curDay.activities.push(pendingSby);
      pendingSby = null;
    }
  };

  const addLeg = leg => {
    const ex = curDay.activities.find(a => a.type === 'FLIGHT');
    if (ex) ex.legs.push(leg);
    else curDay.activities.push({ type: 'FLIGHT', dateIso: curDate, legs: [leg] });
  };

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const trimmed = raw.trim();
    if (i > 0) prevRaw = lines[i - 1]; // always track previous line
    if (!trimmed) continue;

    // ── SKIP: header rows and noise
    if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date|A\/V\s)/i.test(trimmed)) continue;
    if (/^(confermare|Galaxy Service|Biglietti|Wetlease)/i.test(trimmed)) continue; // spill-over remarks

    // ── A) Line starts with dd/MM/yyyy (with or without duty content after weekday)
    const dateLineM = raw.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2})(.*)/);
    if (dateLineM) {
      const iso = parseDDMMYYYY(dateLineM[1]);
      if (!iso) continue;

      const duty = dateLineM[3].trim();

      // BUG-FIX 1: "dd/MM/yyyy wd" with no duty text, or only a time/HTL
      // These are continuation rows that pdf.js extracted with a duplicate date stamp.
      // If curDay already has this same date, don't create a new day — just update pendingCI.
      const isDupDate = curDay && curDay.dateIso === iso;
      if (isDupDate) {
        // Extract check-in time if present (e.g. "02/02/2026 mo 11:00")
        const ciM = duty.match(/^(\d{1,2}:\d{2})(\s+HTL)?$/);
        if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; }
        // It may also be a bare date line with no extra info — just skip
        continue;
      }

      // New day
      newDay(iso);

      // Empty duty (bare date line like "05/02/2026 th") → flight day, no special activity
      if (!duty) continue;

      if (/^OFF$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'OFF' }); continue;
      }
      if (/^-\s*OFF\(R\)$/i.test(duty) || /^OFF\(R\)$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'OFF_R' }); continue;
      }
      if (/^Holidays$/i.test(duty)) {
        pendingSby = null;
        curDay.activities.push({ type: 'HOL' }); continue;
      }
      if (/^LAYOVER/i.test(duty)) {
        curDay.activities.push({ type: 'LAYOVER' }); continue;
      }
      if (/^---+$/.test(duty)) {
        curDay.activities.push({ type: 'REST' }); continue;
      }
      // Stand-by
      const sbyM = duty.match(/Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
      if (sbyM) {
        pendingSby = null; // clear any buffered sby — this day has its own
        curDay.activities.push({
          type:'SBY', label:'Home Stand-by',
          startUtc: parseTime(sbyM[1]), endUtc: parseTime(sbyM[2])
        }); continue;
      }
      // Dotted = check-in on same line, possibly followed by overnight arrival
      if (/^\.{5,}/.test(duty)) {
        const ciM = raw.match(/\.{5,}\s+(\d{1,2}:\d{2})/);
        if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; }
        // Check if line also contains overnight arrival "  >  ARR  HH:MM  HH.HH"
        const oaM = raw.match(/>\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.]\d{2})/);
        if (oaM && openOvernightLeg) {
          openOvernightLeg.arr = oaM[1];
          openOvernightLeg.ldgUtc = parseTime(oaM[2]);
          openOvernightLeg.blockUtc = parseTime(oaM[3].replace('.',':'));
          openOvernightLeg.multiDay = false;
          openOvernightLeg = null;
        }
        continue;
      }
      // BUG-FIX 2: bare time (check-in) on duty column, e.g. "14/02/2026 sa 05:00"
      const bareTimeM = duty.match(/^(\d{1,2}:\d{2})(\s+HTL)?$/);
      if (bareTimeM) {
        pendingCI = parseTime(bareTimeM[1]); lastPendingCI = pendingCI;
        continue;
      }
      // Training / office duty on date line
      // duty may be "EST" alone, or "EST 08:00 12:00 Aula 4" (all in one token from pdf.js)
      if (/^[A-Z]/.test(duty) && !hasIATAFn(raw)) {
        // Try to extract times from duty itself first, then from full raw line
        const dutyTimeM = duty.match(/^(.+?)\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s*(.*)?$/);
        const rawTimeM  = !dutyTimeM && raw.match(/(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
        if (dutyTimeM || rawTimeM) {
          let sessionName, t1, t2, loc;
          if (dutyTimeM) {
            sessionName = dutyTimeM[1].trim();
            t1 = parseTime(dutyTimeM[2]); t2 = parseTime(dutyTimeM[3]);
            loc = (dutyTimeM[4]||'').trim().replace(/^HTL\s*/i,'');
          } else {
            sessionName = duty;
            t1 = parseTime(rawTimeM[1]); t2 = parseTime(rawTimeM[2]);
            const locM = raw.match(/\d{1,2}:\d{2}\s+\d{1,2}:\d{2}\s+([\w][\w\s\d]*)$/);
            loc = locM ? locM[1].trim() : '';
          }
          let trn = curDay.activities.find(a => a.type === 'TRAINING');
          if (!trn) { trn = { type:'TRAINING', location: loc, sessions:[] }; curDay.activities.push(trn); }
          trn.sessions.push({ name: sessionName, start: t1, end: t2, loc });
          continue;
        }
      }
      // Anything else — try as continuation
      { const ref = {leg: openOvernightLeg}; parseCont(raw, curDay, pendingCI, addLeg, unrecognized, ref, curDate); openOvernightLeg = ref.leg; }
      pendingCI = null;
      continue;
    }

    // ── B) Continuation line (no date prefix) — belongs to curDay
    if (!curDay) continue;

    // Dotted check-in line
    if (/^\.{5,}/.test(trimmed)) {
      const ciM = raw.match(/\.{5,}\s+(\d{1,2}:\d{2})/);
      if (ciM) { pendingCI = parseTime(ciM[1]); lastPendingCI = pendingCI; }
      continue;
    }

    // BUG-FIX 3: continuation line that starts with dd/MM/yyyy of a DIFFERENT date
    // e.g. "[2026-02-19] 20/02/2026 LAYOVER HTL" — pdf.js mis-assigned it to prev day
    const contDateM = trimmed.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2}\s+)?(LAYOVER|Holidays|OFF\(R\)|OFF|-\s*OFF\(R\)|Stand-by|---)/i);
    if (contDateM) {
      const iso2 = parseDDMMYYYY(contDateM[1]);
      if (iso2 && iso2 !== curDay.dateIso) {
        newDay(iso2);
        const dtype = contDateM[3].trim().toUpperCase();
        if (dtype === 'OFF') curDay.activities.push({ type:'OFF' });
        else if (/^-?\s*OFF\(R\)$/i.test(contDateM[3].trim())) curDay.activities.push({ type:'OFF_R' });
        else if (/^HOLIDAYS$/i.test(dtype)) curDay.activities.push({ type:'HOL' });
        else if (dtype === 'LAYOVER') curDay.activities.push({ type:'LAYOVER' });
        else if (/stand-by/i.test(contDateM[3])) {
          const sbM2 = trimmed.match(/Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
          if (sbM2) curDay.activities.push({ type:'SBY', label:'Home Stand-by', startUtc:parseTime(sbM2[1]), endUtc:parseTime(sbM2[2]) });
        }
        continue;
      }
    }

    // BUG-FIX 4: continuation line starting with dd/MM/yyyy + bare weekday (no duty)
    // e.g. "23/02/2026 mo" or "26/02/2026 th"
    const contBareDate = trimmed.match(/^(\d{2}\/\d{2}\/\d{4})\s+([a-z]{2})\s*$/i);
    if (contBareDate) {
      const iso3 = parseDDMMYYYY(contBareDate[1]);
      if (iso3 && iso3 !== curDay.dateIso) newDay(iso3);
      continue;
    }

    // Stand-by line without date prefix: save as pending — will be applied to the NEXT day
    // (pdf.js sometimes emits the duty text before the date line for the same row)
    const sbyNaked = !trimmed.match(/^\d{2}\/\d{2}\/\d{4}/)
      && trimmed.match(/^Stand-by\s+(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/i);
    if (sbyNaked) {
      // If next line will be a new date, pendingSby will be applied there.
      // If curDay has no SBY yet AND no subsequent date arrives, add it here as fallback.
      pendingSby = { type:'SBY', label:'Home Stand-by',
        startUtc:parseTime(sbyNaked[1]), endUtc:parseTime(sbyNaked[2]) };
      continue;
    }

    // Lone "DH" line — re-parse previous line as DH
    if (/^DH$/.test(trimmed) && curDay) {
      // prevRaw pattern: "AAA - BBB [FLTN] DEP ARR ETD ETA [remarks]"
      const loneM = prevRaw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})(?:\s+([A-Z]{1,2}\d{2,6}))?\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
      if (loneM) {
        curDay.activities.push({
          type: 'DH', dateIso: curDate,
          dep: loneM[4], arr: loneM[5],
          etd: parseTime(loneM[6]), eta: parseTime(loneM[7]),
          routeLabel: loneM[1] + ' → ' + loneM[2],
          flightLabel: loneM[3] || null,
          checkInUtc: pendingCI || lastPendingCI || null,
        });
        prevRaw = raw;
        continue;
      }
    }

    // Frecciarossa / train label continuation line
    const frecM = trimmed.match(/^(frecciarossa|italo|frecciargento|frecciabianca)\s*(\S+)?/i);
    if (frecM && curDay) {
      const lastDH = [...curDay.activities].reverse().find(a => a.type === 'DH');
      if (lastDH) lastDH.trainLabel = trimmed;
      continue;
    }

    // BUG-FIX 6: LAYOVER HTL as bare continuation (no date)
    if (/^LAYOVER(\s+HTL)?$/i.test(trimmed)) {
      if (!curDay.activities.find(a => a.type === 'LAYOVER'))
        curDay.activities.push({ type:'LAYOVER' });
      continue;
    }

    // Training continuation: session name + two HH:MM + optional location (no date prefix, no IATA)
    if (curDay && /^[A-Z]/.test(trimmed) && !hasIATAFn(trimmed)) {
      // Accept both "NAME  08:00  12:00  Loc" and "NAME 08:00 12:00" (single space from pdf.js)
      const nameM = trimmed.match(/^(.+?)\s{1,}(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s*(.*)?$/);
      if (nameM) {
        const loc = (nameM[4]||'').trim().replace(/^HTL\s*/i,'');
        let trn = curDay.activities.find(a => a.type === 'TRAINING');
        if (!trn) { trn = { type:'TRAINING', location: loc, sessions:[] }; curDay.activities.push(trn); }
        trn.sessions.push({ name: nameM[1].trim(), start: parseTime(nameM[2]), end: parseTime(nameM[3]), loc });
        continue;
      }
    }

    { const ref = {leg: openOvernightLeg}; parseCont(raw, curDay, pendingCI, addLeg, unrecognized, ref, curDate); openOvernightLeg = ref.leg; }
    pendingCI = null;
  }

  flushDay();
  schedule.sort((a,b) => a.dateIso.localeCompare(b.dateIso));
  return { schedule, unrecognized, crewName, rosterRange, flightHours, dayOff, sbYDays };
}

// ── Parse a continuation (non-date) line
function parseCont(raw, day, pendingCI, addLeg, unrecognized, overnightRef, dateIso) {
  const t = raw.trim();
  if (!t) return;
  if (/^(DATE\s+DUTY|NEOS S\.p\.A|INDIVIDUAL PLAN|Print Date)/i.test(t)) return;
  // Skip pure remark spill-overs
  if (/^(confermare|Galaxy Service|Biglietti|Wetlease|R B7)/i.test(t)) return;

  // ─ DH with route label + DH keyword: "MXP - LIN  DH  MXP  LIN  05:00  06:00"
  const dh1 = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})(?:\s+([A-Z]{2}\d{2,6}|\d{2,6}[A-Z]?))?\s+DH\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh1) {
    day.activities.push({
      type:'DH', dep:dh1[4], arr:dh1[5],
      etd:parseTime(dh1[6]), eta:parseTime(dh1[7]),
      routeLabel:`${dh1[1]} → ${dh1[2]}`,
      flightLabel: dh1[3] || null,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    }); return;
  }

  // ─ DH without route label but with DH keyword: "   DH   MXP  LIN  05:00  06:00"
  const dh2 = raw.match(/\bDH\b\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dh2) {
    day.activities.push({
      type:'DH', dep:dh2[1], arr:dh2[2],
      etd:parseTime(dh2[3]), eta:parseTime(dh2[4]),
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    }); return;
  }

  // ─ Galaxy Service / positioning WITHOUT "DH" keyword
  // e.g. "MXP - LIN  MXP  LIN  05:00  06:00  Galaxy Service"
  // Pattern: "AAA - BBB  [spaces]  AAA  BBB  HH:MM  HH:MM"
  const dhGalaxy = raw.match(/([A-Z]{3})\s*[-–]\s*([A-Z]{3})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/);
  if (dhGalaxy) {
    day.activities.push({
      type:'DH', dep:dhGalaxy[3], arr:dhGalaxy[4],
      etd:parseTime(dhGalaxy[5]), eta:parseTime(dhGalaxy[6]),
      routeLabel:`${dhGalaxy[1]} → ${dhGalaxy[2]}`,
      service: /Galaxy/i.test(raw) ? 'Galaxy Service' : undefined,
      checkInUtc: pendingCI || null,
      dateIso: dateIso || null,
    }); return;
  }

  // ─ Regular flight leg: FLTN  DEP  ARR  ETD  ETA  FH
  //   e.g. "   787  MXP  JFK  12:30  21:25  08.55  HTL  R B787"
  const leg1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.:]\d{2})/);
  if (leg1) {
    const acM = raw.match(/\b(B7[0-9]{2})\b/);
    addLeg({
      fltn: leg1[1],
      dep: leg1[2], arr: leg1[3],
      toUtc: parseTime(leg1[4]), ldgUtc: parseTime(leg1[5]),
      blockUtc: parseTime(leg1[6].replace('.',':')),
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw),
      acType: acM ? acM[1] : null,
      multiDay: false,
    }); return;
  }

  // ─ Multi-day departure: "  789  JFK  >  22:00"
  const legMD1 = raw.match(/(\d{2,5})\s+([A-Z]{3})\s+>\s+(\d{1,2}:\d{2})/);
  if (legMD1) {
    const acMD1 = raw.match(/\b(B7[0-9]{2})\b/);
    const newLeg = {
      fltn: legMD1[1], dep: legMD1[2], arr: '→',
      toUtc: parseTime(legMD1[3]), ldgUtc: null, blockUtc: null,
      checkInUtc: pendingCI || null,
      hotel: /HTL/.test(raw), multiDay: true,
      acType: acMD1 ? acMD1[1] : null,
    };
    addLeg(newLeg);
    if (overnightRef) overnightRef.leg = newLeg; // mark as open overnight leg
    return;
  }

  // ─ Multi-day arrival: "      >  MXP  06:00  08.00"
  const legMD2 = raw.match(/>\s+([A-Z]{3})\s+(\d{1,2}:\d{2})\s+([\d]{2}[.]\d{2})/);
  if (legMD2) {
    const openLeg = overnightRef && overnightRef.leg;
    if (openLeg) {
      // Complete the open leg from previous day in-place (mutates the object in the source day)
      openLeg.arr = legMD2[1];
      openLeg.ldgUtc = parseTime(legMD2[2]);
      openLeg.blockUtc = parseTime(legMD2[3].replace('.',':'));
      openLeg.multiDay = false; // now complete
      if (overnightRef) overnightRef.leg = null; // close it
    } else {
      // No open leg — add as standalone arrival segment on this day
      addLeg({
        fltn: '—', dep: '→', arr: legMD2[1],
        toUtc: null, ldgUtc: parseTime(legMD2[2]),
        blockUtc: parseTime(legMD2[3].replace('.',':')),
        checkInUtc: null, hotel: false, multiDay: true,
      });
    }
    return;
  }

  // ─ Fallback
  if (t.length > 5 && !/^[.]{5,}/.test(t)) {
    unrecognized.push(`[${day.dateIso}] ${t}`);
  }
}

// ─────────────────────────────────────────────────────────────
// PDF TEXT EXTRACTION — reconstruct line layout from pdf.js items
// ─────────────────────────────────────────────────────────────
async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const ct = await page.getTextContent();

    // Step 1: collect all items (skip markers that have no .str or .transform)
    const allItems = [];
    for (const item of ct.items) {
      if (!item.str || !item.transform) continue;
      if (!item.str.trim()) continue;
      allItems.push({ str: item.str, x: item.transform[4], y: item.transform[5] });
    }

    // Step 2: bucket items by rounded Y (round to nearest 8pt — NEOS rows differ up to 6pt on same line, row spacing ~12pt to tolerate PDF sub-pixel jitter)
    const buckets = {};
    for (const it of allItems) {
      const yKey = Math.round(it.y / 8) * 8;
      if (!buckets[yKey]) buckets[yKey] = [];
      buckets[yKey].push(it);
    }

    // Step 3: sort buckets top→bottom
    // pdf.js uses native PDF coords: Y=0 at bottom, increases upward → higher Y = earlier in document
    const sortedYs = Object.keys(buckets).map(Number).sort((a, b) => b - a);

    // Step 4: for each row, sort items left→right and join with single spaces
    const pageLines = sortedYs.map(y => {
      const items = buckets[y].sort((a, b) => a.x - b.x);
      return items.map(it => it.str).join(' ');
    });

    pages.push(pageLines.join('\n'));
  }
  return pages.join('\n\f\n');
}

// ─────────────────────────────────────────────────────────────
// FILE HANDLING
// ─────────────────────────────────────────────────────────────
function handleFileSelect(e) {
  const f = e.target.files[0];
  if (f) processPDF(f);
  e.target.value = '';
}

async function processPDF(file) {
  showLoading();
  try {
    if (typeof pdfjsLib === 'undefined') {
      throw new Error('pdf.js non caricato. Controlla la connessione internet e ricarica la pagina.');
    }
    const text = await extractText(file);
    if (!text || text.trim().length < 20) {
      throw new Error('Testo estratto vuoto. Il PDF potrebbe essere una scansione o protetto.');
    }
    window._lastRosterText = text;
    // DEBUG: log lines as parser sees them (after possible reversal)
    const _debugLines = text.split('\n').filter(l => l.trim());
    console.log('=== ROSTER LINES (' + _debugLines.length + ') ===');
    _debugLines.forEach((l,i) => console.log(i, JSON.stringify(l)));
    const { schedule, unrecognized, crewName, rosterRange, flightHours, dayOff, sbYDays } = parseNeosRoster(text);
    console.log('=== SCHEDULE ===', schedule.map(d => d.dateIso + ' ' + d.activities.map(a=>a.type).join(',')));
    if (schedule.length === 0) {
      hideLoading();
      alert('Nessun dato riconosciuto nel PDF.\n\nAssicurati che sia un NEOS Individual Plan con testo selezionabile.');
      return;
    }
    Object.assign(S, { schedule, unrecognized, crewName, rosterRange, flightHours, dayOff, sbYDays });
    showTimeline();
  } catch (err) {
    hideLoading();
    alert('Errore caricamento PDF:\n' + err.message);
    console.error('processPDF error:', err);
  }
}

// ─────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────
function renderSchedule() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const filtered = S.schedule.filter(day => {
    if (!S.showOff) {
      if (day.activities.every(a => ['OFF','REST','LAYOVER'].includes(a.type))) return false;
    }
    if (S.search) return JSON.stringify(day).toLowerCase().includes(S.search);
    return true;
  });

  if (!filtered.length) {
    tl.innerHTML = `<div class="empty-state">Nessuna attività corrisponde ai filtri.</div>`;
    return;
  }

  const first = filtered[0];
  document.getElementById('headerDate').textContent = S.crewName || isoDisplayEN(first.dateIso);
  if (S.flightHours || S.dayOff || S.sbYDays) {
    document.getElementById('statFH').textContent  = S.flightHours || '—';
    document.getElementById('statOFF').textContent = S.dayOff      || '—';
    document.getElementById('statSBY').textContent = S.sbYDays     || '—';
    document.getElementById('headerStats').style.display = 'flex';
  }
  document.getElementById('headerMeta').textContent = 'NEOS INDIVIDUAL PLAN · UTC';
  document.getElementById('headerRange').textContent = S.rosterRange;

  // ── Compute turno spans
  // A turno is: FLIGHT day → ≥1 LAYOVER days → FLIGHT day
  // Mark each day with turnoRole: 'start' | 'mid' | 'end' | null
  const turnoRole = new Map();
  for (let i = 0; i < filtered.length; i++) {
    const types = d => new Set(d.activities.map(a => a.type));
    if (types(filtered[i]).has('LAYOVER')) {
      // find start: scan back for last FLIGHT day before this layover block
      let s = i - 1;
      while (s >= 0 && types(filtered[s]).has('LAYOVER')) s--;
      // find end: scan forward for first FLIGHT day after this layover block
      let e = i + 1;
      while (e < filtered.length && types(filtered[e]).has('LAYOVER')) e++;
      // validate: both ends must be FLIGHT or DH days
      const startHasFlight = s >= 0 && (types(filtered[s]).has('FLIGHT') || types(filtered[s]).has('DH'));
      const endHasFlight   = e < filtered.length && (types(filtered[e]).has('FLIGHT') || types(filtered[e]).has('DH'));
      if (startHasFlight && endHasFlight) {
        turnoRole.set(filtered[s].dateIso, 'start');
        for (let k = s + 1; k < e; k++) turnoRole.set(filtered[k].dateIso, 'mid');
        turnoRole.set(filtered[e].dateIso, 'end');
      }
    }
  }

  for (const day of filtered) {
    const g = document.createElement('div');
    const _role = turnoRole.get(day.dateIso);
    g.className = 'day-group' + (_role ? ' turno-wrap turno-' + _role : '');
    g.dataset.date = day.dateIso;
    const _p = isoParts(day.dateIso);
    g.innerHTML = `
      <div class="day-label">
        <span class="day-label-num">${_p.d}</span>
        <div class="day-label-mid">
          <span class="day-label-month">${_p.mo}</span>
          <span class="day-label-year">${_p.y}</span>
        </div>
        <span class="day-label-wd">${day.weekdayLabel}</span>
      </div>
    `;
    for (const act of day.activities) {
      const el = renderAct(act);
      if (el) g.appendChild(el);
    }
    tl.appendChild(g);
  }

  if (S.unrecognized.length > 0) {
    const dp = document.createElement('div');
    dp.className = 'debug-panel';
    dp.innerHTML = `
      <div class="debug-header" onclick="toggleDebug(this)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span class="debug-title">Righe non riconosciute</span>
        <span class="debug-badge">${S.unrecognized.length}</span>
        <svg class="debug-chevron" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="debug-content">
        ${S.unrecognized.map(l=>`<div class="debug-line">${esc(l)}</div>`).join('')}
      </div>
    `;
    tl.appendChild(dp);
  }
}

function renderAct(act) {
  switch(act.type) {
    case 'FLIGHT':  return renderFlight(act);
    case 'SBY':     return renderSby(act);
    case 'TRAINING': return renderTraining(act);
    case 'OFF':     return renderOff();
    case 'OFF_R':   return renderOffR();
    case 'HOL':     return renderHol();
    case 'REST':    return renderRest();
    case 'LAYOVER': return renderLayover();
    case 'DH':      return renderDH(act);
    default:        return null;
  }
}

// ── FLIGHT
function renderFlight(act) {
  const frag = document.createDocumentFragment();
  for (let i=0; i<act.legs.length; i++) {
    const leg = act.legs[i];
    if (i > 0) {
      const prev = act.legs[i-1];
      if (prev.ldgUtc && leg.toUtc) {
        const gt = timeDiff(prev.ldgUtc, leg.toUtc);
        const gtEl = document.createElement('div');
        gtEl.className = 'ground-time';
        gtEl.textContent = 'TURNAROUND TIME · ' + gt;
        frag.appendChild(gtEl);
      }
    }
    const fltn = leg.fltn && leg.fltn !== '—' ? 'NO ' + leg.fltn : '—';
    const badges = [
      leg.multiDay ? '<span class="cfd-badge-overnight">OVERNIGHT</span>' : '',
      leg.hotel    ? '<span class="cfd-badge-htl">🏨 HTL</span>' : '',
    ].filter(Boolean).join('');
    const card = document.createElement('div');
    card.className = 'card-flight-dark';
    card.innerHTML =
      '<div style="display:flex">' +
        '<div class="cfd-left">' +
          '<div class="cfd-fltn">' + esc(fltn) + '</div>' +
          '<div class="cfd-meta">' +
            (leg.acType ? '<span class="cfd-ac">' + esc(leg.acType) + '</span>' : '') +
            '<span class="cfd-ci-label">CI</span>' +
            '<span class="cfd-ci">' + (leg.checkInUtc || '—') + '</span>' +
          '</div>' +
          (badges ? '<div class="cfd-badges">' + badges + '</div>' : '') +
        '</div>' +
        '<div class="cfd-divider"></div>' +
        '<div class="cfd-right">' +
          '<div class="cfd-airport">' +
            '<div class="cfd-iata">' + esc(leg.dep) + '</div>' +
            '<div class="cfd-time">' + (leg.toUtc||'—') + '</div>' +
            '<div class="cfd-lbl">STD</div>' +
          '</div>' +
          '<div class="cfd-arrow">' +
            (leg.blockUtc ? '<span class="cfd-fh">' + leg.blockUtc + '</span>' : '') +
            '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div><span class="cfd-arrow-plane">✈</span></div>' +
          '</div>' +
          '<div class="cfd-airport">' +
            '<div class="cfd-iata">' + esc(leg.arr) + '</div>' +
            '<div class="cfd-time">' + (leg.ldgUtc||'—') + '</div>' +
            '<div class="cfd-lbl">STA</div>' +
            (nightOffset(leg.toUtc, leg.ldgUtc)
              ? '<div class="cfd-nextday">' + arrDateLabel(act.dateIso||'', nightOffset(leg.toUtc, leg.ldgUtc)) + '</div>'
              : '') +
          '</div>' +
        '</div>' +
      '</div>';
    frag.appendChild(card);
  }
  return frag;
}

    <div class="card-bar bar-rest"></div>
    <div class="card-body">
      <div class="card-title" style="color:var(--text-secondary)">—</div>
      <div class="card-row" style="margin-top:3px"><span style="color:var(--text-muted);font-size:12px">Nessuna attività</span></div>
    </div>`;
  return c;
}

// ── LAYOVER
function renderLayover() {
  const c=document.createElement('div'); c.className='card';
  c.innerHTML=`
    <div class="card-bar bar-layover"></div>
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="card-title">LAYOVER</div>
        <span class="badge b-layover">🏨 Hotel</span>
      </div>
      <div class="card-row" style="margin-top:3px"><span style="color:var(--text-muted);font-size:12px">Overnight in hotel</span></div>
    </div>`;
  return c;
}

// ── DEADHEAD
function renderDH(act) {
  const badges =
    '<span class="cfd-dh-badge">DH POSITIONING</span>' +
    (act.service ? ' <span class="cfd-service-badge">' + esc(act.service) + '</span>' : '');
  const c = document.createElement('div');
  c.className = 'card-dh-dark';
  c.innerHTML =
    '<div style="display:flex">' +
      '<div class="cfd-left">' +
        '<div class="cfd-fltn">DH</div>' +
        '<div class="cfd-meta">' +
          '<span class="cfd-ci-label">CI</span>' +
          '<span class="cfd-ci">' + (act.checkInUtc || '—') + '</span>' +
        '</div>' +
        '<div class="cfd-badges">' + badges + '</div>' +
      '</div>' +
      '<div class="cfd-divider"></div>' +
      '<div class="cfd-right">' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(act.dep) + '</div>' +
          '<div class="cfd-time">' + (act.etd||'—') + '</div>' +
          '<div class="cfd-lbl">STD</div>' +
        '</div>' +
        '<div class="cfd-arrow">' +
          '<div class="cfd-arrow-row"><div class="cfd-arrow-line"></div>' +
          (act.trainLabel
            ? '<span class="cfd-train-label">' + esc(act.trainLabel) + '</span>'
            : act.flightLabel
              ? '<span class="cfd-train-label">' + esc(act.flightLabel) + '</span>'
              : '<span class="cfd-arrow-plane">✈</span>') +
          '</div>' +
        '</div>' +
        '<div class="cfd-airport">' +
          '<div class="cfd-iata">' + esc(act.arr) + '</div>' +
          '<div class="cfd-time">' + (act.eta||'—') + '</div>' +
          '<div class="cfd-lbl">STA</div>' +
          (nightOffset(act.etd, act.eta)
            ? '<div class="cfd-nextday">' + arrDateLabel(act.dateIso||'', nightOffset(act.etd, act.eta)) + '</div>'
            : '') +
        '</div>' +
      '</div>' +
    '</div>';
  return c;
}

// ─────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('uploadZone').style.display='none';
  document.getElementById('timeline').style.display='none';
  rmEl('loadingEl'); rmEl('importBanner'); rmEl('filtersEl');
  const el=mkEl('div','loadingEl'); el.className='loading';
  el.innerHTML=`<div class="spinner"></div><div class="loading-text">Lettura e parsing del roster…</div>`;
  document.getElementById('mainContent').insertBefore(el, document.getElementById('timeline'));
}
function hideLoading() {
  rmEl('loadingEl');
  document.getElementById('uploadZone').style.display='block';
}
function showTimeline() {
  rmEl('loadingEl');
  document.getElementById('uploadZone').style.display='none';
  document.getElementById('timeline').style.display='block';

  rmEl('importBanner');
  const banner=mkEl('div','importBanner'); banner.className='import-banner';
  let ac=0; S.schedule.forEach(d=>ac+=d.activities.length);
  const warn = S.unrecognized.length>0
    ? ` · <span style="color:#92400E">${S.unrecognized.length} righe ignorate</span>`:'';
  banner.innerHTML=`
    <svg class="import-banner-icon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    <span class="import-banner-text">Import OK · ${S.schedule.length} giorni · ${ac} attività${warn}</span>
    <button class="import-banner-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('timeline').insertAdjacentElement('beforebegin',banner);

  rmEl('filtersEl');
  const fil=mkEl('div','filtersEl'); fil.className='filters';
  fil.innerHTML=`
    <button class="filter-chip ${S.showOff?'active':''}" id="offChip" onclick="toggleOffDays()">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg> OFF / Layover
    </button>
    <input class="search-input" type="text" placeholder="Cerca aeroporto, volo…" oninput="handleSearch(this.value)">`;
  document.getElementById('timeline').insertAdjacentElement('beforebegin',fil);

  renderSchedule();
}

function toggleOffDays() {
  S.showOff=!S.showOff;
  document.getElementById('toggleOffBtn')?.classList.toggle('active',!S.showOff);
  document.getElementById('offChip')?.classList.toggle('active',S.showOff);
  if (S.schedule.length) renderSchedule();
}
function handleSearch(q) { S.search=q.toLowerCase(); if(S.schedule.length) renderSchedule(); }
function toggleDebug(hdr) {
  hdr.nextElementSibling.classList.toggle('open');
  hdr.querySelector('.debug-chevron').classList.toggle('open');
}
const mkEl=(t,id)=>{const e=document.createElement(t);e.id=id;return e;};
const rmEl=id=>{const e=document.getElementById(id);if(e)e.remove();};

// ─────────────────────────────────────────────────────────────
// DRAG & DROP
// ─────────────────────────────────────────────────────────────
const uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf') processPDF(f);
});

// ─────────────────────────────────────────────────────────────
// SCROLL
// ─────────────────────────────────────────────────────────────
window.addEventListener('scroll',()=>{
  const doc=document.documentElement;
  document.getElementById('scrollProgress').style.width=
    (doc.scrollTop/(doc.scrollHeight-doc.clientHeight)*100)+'%';
  let vis=null;
  document.querySelectorAll('.day-group[data-date]').forEach(g=>{
    if(g.getBoundingClientRect().top<=70) vis=g;
  });
  if(vis && S.schedule.length) {
    const iso=vis.dataset.date;
    document.getElementById('headerDate').textContent=isoDisplayEN(iso);
    document.getElementById('headerMeta').textContent=`${isoWD(iso)} · UTC`;
  }
},{passive:true});

</script>
</body>
</html>
